                </div>
            );
        };

        // --- INVENTORY PHASE COMPONENT ---
        const InventoryPhase = ({ heroes, setHeroes, inventory, setInventory, closeInventory }) => {
            const [selectedItem, setSelectedItem] = useState(null);
            const [healedHeroIndex, setHealedHeroIndex] = useState(null);

            const RARITY_COLORS = {
                'Common': 'text-zinc-400',
                'Uncommon': 'text-blue-400',
                'Rare': 'text-emerald-400',
                'Epic': 'text-purple-500',
                'Legendary': 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]'
            };

            const TYPE_COLORS = {
                'CONSUMABLE': 'bg-emerald-900/40 border-emerald-500/50',
                'DEFAULT': 'bg-zinc-950 border-zinc-700'
            };

            const handleUseItem = (heroIndex) => {
                if (!selectedItem || selectedItem.type !== 'CONSUMABLE') return;

                const healAmount = selectedItem.statBoost.heal || 0;

                setHeroes(prev => {
                    const next = [...prev];
                    const oldHero = next[heroIndex];

                    const newHero = Object.assign(Object.create(Object.getPrototypeOf(oldHero)), oldHero);
                    newHero.equipment = { ...oldHero.equipment };
                    newHero.hp = Math.min(newHero.maxHp, newHero.hp + healAmount);

                    next[heroIndex] = newHero;
                    return next;
                });

                setHealedHeroIndex(heroIndex);
                setTimeout(() => setHealedHeroIndex(null), 600);

                setInventory(prev => prev.filter(i => i.id !== selectedItem.id));
                setSelectedItem(null);
            };

            const handleEquip = (heroIndex, slot) => {
                if (!selectedItem) return;

                // Block consumables from being equipped
                if (selectedItem.type === 'CONSUMABLE') return;

                // Block mismatched item types
                if (selectedItem.type === 'WEAPON' && slot !== 'weapon1' && slot !== 'weapon2') {
                    alert("Must equip weapon in a weapon slot!");
                    return;
                }
                if (selectedItem.type !== 'WEAPON' && slot !== selectedItem.type.toLowerCase()) {
                    alert(`Must equip ${selectedItem.type} in the ${selectedItem.type} slot!`);
                    return;
                }

                const targetHero = heroes[heroIndex];
                const existingItem = targetHero.equipment[slot];

                // 1. Process Inventory Array
                let nextInv = inventory.filter(i => i.id !== selectedItem.id);
                if (existingItem) nextInv.push(existingItem);
                setInventory(nextInv);

                // 2. Process Hero State IMMUTABLY to survive React StrictMode double invocations
                setHeroes(prev => {
                    const next = [...prev];
                    const oldHero = next[heroIndex];

                    // Create new reference for Class Object
                    const newHero = Object.assign(Object.create(Object.getPrototypeOf(oldHero)), oldHero);
                    newHero.equipment = { ...oldHero.equipment };
                    newHero.equipment[slot] = selectedItem;

                    next[heroIndex] = newHero;
                    return next;
                });

                setSelectedItem(null);
            };

            const unequip = (heroIndex, slot) => {
                const targetHero = heroes[heroIndex];
                const item = targetHero.equipment[slot];
                if (!item) return;

                // 1. Process Inventory Array
                setInventory(inv => [...inv, item]);

                // 2. Process Hero State IMMUTABLY
                setHeroes(prev => {
                    const next = [...prev];
                    const oldHero = next[heroIndex];

                    const newHero = Object.assign(Object.create(Object.getPrototypeOf(oldHero)), oldHero);
                    newHero.equipment = { ...oldHero.equipment };
                    newHero.equipment[slot] = null;

                    next[heroIndex] = newHero;
                    return next;
                });
            };

            return (
                <div className="h-screen w-screen bg-zinc-950 flex flex-col p-8 text-white relative animate-in fade-in duration-300">
                    <button onClick={closeInventory} className="absolute top-6 right-6 font-black text-zinc-400 hover:text-white border-2 border-zinc-700 px-4 py-2">
                        RETURN TO SECTOR
                    </button>

                    <h2 className="text-4xl font-black italic tracking-widest text-amber-500 mb-8">GLOBAL STASH</h2>

                    <div className="flex flex-1 gap-8 overflow-hidden">

                        {/* LEFT: Inventory Cache */}
                        <div className="w-1/3 bg-zinc-900 border-2 border-zinc-800 p-4 overflow-y-auto rounded shadow-xl">
                            <h3 className="text-xl font-bold tracking-widest text-zinc-500 border-b border-zinc-800 pb-2 mb-4">UNASSIGNED LOOT</h3>
                            <div className="flex flex-wrap gap-2">
                                {inventory.length === 0 && <p className="text-zinc-600 text-sm italic">Stash is empty. Defeat monsters or find chests to scavenge gear.</p>}
                                {inventory.map(item => (
                                    <div
                                        key={item.id}
                                        onClick={() => setSelectedItem(selectedItem?.id === item.id ? null : item)}
                                        className={`w-full p-3 flex justify-between items-center cursor-pointer border-l-4 transition-all
                                            ${selectedItem?.id === item.id ? 'bg-amber-900 border-amber-500' : (TYPE_COLORS[item.type] || TYPE_COLORS['DEFAULT']) + ' hover:bg-zinc-800'}`}
                                    >
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">{item.icon}</span>
                                            <div className="flex flex-col">
                                                <span className={`font-bold text-sm tracking-widest ${RARITY_COLORS[item.rarity] || 'text-zinc-300'}`}>{item.name}</span>
                                                <span className="text-[10px] text-zinc-500 uppercase">{item.type} • {item.rarity}</span>
                                                {item.passives && item.passives.map(p => (
                                                    <span key={p.id} className="text-[9px] text-cyan-400 font-bold italic">✦ {p.name}: {p.description}</span>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="flex gap-2 text-xs font-black">
                                            {item.statBoost.atk && <span className="text-rose-500">⚔️+{item.statBoost.atk}</span>}
                                            {item.statBoost.def && <span className="text-amber-500">🛡️+{item.statBoost.def}</span>}
                                            {item.statBoost.spd && <span className="text-blue-400">⚡+{item.statBoost.spd}</span>}
                                            {item.statBoost.heal && <span className="text-emerald-400">💚+{item.statBoost.heal}</span>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* RIGHT: Heroes */}
                        <div className="flex-1 flex gap-4">
                            {heroes.map((hero, index) => (
                                <div
                                    key={hero.id}
                                    onClick={() => selectedItem?.type === 'CONSUMABLE' && handleUseItem(index)}
                                    className={`flex-1 border-2 p-4 rounded shadow-xl flex flex-col transition-all relative
                                        ${healedHeroIndex === index ? 'animate-heal-pulse' : ''}
                                        ${selectedItem?.type === 'CONSUMABLE' ? 'cursor-pointer hover:border-emerald-500 hover:bg-emerald-950/20 bg-emerald-900/10 border-emerald-800' : 'bg-zinc-900 border-zinc-800'}`}

                                                                <p className="font-black italic text-[10px] truncate uppercase text-zinc-200">{hero.name}</p>
                                                                <button 
                                                                    onClick={() => setHeroes(prev => prev.map(h => h.name === hero.name ? Object.assign(h.clone(), {positionLine: 'REARGUARD'}) : h))}
                                                                    className="text-white bg-zinc-800 hover:bg-zinc-700 px-1.5 py-0.5 rounded-sm border border-zinc-700 text-[8px] font-black uppercase transition-colors"
                                                                >
                                                                    MOVE BACK →
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Rearguard Area */}
                                    <div className="flex flex-col items-center gap-2">
                                        <h3 className="font-black italic text-zinc-500 tracking-widest uppercase text-[9px]">REARGUARD (BACK)</h3>
                                        <div className="grid grid-cols-2 lg:grid-cols-2 gap-2 bg-zinc-900/50 p-2 border-2 border-dashed border-zinc-700 rounded-xl min-h-[160px] w-[340px]">
                                            {heroes.filter(h => h.positionLine === 'REARGUARD').map(hero => {
                                                const roleBadgeTone = hero.role === 'TANK' ? 'bg-amber-500/95' : hero.role === 'HEALER' ? 'bg-emerald-500/95' : 'bg-rose-500/95';
                                                return (
                                                    <div key={hero.name} className={`bg-zinc-900 border-2 border-zinc-700 p-2 rounded-lg flex flex-col gap-1 group shadow-lg transition-all hover:border-blue-500/50 w-[158px] h-[72px] relative overflow-hidden`}>
                                                        <div className="absolute top-1 left-1 w-6 h-6 rounded border border-black/40 flex items-center justify-center scale-75 z-20 pointer-events-none">
                                                            <div className={`absolute inset-0 ${roleBadgeTone} opacity-90 rounded`} />
                                                            <span className="text-[10px] relative z-10">{ROLES[hero.role]?.icon}</span>
                                                        </div>
                                                        <div className="flex items-center gap-2 relative z-10">
                                                            <div className="w-10 h-10 rounded overflow-hidden bg-black shrink-0 border border-zinc-800 flex items-center justify-center relative">
                                                                <img 
                                                                    src={`assets/${hero.imageId}.png`} 
                                                                    className="w-full h-full object-cover" 
                                                                    onError={(e) => { e.target.style.display = 'none'; }}
                                                                />
                                                                <span className="text-lg font-black italic text-zinc-700">{hero.name[0]}</span>
                                                            </div>
                                                            <div className="flex-1 min-w-0">
                                                                <p className="font-black italic text-[10px] truncate uppercase text-zinc-200">{hero.name}</p>
                                                                <button 
                                                                    onClick={() => setHeroes(prev => prev.map(h => h.name === hero.name ? Object.assign(h.clone(), {positionLine: 'VANGUARD'}) : h))}
                                                                    className="text-white bg-zinc-800 hover:bg-zinc-700 px-1.5 py-0.5 rounded-sm border border-zinc-700 text-[8px] font-black uppercase transition-colors"
                                                                >
                                                                    ← MOVE FRONT
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => finalizeDeployment(heroes)}
                                    className="px-16 py-3 mb-6 bg-emerald-600 hover:bg-emerald-500 border-4 border-emerald-800 text-white font-black italic text-xl sm:text-2xl transition-all hover:scale-105 active:scale-95 shrink-0"
                                >
                                    ENTER THE UNDERDELVE
                                </button>
                            </div>
                        )}

                        <div style={{ display: gamePhase === 'EXPLORATION' ? 'block' : 'none' }}>
                            <ExplorationPhase
                                floor={floor}
                                heroes={heroes}
                                enemies={activeMapEnemies}
                                setEnemies={setActiveMapEnemies}
                                onEncounter={handleEncounter}
                                onNextFloor={handleNextFloor}
                                onPrevFloor={handlePrevFloor}
                                onTrap={handleTrap}
                                onWin={() => setRunEndState('VICTORY')}
                                onHeal={handleHeal}
                                openInventory={() => setGamePhase('INVENTORY')}
                            />
                        </div>

                        {gamePhase === 'INVENTORY' && (
                            <InventoryPhase
                                heroes={heroes}
                                setHeroes={setHeroes}
                                inventory={inventory}
                                setInventory={setInventory}
                                closeInventory={() => setGamePhase('EXPLORATION')}
                            />
                        )}

                        {gamePhase === 'BATTLE' && activeEncounter && (
                            <BattlePhase
                                heroes={heroes}
                                setHeroes={setHeroes}
                                packSetup={activeEncounter.instances}
                                onBattleEnd={handleBattleEnd}
                            />
                        )}

                        {runEndState && (
                            <div className="fixed inset-0 z-[200] bg-black/90 backdrop-blur-2xl flex flex-col items-center justify-center animate-in fade-in duration-1000">
                                <h2 className={`text-6xl sm:text-8xl font-black italic tracking-tighter mb-4 text-center px-4
                                    ${runEndState === 'VICTORY' ? 'text-amber-400 drop-shadow-[0_0_30px_rgba(251,191,36,0.5)]' : 'text-red-600 drop-shadow-[0_0_30px_rgba(220,38,38,0.5)]'}`}>
                                    {runEndState === 'VICTORY' ? 'MISSION ACCOMPLISHED' : 'PARTY WIPED'}
                                </h2>
                                <p className="text-zinc-500 uppercase tracking-[0.4em] font-bold text-[10px] sm:text-xs mb-12 text-center px-4">
                                    {runEndState === 'VICTORY' ? 'You have survived the depths of Sector 09' : 'The Syndicate has fallen in the underdelve'}
                                </p>
                                <button 
                                    onClick={() => {
                                        setRunEndState(null);
                                        setGamePhase('MAIN_MENU');
                                    }}
                                    className="px-12 py-3 border-4 border-white text-white font-black italic text-xl sm:text-2xl hover:bg-white hover:text-black transition-all active:scale-95"
                                >
                                    RETURN TO BASE
                                </button>
                            </div>
                        )}
                    </div>

                    <style>{`
                        .bg-radial-vignette {
                            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,1) 100%);
                        }
                        @keyframes pulse {
                            0% { opacity: 0.4; }
                            50% { opacity: 1; }
                            100% { opacity: 0.4; }
                        }
                        .animate-pulse {
                            animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
                        }
                        @keyframes float-up {
                            0% { opacity: 0; transform: translate(-50%, -10px) scale(0.8); }
                            20% { opacity: 1; transform: translate(-50%, -30px) scale(1.2); }
                            80% { opacity: 1; transform: translate(-50%, -50px) scale(1); }
                            100% { opacity: 0; transform: translate(-50%, -60px) scale(0.9); }
                        }
                        .animate-float-up {
                            animation: float-up 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
                        }

                        @keyframes heal-pulse {
                            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); border-color: #10b981; }
                            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); border-color: #10b981; }
                            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
                        }
                        .animate-heal-pulse {
                            animation: heal-pulse 0.6s cubic-bezier(0.4, 0, 0.6, 1);
                        }

                        @keyframes hit-shake {
                            0% { transform: translateX(0); }
                            25% { transform: translateX(-5px) rotate(-0.8deg); }
                            50% { transform: translateX(5px) rotate(0.8deg); }
                            75% { transform: translateX(-3px) rotate(-0.4deg); }
                            100% { transform: translateX(0); }
                        }
                        .animate-hit-shake {
                            animation: hit-shake 0.24s cubic-bezier(0.36, 0.07, 0.19, 0.97);
                        }

                        @keyframes impact-pop {
                            0% { opacity: 0; transform: scale(0.5); }
                            40% { opacity: 1; transform: scale(1.2); }
                            100% { opacity: 0; transform: scale(1.5); }
                        }
                        .animate-impact-pop {
                            animation: impact-pop 0.3s ease-out forwards;
                        }

                        @keyframes heal-sparkle {
                            0% { opacity: 0; transform: translateY(8px) scale(0.8); }
                            30% { opacity: 1; transform: translateY(0) scale(1.05); }
                            100% { opacity: 0; transform: translateY(-14px) scale(1.1); }
                        }
                        .animate-heal-sparkle {
                            animation: heal-sparkle 0.55s ease-out forwards;
                        }

                        @keyframes heal-glow {
                            0% { opacity: 0; }
                            30% { opacity: 1; }
                            100% { opacity: 0; }
                        }
                        .animate-heal-glow {
                            animation: heal-glow 0.45s ease-out forwards;
                        }

                        @keyframes tile-reveal {
                            0% { opacity: 0; transform: scale(0.86); filter: brightness(0.75) blur(1px); }
                            65% { opacity: 1; transform: scale(1.04); filter: brightness(1.08) blur(0); }
                            100% { opacity: 1; transform: scale(1); filter: brightness(1) blur(0); }
                        }
                        .animate-tile-reveal {
                            animation: tile-reveal 360ms cubic-bezier(0.2, 0.8, 0.2, 1);
                            transform-origin: center;
                            will-change: transform, opacity, filter;
                        }

                        @keyframes torch-flicker {
                            0%, 100% { opacity: 0.7; transform: scale(1); filter: blur(12px); }
                            50% { opacity: 1; transform: scale(1.15); filter: blur(8px); }
                        }
                        .animate-torch {
                            animation: torch-flicker 2s infinite ease-in-out;
                            background: radial-gradient(circle, rgba(251, 191, 36, 0.45) 0%, rgba(245, 158, 11, 0.2) 50%, transparent 80%);
                        }
                        @keyframes torch-spill {
                            0%, 100% { opacity: 0.8; transform: scale(1); }
                            50% { opacity: 1; transform: scale(1.05); }
                        }
                        .animate-torch-spill {
                            animation: torch-spill 2.5s infinite ease-in-out;
                            background: radial-gradient(circle, rgba(251, 191, 36, 0.2) 0%, rgba(245, 158, 11, 0.1) 40%, transparent 85%);
                        }
                    `}</style>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes trait-pulse {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); border-color: rgba(251, 191, 36, 0.8); }
            70% { box-shadow: 0 0 30px 15px rgba(251, 191, 36, 0); border-color: rgba(251, 191, 36, 1); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); border-color: rgba(251, 191, 36, 0.8); }
        }
        .animate-trait-pulse {
            animation: trait-pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Signal Flare Border Charge */
        @keyframes flare-charge {
            0% { clip-path: inset(100% 0 0 0); opacity: 0.5; }
            100% { clip-path: inset(0 0 0 0); opacity: 1; }
        }
        .animate-flare-charge {
            animation: flare-charge 0.4s ease-out forwards;
        }

        /* Frame Break Art Pop */
        @keyframes frame-pop {
            0% { transform: scale(1) translateY(0); filter: brightness(1); }
            30% { transform: scale(0.95) translateY(10px); filter: brightness(1.2); } /* Recoil */
            60% { transform: scale(1.15) translateY(-20px); filter: brightness(1.5); } /* Pop */
            100% { transform: scale(1) translateY(0); filter: brightness(1); }
        }
        .animate-frame-pop {
            animation: frame-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* Iconic Sigil Float */
        @keyframes sigil-appear {
            0% { transform: translateY(20px) scale(0); opacity: 0; filter: blur(10px); }
            40% { transform: translateY(0) scale(1.4); opacity: 1; filter: blur(0); }
            100% { transform: translateY(-30px) scale(1); opacity: 0; filter: blur(5px); }
        }
        .animate-sigil-appear {
            animation: sigil-appear 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Camera Juice: Board Shake */
        @keyframes board-shake {
            0% { transform: translate(0, 0) rotate(0); }
            15% { transform: translate(-8px, -4px) rotate(-1deg); }
            30% { transform: translate(8px, 4px) rotate(1deg); }
            45% { transform: translate(-8px, 4px) rotate(-1deg); }
            60% { transform: translate(8px, -4px) rotate(1deg); }
            75% { transform: translate(-4px, -2px) rotate(-0.5deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }
        .animate-board-shake {
            animation: board-shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        /* Particle Vacuum */
        @keyframes particle-suck {
            0% { transform: scale(2); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.2); opacity: 0; }
        }
        .vfx-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-suck 0.5s ease-in forwards;
        }

        /* Ranged Projectiles */
        .spell-arc-trail {
            fill: none;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.8));
            stroke-dasharray: 6 14;
            animation: spell-arc-fade 0.5s ease-out forwards;
        }
        .spell-arc-trail-soft {
            fill: none;
            stroke-linecap: round;
            filter: blur(1.5px);
            animation: spell-arc-fade 0.52s ease-out forwards;
        }
        .straight-arc-trail {
            fill: none;
            stroke-linecap: round;
            opacity: 0.9;
            animation: spell-arc-fade 0.36s ease-out forwards;
        }
        .spell-projectile-core {
            opacity: 0.95;
        }
        .arrow-projectile-core {
            opacity: 0.98;
        }
        .arrow-head {
            opacity: 0.98;
        }
        .fireball-aura {
            fill: rgba(249, 115, 22, 0.25);
            filter: blur(1px) drop-shadow(0 0 10px rgba(248, 113, 113, 0.75));
            animation: fireball-flicker 0.25s ease-in-out infinite alternate;
        }
        .fireball-ember {
            fill: #fdba74;
            filter: drop-shadow(0 0 6px rgba(251, 146, 60, 0.9));
            opacity: 0.9;
        }
        .ember-1 { animation: ember-drift-1 0.45s linear infinite; }
        .ember-2 { animation: ember-drift-2 0.42s linear infinite; }
        .ember-3 { animation: ember-drift-3 0.48s linear infinite; }
        .sword-slash-burst {
            animation: sword-slash-pop 0.22s ease-out forwards;
        }
        .sword-slash-main {
            fill: none;
            stroke: rgba(255, 241, 242, 0.95);
            stroke-width: 8;
            stroke-linecap: round;
            filter: drop-shadow(0 0 9px rgba(248, 113, 113, 0.95));
        }
        .sword-slash-echo {
            fill: none;
            stroke: rgba(252, 165, 165, 0.75);
            stroke-width: 4;
            stroke-linecap: round;
            filter: drop-shadow(0 0 7px rgba(252, 165, 165, 0.75));
        }
        @keyframes spell-arc-fade {
            0% { opacity: 0; }
            15% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes fireball-flicker {
            0% { opacity: 0.45; transform: scale(0.95); }
            100% { opacity: 0.9; transform: scale(1.06); }
        }
        @keyframes ember-drift-1 {
            0% { transform: translate(-1px, 0); opacity: 0.9; }
            100% { transform: translate(8px, -6px); opacity: 0; }
        }
        @keyframes ember-drift-2 {
            0% { transform: translate(1px, 0); opacity: 0.8; }
            100% { transform: translate(-7px, -8px); opacity: 0; }
        }
        @keyframes ember-drift-3 {
            0% { transform: translate(0, 1px); opacity: 0.8; }
            100% { transform: translate(4px, -10px); opacity: 0; }
        }
        @keyframes sword-slash-pop {
            0% { opacity: 0; transform: scale(0.45); }
            45% { opacity: 1; transform: scale(1.08); }
            100% { opacity: 0; transform: scale(1.18); }
        }
    </style>
</head>
<body class="bg-black">
    <div id="root"></div>
</body>
</html>
