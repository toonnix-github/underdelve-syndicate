<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underdelve Syndicate - Digital Tabletop</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- React UMD for maximum stability -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- GAME ENGINE LOGIC ---
        class Item {
            constructor(name, type, statBoost, icon, rarity = 'Common', passives = []) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.name = name;
                this.type = type; // 'WEAPON', 'HAT', 'CHEST', 'SHOES', 'CONSUMABLE'
                this.statBoost = statBoost; // { atk: X, def: Y, spd: Z, heal: H }
                this.icon = icon;
                this.rarity = rarity; // 'Common', 'Uncommon', 'Rare', 'Epic', 'Legendary'
                this.passives = passives; // [{ id: 'lifesteal', name: 'Lifesteal', description: 'Heal for 20% of dmg' }]
            }
        }

        class Combatant {
            constructor(name, role, maxHp, speed, power, def, imageId, abilities, positionLine, isHero = true, trait = null) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.name = name;
                this.role = role;
                this.maxHp = maxHp;
                this.hp = maxHp;
                this.speed = speed;
                this.power = power;
                this.def = def;
                this.imageId = imageId;
                this.abilities = abilities;
                this.positionLine = positionLine || 'VANGUARD'; // 'VANGUARD' or 'REARGUARD'
                this.atb = 0;
                this.isDead = false;
                this.isHero = isHero;
                this.trait = trait;
                this.hasRevived = false; // Persistent state for 'Undying'
                this.lastAction = "";
                this.isActing = false;
                this.attackPhase = 'idle'; // 'idle' | 'advance' | 'strike' | 'return'
                this.impactPulse = false;
                this.hitShake = false;
                this.showImpact = false;
                this.healSparkle = false;
                this.traitGlow = false;
                this.vfx = []; // Store active floating text
                this.equipment = {
                    weapon1: null,
                    weapon2: null,
                    hat: null,
                    chest: null,
                    shoes: null
                };
                // VFX States
                this.isCharging = false;
                this.chargeColor = 'amber'; // 'amber' | 'blue' | 'rose'
                this.activeSigil = null; // '⚔️' | '✨' | '🛡️' | '⚡'
                this.isPopping = false;
            }

            clone() {
                const copy = Object.assign(Object.create(Object.getPrototypeOf(this)), this);
                copy.equipment = { ...this.equipment };
                copy.abilities = [...this.abilities];
                copy.vfx = [...this.vfx];
                // Clone VFX states
                copy.isCharging = this.isCharging;
                copy.chargeColor = this.chargeColor;
                copy.activeSigil = this.activeSigil;
                copy.isPopping = this.isPopping;
                return copy;
            }

            getPassives() {
                const passives = [];
                Object.values(this.equipment).forEach(item => {
                    if (item && item.passives) {
                        item.passives.forEach(p => passives.push(p.id));
                    }
                });
                return passives;
            }

            getATK() {
                let total = this.power;
                Object.values(this.equipment).forEach(item => { if (item?.statBoost?.atk) total += item.statBoost.atk; });
                return total;
            }

            getDEF() {
                let total = this.def;
                Object.values(this.equipment).forEach(item => { if (item?.statBoost?.def) total += item.statBoost.def; });
                if (this.trait?.id === 'vanguard_stance' && this.positionLine === 'VANGUARD') {
                    total = Math.floor(total * 1.1);
                }
                return total;
            }

            getSPD() {
                let total = this.speed;
                Object.values(this.equipment).forEach(item => { if (item?.statBoost?.spd) total += item.statBoost.spd; });
                return total;
            }

            updateAtb(dt, partySpeedMult = 1.0) {
                if (this.hp <= 0) return;
                const increment = (this.getSPD() * dt * partySpeedMult) * 5;
                this.atb = Math.min(100, this.atb + increment);
            }

            addVfx(text, type) {
                const id = Date.now() + Math.random();
                this.vfx.push({ id, text, type });
                // Clean up vfx after 1 second
                setTimeout(() => {
                    this.vfx = this.vfx.filter(v => v.id !== id);
                }, 1000);
            }
        }

        const ROLES = {
            TANK: { color: 'amber', icon: '🛡️' },
            HEALER: { color: 'emerald', icon: '✨' },
            DPS: { color: 'rose', icon: '⚔️' }
        };

        // --- REACT COMPONENTS ---

        const Card = ({ unit }) => {
            if (!unit) return null;
            const roleInfo = ROLES[unit.role] || ROLES.DPS;
            const tiltClass = unit.isHero ? '-rotate-[2.5deg]' : 'rotate-[2.5deg]';
            const attackDirection = unit.isHero ? '-translate-x-7' : 'translate-x-7';
            const strikeDirection = unit.isHero ? '-translate-x-12' : 'translate-x-12';
            const returnDirection = unit.isHero ? 'translate-x-0' : 'translate-x-0';
            const attackMotionClass = unit.attackPhase === 'advance'
                ? attackDirection
                : unit.attackPhase === 'strike'
                    ? strikeDirection
                    : unit.attackPhase === 'return'
                        ? returnDirection
                        : 'translate-x-0';
            const roleBadgeTone = unit.role === 'TANK'
                ? 'bg-amber-500/95'
                : unit.role === 'HEALER'
                    ? 'bg-emerald-500/95'
                    : 'bg-rose-500/95';

            // Safe Stat Access (resilience for raw hero objects)
            const getUnitATK = () => unit.getATK ? unit.getATK() : (unit.atk || 0);
            const getUnitDEF = () => unit.getDEF ? unit.getDEF() : (unit.def || 0);
            const getUnitSPD = () => unit.getSPD ? unit.getSPD() : (unit.spd || 0);
            const imageId = unit.imageId || `hero_${unit.name?.toLowerCase() || 'unknown'}`;

            return (
                <div
                    data-unit-id={unit.id}
                    className={`relative w-[170px] h-[248px] rounded-xl shadow-2xl border-[3px] transform
                        ${unit.isHero ? 'bg-zinc-900 border-zinc-700' : 'bg-red-950 border-red-900'} ${tiltClass}
                        ${unit.isActing ? 'ring-2 ring-yellow-400 -translate-y-2 scale-110 z-20' : 'translate-y-0 scale-100'}
                        ${unit.traitGlow ? 'animate-trait-pulse border-amber-400 z-30 shadow-[0_0_25px_rgba(251,191,36,0.6)]' : ''}
                        ${attackMotionClass}
                        ${unit.impactPulse ? 'scale-[1.06] brightness-110' : ''}
                        ${unit.attackPhase === 'strike' ? 'transition-all duration-120 ease-out' : 'transition-all duration-300 ease-in-out'}
                        ${unit.hp <= 0 ? 'opacity-40 grayscale overflow-hidden' : 'opacity-100'} flex flex-col`}
                >
                    {/* Signal Flare Overlay (Anticipation) */}
                    {unit.isCharging && (
                        <div className={`absolute inset-0 z-40 border-4 border-${unit.chargeColor || 'amber'}-400 animate-flare-charge pointer-events-none shadow-[inset_0_0_20px_rgba(251,191,36,0.6)]`} />
                    )}

                    {/* Iconic Sigil (Information) */}
                    {unit.activeSigil && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center pointer-events-none">
                            <span className="text-7xl drop-shadow-[0_0_20px_rgba(255,255,255,0.8)] animate-sigil-appear">
                                {unit.activeSigil}
                            </span>
                        </div>
                    )}

                    {/* Character Art (Frame Break Layer) */}
                    <div className={`absolute inset-0 bg-zinc-900 rounded-xl overflow-hidden ${unit.hitShake ? 'animate-hit-shake' : ''}`}>
                         {/* This sub-container handles the overflow clip for normal state */}
                        <img 
                            src={`assets/${imageId}.png`} 
                            alt={unit.name} 
                            className={`w-full h-full object-cover opacity-95 transition-transform duration-500
                                ${unit.isPopping ? 'scale-125 -translate-y-4 brightness-125 z-50 animate-frame-pop' : 'scale-100'}`} 
                        />
                        <div className="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/90" />
                        {unit.hp <= 0 && <div className="absolute inset-0 bg-black/80 flex items-center justify-center font-black text-red-600 text-sm tracking-widest uppercase shadow-black z-40">Slain</div>}
                    </div>

                    {/* Information Layer (Above Art) */}
                    <div className="relative z-10 flex flex-col h-full p-2 pointer-events-none overflow-hidden">
                        {/* Header: Name and Indicators */}
                        <div className="flex justify-between items-start mb-auto">
                            <div className={`w-8 h-8 rounded-xl border border-black/60 flex items-center justify-center shadow-lg ${roleBadgeTone}`}>
                                <span className="text-base drop-shadow-md">{roleInfo.icon}</span>
                            </div>
                            
                            <div className="flex flex-col items-center flex-1 mx-2">
                                <div className="bg-black/60 backdrop-blur-sm px-3 py-1 rounded-full border border-white/10 shadow-lg">
                                    <h3 className="text-[12px] font-black text-white tracking-tight leading-none uppercase text-center truncate max-w-[90px]">
                                        {unit.name || 'Hero'}
                                    </h3>
                                </div>
                                <div className="h-[2px] w-8 bg-amber-500/80 rounded-full mt-1 shadow-amber-500/50" />
                            </div>

                            <div className={`w-6 h-6 rounded-full border border-black/60 flex items-center justify-center shadow-lg ${unit.positionLine === 'VANGUARD' ? 'bg-amber-600/95' : 'bg-blue-600/95'}`}>
                                <span className="text-[10px] font-black text-white">{unit.positionLine === 'VANGUARD' ? 'V' : 'R'}</span>
                            </div>
                        </div>

                        {/* Footer: Stats, Traits, and Skills */}
                        <div className="mt-auto space-y-1 bg-black/40 backdrop-blur-sm p-1.5 rounded-lg border border-white/5">
                            {/* Trait Capsule */}
                            {unit.trait && (
                                <div className="group relative">
                                    <div className="flex items-center gap-1.5 bg-amber-500/20 rounded-full px-2 py-0.5 border border-amber-500/40">
                                        <span className="text-[8px] font-black text-amber-400 uppercase tracking-tighter italic">Trait</span>
                                        <span className="text-[9px] font-bold text-zinc-100 truncate max-w-[110px]">{unit.trait.name}</span>
                                    </div>
                                    <div className="absolute bottom-full left-0 mb-2 w-48 p-2 bg-black/95 text-[9px] text-zinc-300 rounded border border-zinc-700 hidden group-hover:block z-50 shadow-2xl backdrop-blur-md">
                                        <div className="font-black text-amber-500 mb-1 uppercase tracking-widest">{unit.trait.name}</div>
                                        {unit.trait.description}
                                    </div>
                                </div>
                            )}

                            {/* Signature Skill */}
                            {unit.abilities && unit.abilities[0] && (
                                <div className="bg-zinc-800/40 rounded border border-white/5 px-2 py-1 flex items-center gap-2">
                                    <span className="text-[10px]">{unit.abilities[0].type === 'heal' ? '✨' : '⚔️'}</span>
                                    <span className="text-[9px] font-bold text-zinc-200 truncate uppercase tracking-widest">{unit.abilities[0].name}</span>
                                </div>
                            )}

                            {/* ATK / DEF / SPD Box */}
                            <div className="flex justify-between items-center bg-zinc-950/80 rounded-lg p-1 border border-white/5">
                                <div className="flex flex-col items-center flex-1 border-r border-white/10" title="Attack">
                                    <span className="text-[8px] text-rose-400/80 font-black uppercase tracking-tighter">Atk</span>
                                    <span className="text-[10px] text-rose-300 font-extrabold">{getUnitATK()}</span>
                                </div>
                                <div className="flex flex-col items-center flex-1 border-r border-white/10" title="Defense">
                                    <span className="text-[8px] text-amber-400/80 font-black uppercase tracking-tighter">Def</span>
                                    <span className="text-[10px] text-amber-200 font-extrabold">{getUnitDEF()}</span>
                                </div>
                                <div className="flex flex-col items-center flex-1" title="Speed">
                                    <span className="text-[8px] text-cyan-400/80 font-black uppercase tracking-tighter">Spd</span>
                                    <span className="text-[10px] text-cyan-200 font-extrabold">{getUnitSPD()}</span>
                                </div>
                            </div>
                                                  {/* Resource Bars */}
                            <div className="space-y-0.5">
                                <div className="w-full h-1 bg-zinc-900/90 rounded-full border border-black/80 overflow-hidden relative">
                                    <div
                                        style={{ width: `${((unit.hp || unit.maxHp || 1) / (unit.maxHp || 1)) * 100}%` }}
                                        className="absolute left-0 top-0 h-full bg-gradient-to-r from-red-600 to-rose-500"
                                    />
                                </div>
                                {unit.hp || unit.maxHp ? (
                                    <div className="flex justify-between items-center text-[8px] font-mono leading-none">
                                        <span className="text-zinc-500 uppercase">HP</span>
                                        <span className="text-white font-bold">{Math.ceil(unit.hp || unit.maxHp || 0)}/{unit.maxHp || unit.hp || 0}</span>
                                    </div>
                                ) : null}
                                {/* Slim ATB Bar - only show if ATB actually exists (combat) */}
                                {(unit.atb !== undefined) && (
                                    <div className="w-full h-[2px] bg-zinc-950/90 rounded-full relative overflow-hidden border border-black/50">
                                        <div
                                            style={{ width: `${unit.atb || 0}%` }}
                                            className={`absolute left-0 top-0 h-full transition-all duration-100 ${(unit.atb || 0) >= 100 ? 'bg-yellow-300 shadow-[0_0_8px_rgba(253,224,71,0.65)]' : 'bg-cyan-500/80'}`}
                                        />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Action Overlay */}
                    {unit.isActing && (
                        <div className="absolute inset-0 flex items-center justify-center bg-black/40 animate-in fade-in zoom-in duration-300 pointer-events-none z-30">
                            <div className="bg-yellow-400 text-black px-1 py-0.5 font-black text-[8px] transform -rotate-12 shadow-[0_5px_10px_rgba(0,0,0,0.8)] border border-white uppercase text-center leading-tight">
                                {unit.lastAction}
                            </div>
                        </div>
                    )}

                    {/* Floating Combat Text (VFX) */}
                    {(unit.vfx || []).map((effect) => (
                        <div
                            key={effect.id}
                            className={`absolute left-1/2 top-1/3 -translate-x-1/2 -translate-y-1/2 font-black text-2xl drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] stroke-black pointer-events-none animate-float-up z-50
                                ${effect.type === 'damage' ? 'text-red-500' : 'text-emerald-400'}`}
                            style={{ WebkitTextStroke: '1px black' }}
                        >
                            {effect.text}
                        </div>
                    ))}

                    {unit.showImpact && (
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-50">
                            <div className="relative w-14 h-14 md:w-16 md:h-16 rounded-full border-2 border-amber-100/90 bg-gradient-to-br from-amber-300/90 to-orange-500/80 shadow-[0_0_18px_rgba(251,191,36,0.75)] animate-impact-pop flex items-center justify-center">
                                <div className="w-5 h-5 md:w-6 md:h-6 rounded-full bg-amber-100/90 shadow-[0_0_10px_rgba(255,255,255,0.6)]" />
                                <div className="absolute w-8 md:w-9 h-1 bg-amber-100/90 rounded-full rotate-45" />
                            </div>
                        </div>
                    )}

                    {unit.healSparkle && (
                        <div className="absolute inset-0 pointer-events-none z-40">
                            <div className="absolute left-1/2 top-[30%] -translate-x-1/2 text-emerald-300 text-2xl animate-heal-sparkle" style={{ animationDelay: '0ms' }}>✦</div>
                            <div className="absolute left-[35%] top-[55%] text-emerald-200 text-xl animate-heal-sparkle" style={{ animationDelay: '80ms' }}>✧</div>
                            <div className="absolute left-[65%] top-[50%] text-lime-200 text-lg animate-heal-sparkle" style={{ animationDelay: '140ms' }}>✦</div>
                            <div className="absolute inset-0 bg-emerald-400/15 animate-heal-glow" />
                        </div>
                    )}
                </div>
            );
        };

        // --- BATTLE PHASE COMPONENT ---
        const BattlePhase = ({ heroes, setHeroes, packSetup, onBattleEnd }) => {
            const [isPaused, setIsPaused] = useState(true);
            const [hasStarted, setHasStarted] = useState(false);
            const [winner, setWinner] = useState(null);
            const [battleLog, setBattleLog] = useState([`Encountered enemies! Waiting for authorization...`]);
            const [isLogExpanded, setIsLogExpanded] = useState(false);
            const [boardShake, setBoardShake] = useState(false);
            const [projectiles, setProjectiles] = useState([]);
            const [slashBursts, setSlashBursts] = useState([]);

            // Multipack enemies from the map encounter
            const [enemies, setEnemies] = useState(packSetup);

            const log = (msg) => setBattleLog(prev => [msg, ...prev].slice(0, 5));

            const getCardCenter = (unitId) => {
                const cardEl = document.querySelector(`[data-unit-id="${unitId}"]`);
                if (!cardEl) return null;
                const rect = cardEl.getBoundingClientRect();
                return {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
            };

            const getProjectileProfile = (ability = {}) => {
                const name = (ability?.name || '').toLowerCase();
                const isHeal = ability?.type === 'heal';
                const isMelee = /slash|smash|crash|slam|bite|stab|strike|tremor|fang|backstab|siphon/.test(name);
                const isSwordStrike = /sword|slash|strike|backstab|stab/.test(name);
                const isFireSpell = /fire|flame|burn|heat|dragon breath|forge/.test(name);
                const isArrowShot = /arrow|shot/.test(name);

                if (isHeal) {
                    return {
                        motion: 'curve',
                        lineColor: 'rgba(34, 197, 94, 0.9)',
                        glowColor: 'rgba(74, 222, 128, 0.75)',
                        coreColor: '#dcfce7',
                        width: 4,
                        effect: 'default'
                    };
                }

                if (isMelee) {
                    return {
                        motion: 'straight',
                        lineColor: 'rgba(220, 38, 38, 0.95)',
                        glowColor: 'rgba(248, 113, 113, 0.75)',
                        coreColor: '#fee2e2',
                        width: 7,
                        effect: isSwordStrike ? 'slash' : 'default'
                    };
                }

                if (isFireSpell) {
                    return {
                        motion: 'curve',
                        lineColor: 'rgba(239, 68, 68, 0.95)',
                        glowColor: 'rgba(252, 165, 165, 0.75)',
                        coreColor: '#fee2e2',
                        width: 5,
                        effect: 'fireball'
                    };
                }

                if (isArrowShot) {
                    return {
                        motion: 'straight',
                        lineColor: 'rgba(59, 130, 246, 0.92)',
                        glowColor: 'rgba(125, 211, 252, 0.75)',
                        coreColor: '#e0f2fe',
                        width: 4,
                        effect: 'default'
                    };
                }

                return {
                    motion: 'curve',
                    lineColor: 'rgba(59, 130, 246, 0.9)',
                    glowColor: 'rgba(96, 165, 250, 0.72)',
                    coreColor: '#dbeafe',
                    width: 4,
                    effect: 'default'
                };
            };

            const spawnProjectile = (caster, target, ability) => {
                const projectileStyle = getProjectileProfile(ability);
                requestAnimationFrame(() => {
                    const start = getCardCenter(caster.id);
                    const end = getCardCenter(target.id);
                    if (!start || !end) return;

                    const dx = end.x - start.x;
                    const dy = end.y - start.y;
                    const distance = Math.hypot(dx, dy);
                    const perpX = distance > 0 ? -dy / distance : 0;
                    const perpY = distance > 0 ? dx / distance : 0;
                    const arcStrength = projectileStyle.motion === 'curve' ? Math.min(150, Math.max(85, distance * 0.32)) : 0;
                    const midX = (start.x + end.x) / 2 + perpX * arcStrength;
                    const midY = (start.y + end.y) / 2 + perpY * arcStrength;
                    const path = projectileStyle.motion === 'straight'
                        ? `M ${start.x} ${start.y} L ${end.x} ${end.y}`
                        : `M ${start.x} ${start.y} Q ${midX} ${midY} ${end.x} ${end.y}`;

                    const projectile = {
                        id: Date.now() + Math.random(),
                        type: projectileStyle.motion,
                        style: projectileStyle,
                        path
                    };

                    setProjectiles(prev => [...prev, projectile]);

                    if (projectileStyle.effect === 'slash') {
                        const slashId = Date.now() + Math.random();
                        const impactDelay = projectileStyle.motion === 'straight' ? 260 : 410;
                        setTimeout(() => {
                            setSlashBursts(prev => [...prev, { id: slashId, x: end.x, y: end.y, angle: Math.atan2(dy, dx) * (180 / Math.PI) }]);
                            setTimeout(() => {
                                setSlashBursts(prev => prev.filter(s => s.id !== slashId));
                            }, 240);
                        }, impactDelay);
                    }

                    setTimeout(() => {
                        setProjectiles(prev => prev.filter(p => p.id !== projectile.id));
                    }, projectileStyle.motion === 'straight' ? 360 : 520);
                });
            };

            const handleAbilityProc = async (unit, ability) => {
                // If the unit has a trait, it's a "High impact" event!
                const isSpecial = unit.trait !== null;
                
                unit.isCharging = true;
                unit.chargeColor = ability.type === 'heal' ? 'blue' : 'rose';
                if (unit.trait) unit.chargeColor = 'amber';
                
                // Sigil mapping
                unit.activeSigil = ability.type === 'heal' ? '✨' : '⚔️';
                if (unit.trait) {
                    const traitIcons = { 'overclock': '⚡', 'moonlight_rain': '🌙', 'soul_reaper': '🧛' };
                    unit.activeSigil = traitIcons[unit.trait.id] || '🌟';
                }

                // Trigger React Re-render
                setHeroes([...heroes]);
                setEnemies([...enemies]);

                // Anticipation Delay (Flare filling up)
                await new Promise(r => setTimeout(r, 450));

                unit.isCharging = false;
                unit.activeSigil = null;
                setHeroes([...heroes]);
                setEnemies([...enemies]);
            };

            useEffect(() => {
                if (!isPaused && heroes.length > 0 && enemies.length > 0) {
                    // Battle Start Auras
                    const heroIronAura = heroes.some(h => h.trait?.id === 'iron_aura' && h.hp > 0);
                    const heroInspire = heroes.some(h => h.trait?.id === 'inspire' && h.hp > 0);
                    if (heroIronAura) log("🛡️ Aura of Iron protects the heroes!");
                    if (heroInspire) log("🎺 Inspire bolsters hero speed!");
                }
            }, []);

            useEffect(() => {
                if (isPaused) return;
                let lastTime = performance.now();
                const timerId = setInterval(() => {
                    const now = performance.now();
                    const dt = Math.min((now - lastTime) / 1000, 0.1);
                    lastTime = now;
                    setHeroes(prev => {
                        const next = [...prev];
                    const heroInspire = next.some(h => h.trait?.id === 'inspire' && h.hp > 0);
                    const enemyInspire = enemies.some(e => e.trait?.id === 'inspire' && e.hp > 0);

                    next.forEach(h => { if (h.hp > 0 && !h.isActing) h.updateAtb(dt, heroInspire ? 1.05 : 1.0); });
                    return next;
                });
                setEnemies(prev => {
                    const next = [...prev];
                    const heroInspire = heroes.some(h => h.trait?.id === 'inspire' && h.hp > 0);
                    const enemyInspire = next.some(e => e.trait?.id === 'inspire' && e.hp > 0);

                    next.forEach(e => { if (e.hp > 0 && !e.isActing) e.updateAtb(dt, enemyInspire ? 1.05 : 1.0); });
                    return next;
                });
                }, 16);
                return () => clearInterval(timerId);
            }, [isPaused]);

            const heroesRef = useRef(heroes);
            const enemiesRef = useRef(enemies);
            useEffect(() => {
                heroesRef.current = heroes;
                enemiesRef.current = enemies;
            }, [heroes, enemies]);

            useEffect(() => {
                if (isPaused) return;
                const tick = setInterval(() => {
                    const currentHeroes = heroesRef.current;
                    const currentEnemies = enemiesRef.current;
                    const readyHero = currentHeroes.find(h => h.atb >= 100 && !h.isActing && h.hp > 0);
                    if (readyHero) executeTurn(readyHero, true);
                    const readyEnemy = currentEnemies.find(e => e.atb >= 100 && !e.isActing && e.hp > 0);
                    if (readyEnemy) executeTurn(readyEnemy, false);
                }, 100);
                return () => clearInterval(tick);
            }, [isPaused]);

            const executeTurn = async (unit, isHero) => {
                unit.isActing = true;
                unit.atb = 0;
                let target;
                let selectedAbility;

                if (unit.role === 'HEALER') {
                    const lowAlly = [...(isHero ? heroes : enemies)].sort((a,b) => (a.hp/a.maxHp) - (b.hp/b.maxHp))[0];
                    if (lowAlly && (lowAlly.hp / lowAlly.maxHp) < 0.7) {
                        target = lowAlly;
                        selectedAbility = unit.abilities.find(a => a.type === 'heal') || unit.abilities[0];
                    }
                }

                if (!target) {
                    const foes = isHero ? enemies : heroes;
                    const livingFoes = foes.filter(u => u.hp > 0);
                    if (livingFoes.length === 0) return;

                    const vanguardFoes = livingFoes.filter(u => u.positionLine === 'VANGUARD');
                    const isInfiltrator = unit.trait?.id === 'infiltrator';
                    const targetPool = (vanguardFoes.length > 0 && !isInfiltrator) ? vanguardFoes : livingFoes;

                    target = targetPool[Math.floor(Math.random() * targetPool.length)];
                    const damageAbilities = unit.abilities.filter(a => a.type === 'damage');
                    selectedAbility = damageAbilities.length > 0 ? damageAbilities[Math.floor(Math.random() * damageAbilities.length)] : unit.abilities[0];
                }

                // PHASE 1: Anticipation (Flare & Sigil)
                await handleAbilityProc(unit, selectedAbility);

                unit.lastAction = selectedAbility.name;
                unit.attackPhase = 'advance';
                log(`${unit.name} casts ${selectedAbility.name}`);
                setHeroes([...heroes]);
                setEnemies([...enemies]);
                spawnProjectile(unit, target, selectedAbility);

                setTimeout(() => {
                    unit.attackPhase = 'strike';
                    unit.isPopping = true;
                    target.impactPulse = true;
                    
                    if (selectedAbility.type === 'damage') {
                        setBoardShake(true);
                        setTimeout(() => setBoardShake(false), 400);
                    }

                    setHeroes([...heroes]);
                    setEnemies([...enemies]);

                    if (selectedAbility.type === 'heal') {
                        // Elara: Moonlight Rain (25% chance to heal party)
                        const isMoonlightRain = unit.trait?.id === 'moonlight_rain' && Math.random() < 0.25;
                        const targetsToHeal = isMoonlightRain ? (isHero ? heroes : enemies).filter(p => p.hp > 0) : [target];

                        if (isMoonlightRain) {
                            unit.traitGlow = true;
                            log(`🌙 Moonlight Rain triggers!`);
                            unit.addVfx("Moonlight Rain!", "heal");
                            setTimeout(() => {
                                unit.traitGlow = false;
                                setHeroes([...heroes]);
                                setEnemies([...enemies]);
                            }, 1200);
                        }

                        targetsToHeal.forEach(t => {
                            let amount = selectedAbility.val;
                            // Morgra: Blood Pact (+40% power)
                            if (unit.trait?.id === 'blood_pact') {
                                amount = Math.floor(amount * 1.4);
                            }
                            
                            t.hp = Math.min(t.maxHp, t.hp + amount);
                            t.addVfx(`+${amount}`, 'heal');
                            t.healSparkle = true;
                            setTimeout(() => {
                                t.healSparkle = false;
                                setHeroes([...heroes]);
                                setEnemies([...enemies]);
                            }, 450);
                        });

                        // Pay the blood price if Morgra
                        if (unit.trait?.id === 'blood_pact') {
                            unit.traitGlow = true;
                            unit.hp = Math.max(1, unit.hp - 5);
                            unit.addVfx(`BLOOD PACT -5`, 'damage');
                            setTimeout(() => {
                                unit.traitGlow = false;
                                setHeroes([...heroes]);
                                setEnemies([...enemies]);
                            }, 800);
                        }
                    } else {
                        let amount = selectedAbility.val;

                        // --- OFFENSIVE TRAITS ---
                        // Leora: Eagle Eye (50% DEF ignore)
                        const ignoreDef = unit.trait?.id === 'eagle_eye' ? 0.5 : 0;
                        const effectiveDef = Math.floor(target.getDEF() * (1 - ignoreDef));

                        // Defense logic integration
                        amount = Math.max(1, amount - Math.floor(effectiveDef / 2));

                        // Kael: Steady Aim (+25% damage to REARGUARD)
                        if (unit.trait?.id === 'steady_aim' && target.positionLine === 'REARGUARD') {
                            amount = Math.floor(amount * 1.25);
                        }

                        // Rearguard Protection: 25% damage mitigation
                        if (target.positionLine === 'REARGUARD') amount = Math.floor(amount * 0.75);

                        // --- DEFENSIVE TRAITS ---
                        // Valerius: Aura of Iron (10% global reduction)
                        const party = isHero ? heroes : enemies;
                        const auraActive = party.some(p => p.trait?.id === 'iron_aura' && p.hp > 0);
                        if (auraActive && target.isHero === isHero) { 
                            amount = Math.floor(amount * 0.9);
                        }

                        target.hp = Math.max(0, target.hp - amount);

                        // Grimm: Undying (Revive once per combat)
                        if (target.hp <= 0 && target.trait?.id === 'undying' && !target.hasRevived) {
                            target.hp = 1;
                            target.hasRevived = true;
                            target.traitGlow = true;
                            target.addVfx(`UNDYING!`, 'heal');
                            log(`🛡️ ${target.name} refuses to fall!`);
                            setTimeout(() => target.traitGlow = false, 1500);
                        }

                        target.addVfx(`-${amount}`, 'damage');
                        target.hitShake = true;
                        target.showImpact = true;
                        setTimeout(() => {
                            target.hitShake = false;
                            target.showImpact = false;
                            setHeroes([...heroes]);
                            setEnemies([...enemies]);
                        }, 320);

                        // --- ON-HIT TRAITS ---
                        // Borum: Sunder (DEF Reduction)
                        if (unit.trait?.id === 'sunder' && amount > 0) {
                            target.def = Math.max(0, target.def - 5);
                            target.addVfx(`DEF Down`, 'damage');
                        }

                        // Vex: Soul Reaper (HP for kill)
                        if (target.hp <= 0 && unit.trait?.id === 'soul_reaper') {
                            unit.hp = Math.min(unit.maxHp, unit.hp + 10);
                            unit.traitGlow = true;
                            unit.addVfx(`SOUL REAP +10`, 'heal');
                            log(`🧛 ${unit.name} reaps a soul!`);
                            setTimeout(() => unit.traitGlow = false, 1000);
                        }

                        // --- PASSIVES INTEGRATION ---
                        const unitPassives = unit.getPassives();
                        const targetPassives = target.getPassives();

                        // LIFESTEAL (Hero/Enemy Attacker)
                        if (unitPassives.includes('lifesteal')) {
                            const healAmount = Math.floor(amount * 0.2);
                            unit.hp = Math.min(unit.maxHp, unit.hp + healAmount);
                            unit.addVfx(`+${healAmount}`, 'heal');
                            log(`🩸 ${unit.name} siphons ${healAmount} HP!`);
                        }

                        // THORNS (Target Reflects)
                        if (targetPassives.includes('thorns') && amount > 0) {
                            const reflectDmg = 5;
                            unit.hp = Math.max(0, unit.hp - reflectDmg);
                            unit.addVfx(`-${reflectDmg}`, 'damage');
                            log(`🌵 Thorns deals ${reflectDmg} damage to ${unit.name}!`);
                        }

                        // Draka: Dragon Scales (Reflect 6)
                        if (target.trait?.id === 'dragon_scales' && amount > 0) {
                            const reflectDmg = 6;
                            unit.hp = Math.max(0, unit.hp - reflectDmg);
                            unit.addVfx(`-${reflectDmg}`, 'damage');
                            log(`🐲 Scales reflect ${reflectDmg} to ${unit.name}!`);
                        }
                    }

                    setTimeout(() => {
                        target.impactPulse = false;
                        unit.attackPhase = 'return';
                        setHeroes([...heroes]);
                        setEnemies([...enemies]);
                    }, 120);

                    setTimeout(() => {
                        // QUICKENING (Post-turn ATB)
                        unit.isActing = false;
                        unit.isPopping = false;
                        unit.attackPhase = 'idle';
                        target.impactPulse = false;
                        target.hitShake = false;
                        target.showImpact = false;
                        target.healSparkle = false;
                        const unitPassivesFinal = unit.getPassives();
                        if (unitPassivesFinal.includes('quickening') && Math.random() < 0.15) {
                            unit.atb = 50;
                            log(`⚡ ${unit.name} found an opening! (+50% ATB)`);
                        }

                        // Krix: Overclock (Turn reset)
                        if (unit.trait?.id === 'overclock' && Math.random() < 0.15) {
                            unit.atb = 100;
                            unit.traitGlow = true;
                            log(`⚡ ${unit.name} is OVERCLOCKED!`);
                            unit.addVfx("OVERCLOCK!", "damage");
                            setTimeout(() => {
                                unit.traitGlow = false;
                                setHeroes([...heroes]);
                                setEnemies([...enemies]);
                            }, 1000);
                        }

                        setHeroes([...heroes]);
                        setEnemies([...enemies]);

                        const aliveHeroes = heroes.filter(h => h.hp > 0).length;
                        const aliveEnemies = enemies.filter(e => e.hp > 0).length;
                        if (aliveHeroes === 0) {
                            setIsPaused(true);
                            setWinner('DEFEAT');
                            log("⚠️ MISSION TERMINATED.");
                        } else if (aliveEnemies === 0) {
                            setIsPaused(true);
                            setWinner('VICTORY');
                            log("✅ THREAT ELIMINATED.");
                        }
                    }, 260);
                }, 340);
            };

            const handlePlayClick = () => {
                if (!hasStarted) setHasStarted(true);
                setIsPaused(!isPaused);
            };

            return (
                <div className={`h-screen w-screen bg-neutral-950 text-white flex flex-col items-center relative animate-in fade-in duration-500 overflow-hidden ${boardShake ? 'animate-board-shake' : ''}`}>
                    <svg className="absolute inset-0 z-40 pointer-events-none overflow-visible">
                        <defs>
                            <radialGradient id="fireballGradient" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stopColor="#fef9c3" />
                                <stop offset="45%" stopColor="#fb923c" />
                                <stop offset="100%" stopColor="#dc2626" />
                            </radialGradient>
                        </defs>
                        {projectiles.map((p) => (
                            <g key={p.id}>
                                {p.type === 'curve' && (
                                    <>
                                        <path
                                            d={p.path}
                                            className="spell-arc-trail"
                                            style={{ stroke: p.style.lineColor, strokeWidth: p.style.width }}
                                        />
                                        <path
                                            d={p.path}
                                            className="spell-arc-trail-soft"
                                            style={{ stroke: p.style.glowColor, strokeWidth: p.style.width + 3 }}
                                        />
                                    </>
                                )}
                                {p.type === 'straight' && (
                                    <path
                                        d={p.path}
                                        className="straight-arc-trail"
                                        style={{ stroke: p.style.lineColor, strokeWidth: p.style.width }}
                                    />
                                )}
                                <circle
                                    r={p.type === 'straight' ? 5 : 8}
                                    className={p.type === 'straight' ? 'arrow-projectile-core' : 'spell-projectile-core'}
                                    style={{
                                        fill: p.style.effect === 'fireball' ? 'url(#fireballGradient)' : p.style.coreColor,
                                        filter: `drop-shadow(0 0 9px ${p.style.glowColor})`
                                    }}
                                >
                                    <animateMotion dur={p.type === 'straight' ? '340ms' : '500ms'} path={p.path} fill="freeze" />
                                </circle>
                                {p.style.effect === 'fireball' && (
                                    <>
                                        <circle r="13" className="fireball-aura">
                                            <animateMotion dur="500ms" path={p.path} fill="freeze" />
                                        </circle>
                                        <circle r="3" className="fireball-ember ember-1">
                                            <animateMotion dur="500ms" path={p.path} fill="freeze" />
                                        </circle>
                                        <circle r="2.5" className="fireball-ember ember-2">
                                            <animateMotion dur="500ms" path={p.path} fill="freeze" />
                                        </circle>
                                        <circle r="2" className="fireball-ember ember-3">
                                            <animateMotion dur="500ms" path={p.path} fill="freeze" />
                                        </circle>
                                    </>
                                )}
                                <polygon
                                    points="-20,-6 14,0 -20,6"
                                    className="arrow-head"
                                    style={{ fill: p.style.lineColor, filter: `drop-shadow(0 0 6px ${p.style.glowColor})` }}
                                >
                                    <animateMotion dur={p.type === 'straight' ? '340ms' : '500ms'} path={p.path} rotate="auto" fill="freeze" />
                                </polygon>
                            </g>
                        ))}
                        {slashBursts.map((s) => (
                            <g key={s.id} transform={`translate(${s.x} ${s.y}) rotate(${s.angle})`} className="sword-slash-burst">
                                <path d="M -44 -9 Q 0 -22 46 -8" className="sword-slash-main" />
                                <path d="M -35 4 Q 2 -6 34 6" className="sword-slash-echo" />
                            </g>
                        ))}
                    </svg>
                    <main className="relative z-10 flex-1 flex flex-row items-center justify-between w-full max-w-[1400px] px-6 py-4 overflow-hidden mx-auto gap-8">


                        {/* LEFT SIDE: ENEMIES */}
                        <div className="flex-1 flex justify-end">
                            {/* Enemy Rearguard (Far left) */}
                            <div className="flex flex-col gap-4 opacity-90 scale-95 origin-right translate-x-6 z-10 justify-center">
                                {enemies.filter(e => e.positionLine === 'REARGUARD').map(unit => <Card key={unit.id} unit={unit} />)}
                            </div>
                            {/* Enemy Vanguard (Inner left) */}
                            <div className="flex flex-col gap-4 z-20 justify-center min-w-[170px]">
                                {enemies.filter(e => e.positionLine === 'VANGUARD').map(unit => <Card key={unit.id} unit={unit} />)}
                            </div>
                        </div>

                        {/* ENGAGEMENT DIVIDER (Vertical) */}
                        <div className="relative h-full max-h-96 w-px bg-gradient-to-b from-transparent via-zinc-700 to-transparent flex flex-col items-center justify-center shrink-0">
                            <div className="absolute top-1/2 -translate-y-1/2 bg-neutral-950 border border-red-800/50 py-4 px-1 text-[7px] uppercase tracking-widest font-black text-red-500 whitespace-nowrap shadow-[0_0_15px_rgba(220,38,38,0.2)]" style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)' }}>
                                COMBAT ENGAGED
                            </div>
                        </div>

                        {/* RIGHT SIDE: HEROES */}
                        <div className="flex-1 flex justify-start">
                            {/* Hero Vanguard (Inner right) */}
                            <div className="flex flex-col gap-4 z-20 justify-center min-w-[170px]">
                                {heroes.filter(h => h.positionLine === 'VANGUARD').map(unit => <Card key={unit.id} unit={unit} />)}
                            </div>
                            {/* Hero Rearguard (Far right) */}
                            <div className="flex flex-col gap-4 opacity-90 scale-95 origin-left -translate-x-6 z-10 justify-center">
                                {heroes.filter(h => h.positionLine === 'REARGUARD').map(unit => <Card key={unit.id} unit={unit} />)}
                            </div>
                        </div>
                    </main>

                    <section className="relative z-20 w-full bg-neutral-900/95 border-t border-zinc-800/80 shadow-[0_-6px_20px_rgba(0,0,0,0.7)] px-4 py-2 flex items-end justify-between min-h-[72px] gap-3">
                        <div className="flex-1 flex items-end">
                            <div className={`transition-all duration-300 ease-out bg-black/60 shadow-inner border border-zinc-800/60 rounded ${isLogExpanded ? 'w-full max-w-md p-2 h-24' : 'w-auto p-1.5 h-8'} overflow-hidden`}>
                                <button
                                    onClick={() => setIsLogExpanded(prev => !prev)}
                                    className="text-[9px] uppercase font-black text-zinc-300 tracking-widest border border-zinc-700/80 bg-zinc-900/80 px-2 py-0.5 rounded hover:text-white hover:border-zinc-500 transition-colors"
                                >
                                    {isLogExpanded ? 'Log ▾' : 'Log ▸'}
                                </button>
                                {isLogExpanded && (
                                    <div className="mt-2 space-y-1 pr-1">
                                        {battleLog.map((log, i) => (
                                            <div key={i} className={`text-[10px] font-mono leading-tight truncate ${i === 0 ? 'text-yellow-400' : 'text-zinc-500 opacity-70'}`}>
                                                {`> ${log}`}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="flex flex-col items-center flex-shrink-0">
                            <button
                                onClick={handlePlayClick}
                                className={`w-11 h-11 rounded-full flex items-center justify-center text-lg shadow-lg border-2 transition-all active:scale-95
                                    ${isPaused ? 'bg-emerald-600 border-emerald-400 hover:bg-emerald-500 text-white' : 'bg-rose-700 border-rose-500 hover:bg-rose-600 text-white'}`}
                            >
                                {isPaused ? "▶" : "⏸"}
                            </button>
                            <span className={`mt-1 text-[8px] font-black uppercase tracking-widest ${isPaused ? 'text-emerald-400' : 'text-rose-500'}`}>
                                {!hasStarted ? "Initialize" : isPaused ? "Paused" : "Running"}
                            </span>
                        </div>

                        <div className="flex-1 flex flex-col items-end justify-center ml-2 hidden sm:flex">
                            <div className="text-sm md:text-lg font-black text-red-500 italic tracking-tight">BATTLE PHASE</div>
                            <div className="text-[7px] md:text-[8px] text-zinc-600 uppercase tracking-widest font-bold">Tactical Deployment</div>
                        </div>
                    </section>

                    {winner && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-xl animate-in fade-in duration-500">
                            <h1 className={`text-6xl md:text-8xl font-black tracking-tighter italic uppercase mb-4
                                ${winner === 'VICTORY' ? 'text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,0.5)]' : 'text-red-600 drop-shadow-[0_0_30px_rgba(220,38,38,0.5)]'}`}>
                                {winner}
                            </h1>
                            <p className="text-zinc-400 tracking-[0.4em] uppercase font-bold text-sm mb-12">
                                {winner === 'VICTORY' ? "Threat eliminated. Returning to sector navigation." : "The syndicate has fallen."}
                            </p>
                            <button
                                onClick={() => onBattleEnd(winner)}
                                className="px-8 py-3 outline outline-2 outline-white text-white font-black tracking-widest hover:bg-white hover:text-black transition-colors"
                            >
                                {winner === 'VICTORY' ? "CONTINUE EXPLORATION" : "ABORT EXPEDITION"}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- EXPLORATION PHASE COMPONENT ---
        const ExplorationPhase = ({ floor, heroes, enemies, setEnemies, onEncounter, onNextFloor, onPrevFloor, onTrap, onHeal, openInventory }) => {
            const GRID_SIZE = 7;

            // 1 = Walkable Path, 0 = Void/Wall
            const proceduralGenerateLayout = (size) => {
                let layout = Array(size).fill().map(() => Array(size).fill(0));
                let validTiles = [];

                // Spawn point
                layout[3][3] = 1;

                // Randomly generate 2 distinct rooms
                for (let r=0; r<2; r++) {
                    const rx = Math.floor(Math.random() * 4) + 1; // 1 to 4
                    const ry = Math.floor(Math.random() * 4) + 1; // 1 to 4
                    for(let y = ry; y < ry + 2; y++) {
                        for(let x = rx; x < rx + 3; x++) {
                            layout[y][x] = 1; // 3x2 rooms
                        }
                    }
                }

                // Primary structural cross (guarantees everything connects to center Spawn)
                for(let i=1; i<=5; i++) {
                    layout[3][i] = 1;
                    layout[i][3] = 1;
                }

                // Extra chaos paths
                for(let i=0; i<6; i++) {
                    const cx = Math.floor(Math.random() * 5) + 1;
                    const cy = Math.floor(Math.random() * 5) + 1;
                    layout[cy][cx] = 1;
                    if(Math.random() > 0.5) layout[cy][cx+1] = 1;
                    else layout[cy+1][cx] = 1;
                }

                // Strict Outer Walls
                for(let i=0; i<size; i++) {
                    layout[0][i] = 0; layout[6][i] = 0;
                    layout[i][0] = 0; layout[i][6] = 0;
                }

                // Catalog walkable non-spawn tiles
                for(let y = 1; y < size-1; y++) {
                    for(let x = 1; x < size-1; x++) {
                        if (layout[y][x] === 1 && !(x===3 && y===3)) {
                            validTiles.push({x, y});
                        }
                    }
                }

                validTiles.sort(() => Math.random() - 0.5); // Shuffle
                return { layout, validTiles };
            };

            const [DUNGEON_LAYOUT, setDungeonLayout] = useState(Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0)));
            const [tileBgs, setTileBgs] = useState({}); // Mapping of 'x,y' to background ID
            const [playerPos, setPlayerPos] = useState({ x: 3, y: 3 });
            const [exploredCells, setExploredCells] = useState(new Set(['3,3']));
            const [revealingCells, setRevealingCells] = useState(new Set());
            const [interactables, setInteractables] = useState([]);
            const mapFrameRef = useRef(null);
            const [frameSize, setFrameSize] = useState({ w: 0, h: 0 });
            const [viewportSize, setViewportSize] = useState({
                w: typeof window !== 'undefined' ? window.innerWidth : 1440,
                h: typeof window !== 'undefined' ? window.innerHeight : 900
            });

            useEffect(() => {
                const onResize = () => setViewportSize({ w: window.innerWidth, h: window.innerHeight });
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);

            useEffect(() => {
                if (!mapFrameRef.current || typeof ResizeObserver === 'undefined') return;
                const observer = new ResizeObserver((entries) => {
                    const entry = entries[0];
                    if (entry?.contentRect) {
                        setFrameSize({ w: entry.contentRect.width, h: entry.contentRect.height });
                    }
                });
                observer.observe(mapFrameRef.current);
                return () => observer.disconnect();
            }, []);

            useEffect(() => {
                const { layout, validTiles } = proceduralGenerateLayout(GRID_SIZE);
                setDungeonLayout(layout);
                setPlayerPos({ x: 3, y: 3 });
                setExploredCells(new Set(['3,3']));
                setRevealingCells(new Set());

                const getLoc = () => validTiles.length > 0 ? validTiles.pop() : {x:3, y:3};

                if (floor === 1) {
                    setInteractables([
                        { id: 't1', ...getLoc(), type: 'TRAP' },
                        { id: 'c1', ...getLoc(), type: 'CHEST' },
                        { id: 's1', ...getLoc(), type: 'STAIRS' }
                    ]);
                } else if (floor >= 2) {
                    setInteractables([
                        { id: 't2', ...getLoc(), type: 'TRAP' },
                        { id: 'c2', ...getLoc(), type: 'CHEST' },
                        { id: 's2', ...getLoc(), type: 'STAIRS' },
                        { id: 'p2', x: 3, y: 3, type: 'PREV_FLOOR' }
                    ]);
                }

                // Generate random backgrounds for each tile positions
                const backgrounds = {};
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        backgrounds[`${x},${y}`] = Math.floor(Math.random() * 5);
                    }
                }
                setTileBgs(backgrounds);

                // Route enemies onto randomized valid paths
                setEnemies(prev => prev.map(e => ({ ...e, ...getLoc() })));
            }, [floor]);


            // Handle Keyboard Movement
            useEffect(() => {
                const handleKeyDown = (e) => {
                    let dx = 0; let dy = 0;
                    if (e.key === 'ArrowUp' || e.key === 'w') dy = -1;
                    if (e.key === 'ArrowDown' || e.key === 's') dy = 1;
                    if (e.key === 'ArrowLeft' || e.key === 'a') dx = -1;
                    if (e.key === 'ArrowRight' || e.key === 'd') dx = 1;

                    if (dx !== 0 || dy !== 0) {
                        movePlayer(dx, dy);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [playerPos, enemies]);

            const movePlayer = (dx, dy) => {
                const newX = playerPos.x + dx;
                const newY = playerPos.y + dy;

                // Bounds & Wall Collision Check
                if (newX < 0 || newX >= GRID_SIZE || newY < 0 || newY >= GRID_SIZE) return;
                if (DUNGEON_LAYOUT[newY][newX] === 0) return;

                setPlayerPos({ x: newX, y: newY });

                // Update Fog of War
                setExploredCells(prev => {
                    const cellKey = `${newX},${newY}`;
                    if (!prev.has(cellKey)) {
                        setRevealingCells(revealPrev => {
                            const nextReveal = new Set(revealPrev);
                            nextReveal.add(cellKey);
                            return nextReveal;
                        });
                    }
                    const next = new Set(prev);
                    next.add(cellKey);
                    return next;
                });

                // Check Interactables
                const interactable = interactables.find(i => i.x === newX && i.y === newY);
                if (interactable) {
                    if (interactable.type === 'CHEST') {
                        onHeal();
                        setInteractables(prev => prev.filter(i => i.id !== interactable.id));
                    } else if (interactable.type === 'TRAP') {
                        onTrap();
                        setInteractables(prev => prev.filter(i => i.id !== interactable.id));
                    } else if (interactable.type === 'STAIRS') {
                        if (floor >= 2) {
                            onWin();
                        } else {
                            onNextFloor();
                        }
                        return; // Halt enemy move on floor transition
                    } else if (interactable.type === 'PREV_FLOOR') {
                        onPrevFloor();
                        return;
                    }
                }

                moveEnemies(newX, newY);
            };

            const moveEnemies = (newPlayerX, newPlayerY) => {
                const updatedEnemies = enemies.map(e => {
                    const moveDir = Math.floor(Math.random() * 5); // 0=none, 1=up, 2=down, 3=left, 4=right
                    let nextX = e.x; let nextY = e.y;

                    if (moveDir === 1 && e.y > 0 && DUNGEON_LAYOUT[e.y-1][e.x] === 1) nextY--;
                    else if (moveDir === 2 && e.y < GRID_SIZE - 1 && DUNGEON_LAYOUT[e.y+1][e.x] === 1) nextY++;
                    else if (moveDir === 3 && e.x > 0 && DUNGEON_LAYOUT[e.y][e.x-1] === 1) nextX--;
                    else if (moveDir === 4 && e.x < GRID_SIZE - 1 && DUNGEON_LAYOUT[e.y][e.x+1] === 1) nextX++;

                    return { ...e, x: nextX, y: nextY };
                });

                setEnemies(updatedEnemies);

                // Collision Check!
                const collidedEnemy = updatedEnemies.find(e => e.x === newPlayerX && e.y === newPlayerY);
                if (collidedEnemy) {
                    onEncounter(collidedEnemy);
                }
            };

            const cells = [];
            const TILE_GAP = 4;
            const tileSize = Math.min(Math.max(Math.min(viewportSize.w, viewportSize.h) * 0.25, 120), viewportSize.w * 0.28);
            const mapPixelSize = (GRID_SIZE * tileSize) + ((GRID_SIZE - 1) * TILE_GAP);
            const centerOffset = (axis, frameAxisSize) => {
                const targetCenter = (axis * (tileSize + TILE_GAP)) + (tileSize / 2);
                const unclamped = (frameAxisSize / 2) - targetCenter;
                const minOffset = frameAxisSize - mapPixelSize;
                return Math.min(0, Math.max(minOffset, unclamped));
            };
            const offsetX = centerOffset(playerPos.x, frameSize.w);
            const offsetY = centerOffset(playerPos.y, frameSize.h);

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cellKey = `${x},${y}`;
                    const isPlayer = playerPos.x === x && playerPos.y === y;
                    const enemy = enemies.find(e => e.x === x && e.y === y);
                    const intObj = interactables.find(i => i.x === x && i.y === y);

                    const isWall = DUNGEON_LAYOUT[y][x] === 0;
                    const isExplored = exploredCells.has(cellKey);

                    // Scouting Logic: Hidden traversable tiles adjacent to explored ones
                    const neighbors = [
                        {ux: x, uy: y-1}, {ux: x, uy: y+1}, {ux: x-1, uy: y}, {ux: x+1, uy: y}
                    ];
                    const isScouted = !isExplored && !isWall && neighbors.some(n =>
                        n.ux >= 0 && n.ux < GRID_SIZE && n.uy >= 0 && n.uy < GRID_SIZE &&
                        exploredCells.has(`${n.ux},${n.uy}`)
                    );

                    // Doorway Logic
                    const hasDoorN = y > 0 && DUNGEON_LAYOUT[y-1][x] === 1;
                    const hasDoorS = y < GRID_SIZE - 1 && DUNGEON_LAYOUT[y+1][x] === 1;
                    const hasDoorW = x > 0 && DUNGEON_LAYOUT[y][x-1] === 1;
                    const hasDoorE = x < GRID_SIZE - 1 && DUNGEON_LAYOUT[y][x+1] === 1;

                    const renderEdge = (direction, hasDoor) => {
                        const baseColor = isScouted ? "bg-zinc-800/40" : "bg-zinc-800";
                        if (direction === 'N') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute top-0 left-0 w-[20%] h-[2px] ${baseColor}`} /><div className={`absolute top-0 right-0 w-[20%] h-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute top-0 left-0 right-0 h-[2px] ${baseColor}`} />;
                        }
                        if (direction === 'S') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute bottom-0 left-0 w-[20%] h-[2px] ${baseColor}`} /><div className={`absolute bottom-0 right-0 w-[20%] h-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute bottom-0 left-0 right-0 h-[2px] ${baseColor}`} />;
                        }
                        if (direction === 'W') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute top-0 left-0 h-[20%] w-[2px] ${baseColor}`} /><div className={`absolute bottom-0 left-0 h-[20%] w-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute top-0 bottom-0 left-0 w-[2px] ${baseColor}`} />;
                        }
                        if (direction === 'E') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute top-0 right-0 h-[20%] w-[2px] ${baseColor}`} /><div className={`absolute bottom-0 right-0 h-[20%] w-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute top-0 bottom-0 right-0 w-[2px] ${baseColor}`} />;
                        }
                        return null;
                    };

                    const isStart = x === 3 && y === 3 && floor === 1;
                    const showTile = isExplored || isScouted;
                    const showEntity = isExplored;
                    const isScoutedOnly = isScouted && !isExplored;

                    // Proximity check for torchlight spill (Refined: Cardinal only, connected doors only)
                    const dx = Math.abs(x - playerPos.x);
                    const dy = Math.abs(y - playerPos.y);
                    const isManhattanAdjacent = (dx === 1 && dy === 0) || (dx === 0 && dy === 1);
                    const hasTorchSpill = isExplored && isManhattanAdjacent && DUNGEON_LAYOUT[y][x] === 1;

                    const bgTypes = ['stone', 'moss', 'ruins', 'bone', 'shadow'];
                    // Mystery rooms logic: uses 'unknown' asset if scouted but not explored
                    const tileBg = isExplored ? bgTypes[tileBgs[cellKey] || 0] : 'unknown';

                    cells.push(
                        <div
                            key={`${x}-${y}`}
                            style={{ 
                                width: `${tileSize}px`, 
                                height: `${tileSize}px`,
                                backgroundImage: showTile ? `url('assets/tile_${tileBg}.png')` : 'none',
                                backgroundSize: 'cover'
                            }}
                            onAnimationEnd={() => {
                                if (!revealingCells.has(cellKey)) return;
                                setRevealingCells(prev => {
                                    const next = new Set(prev);
                                    next.delete(cellKey);
                                    return next;
                                });
                            }}
                            className={`flex items-center justify-center relative transition-all duration-500
                            ${!showTile ? 'bg-transparent border-transparent opacity-0 scale-90' : 'bg-zinc-900 shadow-[inset_0_2px_15px_rgba(0,0,0,0.5)]'}
                            ${isExplored ? 'before:absolute before:inset-0 before:bg-black/20 before:pointer-events-none' : ''}
                            ${isScoutedOnly ? 'before:absolute before:inset-0 before:bg-black/70 before:pointer-events-none' : ''}
                            ${hasTorchSpill ? 'after:absolute after:inset-0 after:z-10 after:pointer-events-none after:animate-torch-spill' : ''}
                            ${isExplored && revealingCells.has(cellKey) ? 'animate-tile-reveal' : ''}
                            ${isScouted ? 'ring-1 ring-zinc-600/30' : ''}
                        `}
                        >
                            {/* Render Physical Walls & Doorways */}
                            {showTile && renderEdge('N', hasDoorN)}
                            {showTile && renderEdge('S', hasDoorS)}
                            {showTile && renderEdge('E', hasDoorE)}
                            {showTile && renderEdge('W', hasDoorW)}
                            {/* Path Decoration */}
                            {showTile && <span className="absolute top-1 left-1 text-[8px] text-zinc-700 pointer-events-none">{x},{y}</span>}
                            {showTile && (x+y)%2===0 && <div className="absolute inset-0 bg-white opacity-[0.02]" />}

                            {/* Scout Indicator */}
                            {isScouted && <span className="text-zinc-500 font-black text-2xl select-none opacity-60 drop-shadow-[0_2px_3px_rgba(0,0,0,0.88)]">?</span>}

                            {/* Interactables (Only shown if explored) */}
                            {showEntity && showTile && intObj && (
                                <div className={`w-[5vh] h-[5vh] rounded shrink-0 shadow-lg flex items-center justify-center text-[3vh] z-30 ${intObj.type === 'CHEST' ? 'bg-amber-600' : intObj.type === 'TRAP' ? 'bg-zinc-700 text-red-500 font-black rotate-45' : intObj.type === 'PREV_FLOOR' ? 'bg-indigo-900 border-2 border-purple-400 animate-pulse shadow-[0_0_18px_rgba(168,85,247,0.65)]' : 'bg-blue-800 border-2 border-cyan-300 animate-pulse shadow-[0_0_18px_rgba(34,211,238,0.65)]'}`}>
                                    {intObj.type === 'CHEST' ? '🎁' : intObj.type === 'TRAP' ? 'X' : intObj.type === 'PREV_FLOOR' ? '↓' : '↑'}
                                </div>
                            )}

                            {/* Enemy Rendering (Fog check!) */}
                            {enemy && showEntity && showTile && (
                                <div className="w-[6vh] h-[6vh] rounded-full border-[3px] border-red-500 overflow-hidden shadow-[0_0_15px_rgba(239,68,68,0.5)] z-10 animate-pulse relative">
                                    <img src={`assets/${enemy.instances[0].imageId}.png`} className="w-full h-full object-cover" />
                                    {enemy.instances.length > 1 && (
                                        <div className="absolute top-0 right-0 bg-black/80 font-mono text-[1vh] text-white font-black w-[2vh] h-[2vh] flex items-center justify-center -translate-y-1 translate-x-1 outline outline-1 outline-red-500">
                                            {enemy.instances.length}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Player Avatar (Digital Tabletop Style) */}
                            {isPlayer && !isWall && isExplored && (
                                <div className="relative z-20 transition-all duration-200">
                                    {/* High Quality Torch Glow (Refined) */}
                                    <div className="absolute inset-[-150%] rounded-full animate-torch pointer-events-none opacity-80" />
                                    
                                    <div className="relative w-[7vh] h-[7vh] rounded-full border-2 border-blue-400 bg-zinc-900 overflow-hidden shadow-[0_0_25px_rgba(96,165,250,0.6)] transform flex flex-col items-center justify-center gap-[2px]">
                                        {intObj && (intObj.type === 'PREV_FLOOR' || intObj.type === 'STAIRS') && (
                                            <div className={`absolute -top-2 -right-2 w-[2.2vh] h-[2.2vh] min-w-5 min-h-5 rounded-full border border-white text-[1.2vh] font-black flex items-center justify-center z-40 ${intObj.type === 'PREV_FLOOR' ? 'bg-purple-700 text-white' : 'bg-cyan-500 text-black'}`}>
                                                {intObj.type === 'PREV_FLOOR' ? '↓' : '↑'}
                                            </div>
                                        )}
                                        <div className="flex -space-x-2">
                                            {heroes.map((hero, i) => (
                                                <div key={hero.id} className="w-[3vh] h-[3vh] rounded-full border border-black overflow-hidden shadow-inner shrink-0 bg-zinc-800">
                                                    <img src={`assets/${hero.imageId}.png`} className="w-full h-full object-cover" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                }
            }

            return (
                <div className="h-screen w-screen bg-neutral-950 flex flex-col lg:flex-row items-stretch lg:justify-between relative animate-in fade-in duration-500 text-white tracking-widest font-sans overflow-hidden">
                    <section className="w-full lg:w-[60vw] h-screen px-2 py-2 lg:px-3 lg:py-3 flex items-stretch justify-start">
                        <div ref={mapFrameRef} className="w-full h-full bg-zinc-950 p-[1vh] border-4 border-zinc-800 rounded-xl shadow-2xl backdrop-blur-md relative overflow-hidden flex-shrink-0">
                            {/* Fog Vignette Overlay */}
                            <div className="absolute inset-0 bg-radial-vignette opacity-80 pointer-events-none z-10" />

                            <div
                                className="grid relative z-0 transition-transform duration-300 ease-out"
                                style={{
                                    transform: `translate(${offsetX}px, ${offsetY}px)`,
                                    gridTemplateColumns: `repeat(${GRID_SIZE}, ${tileSize}px)`,
                                    gridTemplateRows: `repeat(${GRID_SIZE}, ${tileSize}px)`,
                                    gap: `${TILE_GAP}px`
                                }}
                            >
                                {cells}
                            </div>
                        </div>
                    </section>

                    <aside className="w-full lg:w-[40vw] h-screen bg-black/35 border-t-2 lg:border-t-0 lg:border-l-2 border-zinc-800 px-4 py-4 sm:px-6 lg:px-5 xl:px-6 flex flex-col gap-4 sm:gap-5 lg:gap-6 overflow-y-auto">
                        <div className="font-black italic tracking-widest border border-zinc-800 bg-black/60 px-4 py-2 drop-shadow-xl text-zinc-300 inline-block">
                            FLOOR {floor}
                        </div>

                        <div>
                            <h2 className="text-2xl sm:text-3xl font-black italic text-zinc-300">SECTOR 09 <span className="text-lg sm:text-xl text-zinc-600">DUNGEON GRID</span></h2>
                            <p className="text-xs text-zinc-500 uppercase mt-2">Explore the fog. Locate the <span className="text-blue-400 font-bold px-1">↑ STAIRS ↑</span> to proceed.</p>
                            <p className="text-xs text-zinc-500 uppercase mt-1">Intercept red signatures to engage hostiles.</p>
                        </div>

                        <button onClick={openInventory} className="bg-amber-600 hover:bg-amber-500 text-white font-black px-6 py-3 border-[3px] border-amber-800 shadow-[0_0_15px_rgba(217,119,6,0.6)] flex items-center justify-center gap-2 transition-all">
                            <span className="text-xl">🎒</span> PARTY STASH
                        </button>

                        <div className="bg-zinc-900/75 border-2 border-zinc-700 px-4 py-4 rounded-lg">
                            <p className="text-[11px] font-bold tracking-[0.2em] text-zinc-400 mb-3">MOVEMENT CONTROLS</p>
                            <div className="flex flex-col items-center gap-[1vh]">
                                <button onClick={() => movePlayer(0, -1)} className="w-[6vh] h-[6vh] min-w-12 min-h-12 bg-zinc-800 border-2 border-zinc-600 active:bg-zinc-700 text-white font-black text-xl rounded">↑</button>
                                <div className="flex gap-[1vh]">
                                    <button onClick={() => movePlayer(-1, 0)} className="w-[6vh] h-[6vh] min-w-12 min-h-12 bg-zinc-800 border-2 border-zinc-600 active:bg-zinc-700 text-white font-black text-xl rounded">←</button>
                                    <button onClick={() => movePlayer(0, 1)} className="w-[6vh] h-[6vh] min-w-12 min-h-12 bg-zinc-800 border-2 border-zinc-600 active:bg-zinc-700 text-white font-black text-xl rounded">↓</button>
                                    <button onClick={() => movePlayer(1, 0)} className="w-[6vh] h-[6vh] min-w-12 min-h-12 bg-zinc-800 border-2 border-zinc-600 active:bg-zinc-700 text-white font-black text-xl rounded">→</button>
                                </div>
                            </div>
                        </div>
                    </aside>
