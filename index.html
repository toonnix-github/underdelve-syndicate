                    selectedBackground
                };
            };

            useEffect(() => {
                const onResize = () => setViewportSize({ w: window.innerWidth, h: window.innerHeight });
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);

            useEffect(() => {
                if (!mapFrameRef.current || typeof ResizeObserver === 'undefined') return;
                const observer = new ResizeObserver((entries) => {
                    const entry = entries[0];
                    if (entry?.contentRect) {
                        setFrameSize({ w: entry.contentRect.width, h: entry.contentRect.height });
                    }
                });
                observer.observe(mapFrameRef.current);
                return () => observer.disconnect();
            }, []);

            const MiniMap = () => {
                const miniSize = 80;
                return (
                    <div style={{ width: miniSize, height: miniSize, display: 'grid', gridTemplateColumns: `repeat(${GRID_SIZE}, 1fr)` }} className="bg-black/40 rounded overflow-hidden">
                        {Array(GRID_SIZE * GRID_SIZE).fill().map((_, i) => {
                            const x = i % GRID_SIZE;
                            const y = Math.floor(i / GRID_SIZE);
                            const isExplored = exploredCells.has(`${x},${y}`);
                            const isPlayer = playerPos.x === x && playerPos.y === y;
                            const layoutVal = dungeonLayout[y][x];
                            const int = interactables.find(item => item.x === x && item.y === y);

                            let color = 'bg-transparent';
                            if (isExplored) {
                                color = layoutVal === 1 ? 'bg-zinc-700/60' : 'bg-transparent';
                                if (int) {
                                    if (int.type === 'STAIRS') color = 'bg-emerald-500 shadow-[0_0_8px_#10b981]';
                                    if (int.type === 'TRAP') color = 'bg-rose-600 shadow-[0_0_8px_#e11d48]';
                                    if (int.type === 'CHEST') color = 'bg-amber-500 shadow-[0_0_8px_#f59e0b]';
                                }
                            }
                            return (
                                <div key={i} className={`relative ${color} border-[0.5px] border-zinc-900/40`}>
                                    {isPlayer && <div className="absolute inset-0 bg-cyan-400 animate-pulse rounded-full scale-[2] z-10 shadow-[0_0_10px_#22d3ee]" />}
                                </div>
                            );
                        })}
                    </div>
                );
            };


            // Handle Keyboard Movement
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (actionLocked) return;
                    let dx = 0; let dy = 0;
                    if (e.key === 'ArrowUp' || e.key === 'w') dy = -1;
                    if (e.key === 'ArrowDown' || e.key === 's') dy = 1;
                    if (e.key === 'ArrowLeft' || e.key === 'a') dx = -1;
                    if (e.key === 'ArrowRight' || e.key === 'd') dx = 1;

                    if (dx !== 0 || dy !== 0) {
                        movePlayer(dx, dy);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [actionLocked, playerPos, enemies]);

            const movePlayer = (dx, dy) => {
                if (actionLocked) return;
                const newX = playerPos.x + dx;
                const newY = playerPos.y + dy;

                // Bounds & Wall Collision Check
                if (newX < 0 || newX >= GRID_SIZE || newY < 0 || newY >= GRID_SIZE) return;
                if (dungeonLayout[newY][newX] === 0) return;

                setPlayerPos({ x: newX, y: newY });

                // Update Fog of War
                const cellKey = `${newX},${newY}`;
                if (!exploredCells.has(cellKey)) {
                    setRevealingCells(prev => new Set(prev).add(cellKey));
                    setExploredCells(prev => new Set(prev).add(cellKey));
                }

                // Check for encounters
                const enemyGroup = enemies.find(e => e.x === newX && e.y === newY);
                if (enemyGroup) {
                    onEncounter(enemyGroup);
                    return;
                }

                // Check for interactables
                const int = interactables.find(i => i.x === newX && i.y === newY);
                if (int) {
                    if (int.type === 'TRAP' && int.status === 'ACTIVE') {
                        onTrap(int);
                    } else if (int.type === 'STAIRS') {
                        setStairsPrompt(buildStairsPrompt('DOWN'));
                    } else if (int.type === 'PREV_FLOOR') {
                        setStairsPrompt(buildStairsPrompt('UP'));
                    }
                }
            };

            const handleConfirmDescend = () => {
                if (!stairsPrompt) return;
                const direction = stairsPrompt.direction;
                setStairsPrompt(null);

                if (direction === 'UP') {
                    onPrevFloor();
                    return;
                }

                if (direction === 'DOWN') {
                    if (floor >= 2) {
                        onWin();
                        return;
                    }
                    onNextFloor();
                }
            };

            const handleCancelDescend = () => {
                setStairsPrompt(null);
            };

            const cells = [];
            const TILE_GAP = 4;
            const tileSize = Math.min(Math.max(Math.min(viewportSize.w, viewportSize.h) * 0.25, 120), viewportSize.w * 0.28);
            const mapPixelSize = (GRID_SIZE * tileSize) + ((GRID_SIZE - 1) * TILE_GAP);
            const centerOffset = (axis, frameAxisSize) => {
                const targetCenter = (axis * (tileSize + TILE_GAP)) + (tileSize / 2);
                const unclamped = (frameAxisSize / 2) - targetCenter;
                const minOffset = frameAxisSize - mapPixelSize;
                return Math.min(0, Math.max(minOffset, unclamped));
            };
            const offsetX = centerOffset(playerPos.x, frameSize.w);
            const offsetY = centerOffset(playerPos.y, frameSize.h);

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cellKey = `${x},${y}`;
                    const isPlayer = playerPos.x === x && playerPos.y === y;
                    const enemy = enemies.find(e => e.x === x && e.y === y);
                    const intObj = interactables.find(i => i.x === x && i.y === y);

                    const isWall = dungeonLayout[y][x] === 0;
                    const isExplored = exploredCells.has(cellKey);

                    // Scouting Logic: Radius based on Leader (TICKET-49: Leora Perk)
                    const leader = heroes.find(h => h.isLeader);
                    const scoutRadius = leader?.name === 'Leora' ? 2 : 1;
                    
                    let isScouted = false;
                    if (!isExplored && !isWall) {
                        for (let dy = -scoutRadius; dy <= scoutRadius; dy++) {
                            for (let dx = -scoutRadius; dx <= scoutRadius; dx++) {
                                if (dx === 0 && dy === 0) continue;
                                const nx = x + dx;
                                const ny = y + dy;
                                if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && exploredCells.has(`${nx},${ny}`)) {
                                    isScouted = true;
                                    break;
                                }
                            }
                            if (isScouted) break;
                        }
                    }

                    // Doorway Logic
                    const hasDoorN = y > 0 && dungeonLayout[y-1][x] === 1;
                    const hasDoorS = y < GRID_SIZE - 1 && dungeonLayout[y+1][x] === 1;
                    const hasDoorW = x > 0 && dungeonLayout[y][x-1] === 1;
                    const hasDoorE = x < GRID_SIZE - 1 && dungeonLayout[y][x+1] === 1;

                    const renderEdge = (direction, hasDoor) => {
                        const baseColor = isScouted ? "bg-zinc-800/40" : "bg-zinc-800";
                        if (direction === 'N') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute top-0 left-0 w-[20%] h-[2px] ${baseColor}`} /><div className={`absolute top-0 right-0 w-[20%] h-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute top-0 left-0 right-0 h-[2px] ${baseColor}`} />;
                        }
                        if (direction === 'S') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute bottom-0 left-0 w-[20%] h-[2px] ${baseColor}`} /><div className={`absolute bottom-0 right-0 w-[20%] h-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute bottom-0 left-0 right-0 h-[2px] ${baseColor}`} />;
                        }
                        if (direction === 'W') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute top-0 left-0 h-[20%] w-[2px] ${baseColor}`} /><div className={`absolute bottom-0 left-0 h-[20%] w-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute top-0 bottom-0 left-0 w-[2px] ${baseColor}`} />;
                        }
                        if (direction === 'E') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute top-0 right-0 h-[20%] w-[2px] ${baseColor}`} /><div className={`absolute bottom-0 right-0 h-[20%] w-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute top-0 bottom-0 right-0 w-[2px] ${baseColor}`} />;
                        }
                        return null;
                    };

                    const showTile = isExplored || isScouted;
                    const showEntity = isExplored;
                    const isScoutedOnly = isScouted && !isExplored;

                    // Proximity check for torchlight spill (Refined: Cardinal only, connected doors only)
                    const dx = Math.abs(x - playerPos.x);
                    const dy = Math.abs(y - playerPos.y);
                    const isManhattanAdjacent = (dx === 1 && dy === 0) || (dx === 0 && dy === 1);
                    const hasTorchSpill = isExplored && isManhattanAdjacent && dungeonLayout[y][x] === 1;

                    const bgTypes = ['stone', 'moss', 'ruins', 'bone', 'shadow'];
                    // Mystery rooms logic: uses 'unknown' asset if scouted but not explored
                    const tileBg = isExplored ? bgTypes[tileBgs[cellKey] || 0] : 'unknown';
                    const shouldShowTrapTile = isExplored && intObj?.type === 'TRAP';

                    cells.push(
                        <div
                            key={`${x}-${y}`}
                            style={{ 
                                width: `${tileSize}px`, 
                                height: `${tileSize}px`,
                                backgroundImage: showTile ? (
                                    shouldShowTrapTile
                                        ? `url('assets/tile_trap_${intObj.trapType.toLowerCase()}_${intObj.status === 'ACTIVE' ? 'active' : 'disarmed'}.png')`
                                        : `url('assets/tile_${tileBg}.png')`
                                ) : 'none',
                                backgroundSize: 'cover'
                            }}
                            onAnimationEnd={() => {
                                if (!revealingCells.has(cellKey)) return;
                                setRevealingCells(prev => {
                                    const next = new Set(prev);
                                    next.delete(cellKey);
                                    return next;
                                });
                            }}
                            className={`flex items-center justify-center relative transition-all duration-500
                            ${!showTile ? 'bg-transparent border-transparent opacity-0 scale-90' : 'bg-zinc-900 shadow-[inset_0_2px_15px_rgba(0,0,0,0.5)]'}
                            ${isExplored ? 'before:absolute before:inset-0 before:bg-black/20 before:pointer-events-none' : ''}
                            ${isScoutedOnly ? 'before:absolute before:inset-0 before:bg-black/70 before:pointer-events-none' : ''}
                            ${hasTorchSpill ? 'after:absolute after:inset-0 after:z-10 after:pointer-events-none after:animate-torch-spill' : ''}
                            ${isExplored && revealingCells.has(cellKey) ? 'animate-tile-reveal' : ''}
                            ${isScouted ? 'ring-1 ring-zinc-600/30' : ''}
                        `}
                        >
                            {/* Render Physical Walls & Doorways */}
                            {showTile && renderEdge('N', hasDoorN)}
                            {showTile && renderEdge('S', hasDoorS)}
                            {showTile && renderEdge('E', hasDoorE)}
                            {showTile && renderEdge('W', hasDoorW)}
                            {/* Path Decoration */}
                            {showTile && (x+y)%2===0 && <div className="absolute inset-0 bg-white opacity-[0.02]" />}

                            {/* Scout Indicator */}
                            {isScouted && <span className="text-zinc-500 font-black text-2xl select-none opacity-60 drop-shadow-[0_2px_3px_rgba(0,0,0,0.88)]">?</span>}

                            {/* Interactables (Only shown if explored) */}
                            {showEntity && showTile && intObj && (
                                <div className={`w-[5vh] h-[5vh] rounded shrink-0 shadow-lg flex items-center justify-center text-[3vh] z-30 ${intObj.type === 'CHEST' ? 'bg-amber-600' : intObj.type === 'TRAP' ? 'hidden' : intObj.type === 'PREV_FLOOR' ? 'bg-indigo-900 border-2 border-purple-400 animate-pulse shadow-[0_0_18px_rgba(168,85,247,0.65)]' : 'bg-blue-800 border-2 border-cyan-300 animate-pulse shadow-[0_0_18px_rgba(34,211,238,0.65)]'}`}>
                                    {intObj.type === 'CHEST' ? '🎁' : intObj.type === 'TRAP' ? '' : intObj.type === 'PREV_FLOOR' ? '↓' : '↑'}
                                </div>
                            )}

                            {/* Enemy Rendering (Fog check!) */}
                            {enemy && showEntity && showTile && (
                                <div className="w-[6vh] h-[6vh] rounded-full border-[3px] border-red-500 overflow-hidden shadow-[0_0_15px_rgba(239,68,68,0.5)] z-10 animate-pulse relative">
                                    <img src={`assets/${enemy.instances[0].imageId}.png`} className="w-full h-full object-cover" />
                                    {enemy.instances.length > 1 && (
                                        <div className="absolute top-0 right-0 bg-black/80 font-mono text-[1vh] text-white font-black w-[2vh] h-[2vh] flex items-center justify-center -translate-y-1 translate-x-1 outline outline-1 outline-red-500">
                                            {enemy.instances.length}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Player Avatar (Digital Tabletop Style) */}
                            {isPlayer && !isWall && isExplored && (
                                <div className="relative z-20 transition-all duration-200">
                                    {/* High Quality Torch Glow (Refined) */}
                                    <div className="absolute inset-[-150%] rounded-full animate-torch pointer-events-none opacity-80" />
                                    
                                    <div className="relative w-[7vh] h-[7vh] rounded-full border-2 border-blue-400 bg-zinc-900 overflow-hidden shadow-[0_0_25px_rgba(96,165,250,0.6)] transform flex flex-col items-center justify-center gap-[2px]">
                                        <div className="flex -space-x-2">
                                            {heroes.map((hero, i) => (
                                                <div key={hero.id} className="w-[3vh] h-[3vh] rounded-full border border-black overflow-hidden shadow-inner shrink-0 bg-zinc-800">
                                                    <img src={`assets/${hero.imageId}.png`} className="w-full h-full object-cover" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                }
            }

            return (
                <div className="w-full h-screen flex flex-row overflow-hidden bg-zinc-950">
                    {/* LEFT: Tactical Map (70% Width) */}
                    <div className="w-[70%] relative flex flex-col items-center justify-center p-4 border-r border-zinc-800/40">
                        {/* MINI-MAP (Relocated to bottom-right, minimized) */}
                        <div className="absolute bottom-6 right-8 bg-black/90 border-2 border-zinc-700/80 p-1 rounded-lg shadow-2xl z-50 pointer-events-none border-dashed border-zinc-600/40">
                            <MiniMap />
                        </div>

                        <div className="w-full flex justify-between items-end mb-4 z-10 px-8">
                            <div className="flex flex-row items-end gap-10">
                                <div className="text-left">
                                    <h2 className="text-3xl font-black italic text-emerald-500 mb-0.5 drop-shadow-[0_2px_10px_rgba(16,185,129,0.3)] tracking-tighter leading-none">LEVEL {floor}</h2>
                                    <p className="text-zinc-500 text-[9px] tracking-[0.3em] uppercase opacity-70">Deep Sector Exploration</p>
                                </div>
                                <div className="text-left pb-0.5">
                                    <div className="flex items-center gap-2">
                                        <span className="text-amber-500 text-lg">💰</span>
                                        <h2 className="text-2xl font-black italic text-zinc-100 tracking-tighter leading-none">{credits.toLocaleString()}</h2>
                                    </div>
                                    <p className="text-zinc-500 text-[9px] tracking-[0.3em] uppercase opacity-70">Syndicate Credits</p>
                                </div>
                            </div>
                            <button onClick={openInventory} className="bg-zinc-900 border-2 border-zinc-700 hover:border-amber-500/50 px-4 py-1.5 text-[9px] font-black uppercase tracking-widest transition-all">Inventory</button>
                        </div>

                        <div ref={mapFrameRef} className="w-full h-full bg-zinc-950 p-[1vh] border-4 border-zinc-800 rounded-xl shadow-2xl backdrop-blur-md relative overflow-hidden">
                            <div className="absolute inset-0 bg-radial-vignette opacity-80 pointer-events-none z-10" />
                            <div
                                className="grid relative z-0 transition-transform duration-300 ease-out"
                                style={{
                                    transform: `translate(${offsetX}px, ${offsetY}px)`,
                                    gridTemplateColumns: `repeat(${GRID_SIZE}, ${tileSize}px)`,
                                    gridTemplateRows: `repeat(${GRID_SIZE}, ${tileSize}px)`,
                                    gap: `${TILE_GAP}px`
                                }}
                            >
                                {cells}
                            </div>
                        </div>
                    </div>

                    {/* RIGHT: Party Status Sidebar (30% Width) */}
                    <div className="w-[30%] bg-zinc-900/40 p-4 sm:p-6 flex flex-col gap-4 z-20 overflow-y-auto shadow-[inset_10px_0_30px_rgba(0,0,0,0.5)]">
                        <div className="border-b border-zinc-800/60 pb-3 mb-2">
                            <h3 className="text-zinc-500 font-black italic text-[10px] tracking-widest uppercase mb-1">Syndicate Roster</h3>
                            <div className="flex justify-between items-center text-[8px] font-black text-zinc-600 uppercase tracking-widest">
                                <span>Tactical Status</span>
                                <span>Phase: {isLocked ? 'Engaged' : 'Active'}</span>
                            </div>
                        </div>
                        <div className="flex flex-col gap-3">
                            {heroes.filter(h => h.hp > 0).map(hero => (
                                <div key={hero.name} className={`bg-zinc-900/80 border p-3 rounded-lg flex flex-col gap-3 relative overflow-hidden group hover:border-emerald-500/30 transition-all ${hero.isLeader ? 'border-amber-500/50 shadow-[0_0_15px_rgba(245,158,11,0.15)]' : 'border-zinc-800'}`}>
                                    <div className="flex items-center gap-3">
                                        <div className={`w-14 h-14 rounded-lg border bg-black overflow-hidden shrink-0 shadow-lg relative ${hero.isLeader ? 'border-amber-500' : 'border-zinc-700'}`}>
                                            <img src={`assets/${hero.imageId}.png`} className="w-full h-full object-cover" />
                                            {hero.isLeader && (
                                                <div className="absolute top-0 right-0 bg-amber-500 text-black text-[7px] font-black px-1 leading-none py-0.5 rounded-bl">LEADER</div>
                                            )}
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent" />
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex justify-between items-end mb-1">
                                                <div className="flex items-center gap-1">
                                                    {hero.isLeader && <span className="text-amber-500 text-[10px]">👑</span>}
                                                    <p className="font-black italic text-sm text-zinc-100 uppercase truncate tracking-tight leading-none">{hero.name}</p>
                                                </div>
                                                <span className="text-[9px] font-black text-emerald-500">{Math.floor((hero.hp / hero.maxHp) * 100)}%</span>
                                            </div>
                                            <div className="w-full h-1.5 bg-black rounded-full overflow-hidden border border-zinc-800">
                                                <div 
                                                    className="h-full bg-emerald-500 transition-all duration-700"
                                                    style={{ width: `${(hero.hp / hero.maxHp) * 100}%` }}
                                                />
                                            </div>
                                            <div className="flex justify-between mt-1 px-0.5">
                                                <span className="text-[8px] font-black text-zinc-500 tabular-nums uppercase">Vitality</span>
                                                <span className="text-[8px] font-black text-zinc-400 tabular-nums">{Math.floor(hero.hp)}/{hero.maxHp}</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Parameter Grid: ATK / DEF / SPD */}
                                    <div className="grid grid-cols-3 gap-2">
                                        <div className="bg-black/40 p-1.5 rounded flex flex-col items-center border border-zinc-800/50">
                                            <span className="text-[7px] font-black text-rose-500 uppercase mb-0.5">ATK</span>
                                            <span className="text-[10px] font-black text-zinc-200 tabular-nums">{hero.getATK(heroes).toFixed(0)}</span>
                                        </div>
                                        <div className="bg-black/40 p-1.5 rounded flex flex-col items-center border border-zinc-800/50">
                                            <span className="text-[7px] font-black text-amber-500 uppercase mb-0.5">DEF</span>
                                            <span className="text-[10px] font-black text-zinc-200 tabular-nums">{hero.getDEF(heroes).toFixed(0)}</span>
                                        </div>
                                        <div className="bg-black/40 p-1.5 rounded flex flex-col items-center border border-zinc-800/50">
                                            <span className="text-[7px] font-black text-cyan-500 uppercase mb-0.5">SPD</span>
                                            <span className="text-[10px] font-black text-zinc-200 tabular-nums">{hero.getSPD(heroes).toFixed(0)}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {stairsPrompt && (
                        <div className="absolute inset-0 z-[120] bg-black/80 backdrop-blur-sm flex items-center justify-center px-4">
                            <div
                                className="w-full max-w-xl border-2 border-cyan-500/55 shadow-[0_0_45px_rgba(34,211,238,0.22)] rounded-xl p-6 sm:p-8 text-center relative overflow-hidden bg-zinc-950/95"
                                style={{
                                    backgroundImage: `linear-gradient(180deg, rgba(4,12,20,0.92), rgba(8,10,14,0.92)), url('${stairsPrompt.selectedBackground}'), url('assets/tile_ruins.png')`,
                                    backgroundSize: 'cover, cover, 220px 220px',
                                    backgroundPosition: 'center, center, center'
                                }}
                            >
                                <div className="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(34,211,238,0.2),transparent_64%)] pointer-events-none" />
                                <div className="relative z-10">
                                    <p className="text-cyan-300 text-[10px] font-black tracking-[0.42em] uppercase mb-3">ANCIENT STAIRWELL</p>
                                    <h3 className="text-2xl sm:text-3xl font-black italic tracking-tight text-white mb-3">
                                        {stairsPrompt.direction === 'UP' ? 'A narrow stair rises toward safer stone.' : 'A cold stair descends into deeper shadow.'}
                                    </h3>
                                    <p className="text-zinc-300 text-[11px] sm:text-xs tracking-wide leading-relaxed mb-6">
                                        {stairsPrompt.narration}
                                    </p>
                                </div>
                                <div className="flex items-center justify-center gap-3 sm:gap-4">
                                    <button
                                        onClick={handleCancelDescend}
                                        className="px-4 sm:px-5 py-2 border-2 border-zinc-700 bg-zinc-900 text-zinc-300 font-black text-[10px] sm:text-xs tracking-[0.16em] uppercase hover:bg-zinc-800 transition-colors"
                                    >
                                        {`Stay at Floor ${stairsPrompt.currentFloor}`}
                                    </button>
                                    <button
                                        onClick={handleConfirmDescend}
                                        className="px-4 sm:px-5 py-2 border-2 border-cyan-500 bg-cyan-600/80 text-black font-black text-[10px] sm:text-xs tracking-[0.16em] uppercase hover:bg-cyan-400 transition-colors"
                                    >
                                        {stairsPrompt.direction === 'UP'
                                            ? `Go Up to Floor ${stairsPrompt.targetFloor}`
                                            : `Go Down to Floor ${stairsPrompt.targetFloor}`}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- INVENTORY PHASE COMPONENT ---
        const InventoryPhase = ({ heroes, setHeroes, inventory, setInventory, closeInventory }) => {
            const [selectedItem, setSelectedItem] = useState(null);
            const [healedHeroIndex, setHealedHeroIndex] = useState(null);

            const RARITY_COLORS = {
                'Common': 'text-zinc-400',
                'Uncommon': 'text-blue-400',
                'Rare': 'text-emerald-400',
                'Epic': 'text-purple-500',
                'Legendary': 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]'
            };

            const TYPE_COLORS = {
                'CONSUMABLE': 'bg-emerald-900/40 border-emerald-500/50',
                'DEFAULT': 'bg-zinc-950 border-zinc-700'
            };

            const handleUseItem = (heroIndex) => {
                if (!selectedItem || selectedItem.type !== 'CONSUMABLE') return;

                const healAmount = selectedItem.statBoost.heal || 0;

                setHeroes(prev => {
                    const next = [...prev];
                    const oldHero = next[heroIndex];

                    const newHero = Object.assign(Object.create(Object.getPrototypeOf(oldHero)), oldHero);
                    newHero.equipment = { ...oldHero.equipment };
                    newHero.hp = Math.min(newHero.maxHp, newHero.hp + healAmount);

                    next[heroIndex] = newHero;
                    return next;
                });

                setHealedHeroIndex(heroIndex);
                setTimeout(() => setHealedHeroIndex(null), 600);

                setInventory(prev => prev.filter(i => i.id !== selectedItem.id));
                setSelectedItem(null);
            };

            const handleEquip = (heroIndex, slot) => {
                if (!selectedItem) return;

                // Block consumables from being equipped
                if (selectedItem.type === 'CONSUMABLE') return;

                // Block mismatched item types
                if (selectedItem.type === 'WEAPON' && slot !== 'weapon1' && slot !== 'weapon2') {
                    alert("Must equip weapon in a weapon slot!");
                    return;
                }
                if (selectedItem.type !== 'WEAPON' && slot !== selectedItem.type.toLowerCase()) {
                    alert(`Must equip ${selectedItem.type} in the ${selectedItem.type} slot!`);
                    return;
                }

                const targetHero = heroes[heroIndex];
                const existingItem = targetHero.equipment[slot];

                // 1. Process Inventory Array
                let nextInv = inventory.filter(i => i.id !== selectedItem.id);
                if (existingItem) nextInv.push(existingItem);
                setInventory(nextInv);

                // 2. Process Hero State IMMUTABLY to survive React StrictMode double invocations
                setHeroes(prev => {
                    const next = [...prev];
                    const oldHero = next[heroIndex];

                    // Create new reference for Class Object
                    const newHero = Object.assign(Object.create(Object.getPrototypeOf(oldHero)), oldHero);
                    newHero.equipment = { ...oldHero.equipment };
                    newHero.equipment[slot] = selectedItem;

                    next[heroIndex] = newHero;
                    return next;
                });

                setSelectedItem(null);
            };

            const unequip = (heroIndex, slot) => {
                const targetHero = heroes[heroIndex];
                const item = targetHero.equipment[slot];
                if (!item) return;

                // 1. Process Inventory Array
                setInventory(inv => [...inv, item]);

                // 2. Process Hero State IMMUTABLY
                setHeroes(prev => {
                    const next = [...prev];
                    const oldHero = next[heroIndex];

                    const newHero = Object.assign(Object.create(Object.getPrototypeOf(oldHero)), oldHero);
                    newHero.equipment = { ...oldHero.equipment };
                    newHero.equipment[slot] = null;

                    next[heroIndex] = newHero;
                    return next;
                });
            };

            return (
                <div className="h-screen w-screen bg-zinc-950 flex flex-col p-8 text-white relative animate-in fade-in duration-300">
                    <button onClick={closeInventory} className="absolute top-6 right-6 font-black text-zinc-400 hover:text-white border-2 border-zinc-700 px-4 py-2">
                        RETURN TO SECTOR
                    </button>

                    <h2 className="text-4xl font-black italic tracking-widest text-amber-500 mb-8">GLOBAL STASH</h2>

                    <div className="flex flex-1 gap-8 overflow-hidden">

                        {/* LEFT: Inventory Cache */}
                        <div className="w-1/3 bg-zinc-900 border-2 border-zinc-800 p-4 overflow-y-auto rounded shadow-xl">
                            <h3 className="text-xl font-bold tracking-widest text-zinc-500 border-b border-zinc-800 pb-2 mb-4">UNASSIGNED LOOT</h3>
                            <div className="flex flex-wrap gap-2">
                                {inventory.length === 0 && <p className="text-zinc-600 text-sm italic">Stash is empty. Defeat monsters or find chests to scavenge gear.</p>}
                                {inventory.map(item => (
                                    <div
                                        key={item.id}
                                        onClick={() => setSelectedItem(selectedItem?.id === item.id ? null : item)}
                                        className={`w-full p-3 flex justify-between items-center cursor-pointer border-l-4 transition-all
                                            ${selectedItem?.id === item.id ? 'bg-amber-900 border-amber-500' : (TYPE_COLORS[item.type] || TYPE_COLORS['DEFAULT']) + ' hover:bg-zinc-800'}`}
                                    >
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">{item.icon}</span>
                                            <div className="flex flex-col">
                                                <span className={`font-bold text-sm tracking-widest ${RARITY_COLORS[item.rarity] || 'text-zinc-300'}`}>{item.name}</span>
                                                <span className="text-[10px] text-zinc-500 uppercase">{item.type} • {item.rarity}</span>
                                                {item.passives && item.passives.map(p => (
                                                    <span key={p.id} className="text-[9px] text-cyan-400 font-bold italic">✦ {p.name}: {p.description}</span>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="flex gap-2 text-xs font-black">
                                            {item.statBoost.atk && <span className="text-rose-500">⚔️+{item.statBoost.atk}</span>}
                                            {item.statBoost.def && <span className="text-amber-500">🛡️+{item.statBoost.def}</span>}
                                            {item.statBoost.spd && <span className="text-blue-400">⚡+{item.statBoost.spd}</span>}
                                            {item.statBoost.heal && <span className="text-emerald-400">💚+{item.statBoost.heal}</span>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* RIGHT: Heroes */}
                        <div className="flex-1 flex gap-4">
                            {heroes.map((hero, index) => (
                                <div
                                    key={hero.id}
                                    onClick={() => selectedItem?.type === 'CONSUMABLE' && handleUseItem(index)}
                                    className={`flex-1 border-2 p-4 rounded shadow-xl flex flex-col transition-all relative
                                        ${healedHeroIndex === index ? 'animate-heal-pulse' : ''}
                                        ${selectedItem?.type === 'CONSUMABLE' ? 'cursor-pointer hover:border-emerald-500 hover:bg-emerald-950/20 bg-emerald-900/10 border-emerald-800' : 'bg-zinc-900 border-zinc-800'}`}
                                >
                                    {healedHeroIndex === index && (
                                        <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-8 text-emerald-400 font-black text-2xl animate-float-up pointer-events-none">
                                            +40 HP
                                        </div>
                                    )}

                                    <div className="flex items-center gap-4 border-b border-zinc-800 pb-4 mb-4">
                                        <div className="relative">
                                            <img src={`assets/${hero.imageId}.png`} className="w-16 h-16 rounded border-2 border-zinc-700 object-cover" />
                                            {hero.hp <= 0 && <div className="absolute inset-0 bg-black/60 flex items-center justify-center text-red-500 font-bold text-[10px] uppercase">Slain</div>}
                                        </div>
                                        <div className="flex-1">
                                            <div className="flex justify-between items-center mb-1">
                                                <h4 className="font-black italic text-lg leading-none">{hero.name}</h4>
                                                <span className="text-[10px] bg-zinc-800 text-zinc-400 px-1 rounded uppercase">{hero.role}</span>
                                            </div>

                                            {/* HP BAR VISIBILITY */}
                                            <div className="w-full bg-zinc-800 h-2 rounded-full overflow-hidden border border-zinc-700 mb-1">
                                                <div
                                                    className="h-full bg-emerald-500 transition-all duration-500"
                                                    style={{ width: `${(hero.hp / hero.maxHp) * 100}%` }}
                                                />
                                            </div>
                                            <div className="flex justify-between text-[10px] font-bold">
                                                <span className={hero.hp < hero.maxHp * 0.3 ? 'text-red-500 animate-pulse' : 'text-zinc-500'}>
                                                    HP: {Math.floor(hero.hp)} / {hero.maxHp}
                                                </span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Equipment Slots */}
                                    <div className="flex-1 flex flex-col gap-2">
                                        {['weapon1', 'weapon2', 'hat', 'chest', 'shoes'].map(slot => {
                                            const item = hero.equipment[slot];
                                            let isValidSlot = false;
                                            if (selectedItem) {
                                                if (selectedItem.type === 'WEAPON' && (slot === 'weapon1' || slot === 'weapon2')) isValidSlot = true;
                                                if (selectedItem.type !== 'WEAPON' && slot === selectedItem.type.toLowerCase()) isValidSlot = true;
                                            }

                                            return (
                                                <div
                                                    key={slot}
                                                    onClick={() => selectedItem ? handleEquip(index, slot) : unequip(index, slot)}
                                                    className={`w-full p-2 border-2 flex items-center justify-between cursor-pointer transition-all
                                                        ${selectedItem
                                                            ? (isValidSlot ? 'border-dashed border-yellow-500 bg-yellow-900/40 hover:bg-yellow-800' : 'border-zinc-800 bg-zinc-950 opacity-30 cursor-not-allowed')
                                                            : 'border-zinc-800 bg-zinc-950 hover:border-red-500 hover:bg-red-950/20'}
                                                        ${!item && !selectedItem ? 'opacity-50' : ''}`}
                                                >
                                                    <span className="text-[10px] text-zinc-500 uppercase font-black w-16">{slot}</span>
                                                    {item ? (
                                                        <div className="flex flex-1 items-center justify-between">

                { name: 'Valerius', hp: 140, atk: 8, def: 18, spd: 10, role: 'TANK', imageId: 'hero_valerius', trait: {id: 'iron_aura', name: 'Aura of Iron', description: 'Global 10% damage reduction for party'}, skills: [{name: 'Shield Slam', val: 12, type: 'damage'}, {name: 'Fortify', val: 15, type: 'heal'}] },

            const [gamePhase, setGamePhase] = useState('MAIN_MENU');
            const [floor, setFloor] = useState(1);

            const [credits, setCredits] = useState(0);

            // TICKET-49: Special Leader State
            const [hasKilledElitePrevFloor, setHasKilledElitePrevFloor] = useState(false);
            const [killedEliteThisFloor, setKilledEliteThisFloor] = useState(false);
            const [inventory, setInventory] = useState([
                new Item("Healing Potion", "CONSUMABLE", { heal: 40 }, "🧪", "Uncommon"),

            const [heroes, setHeroes] = useState([]);
            const [draftPool, setDraftPool] = useState([]);

            const draftTiltMap = useMemo(

                [draftPool]
            );

            // Persistent Map State
            const [activeLayout, setActiveLayout] = useState(null);

            const [activeMapEnemies, setActiveMapEnemies] = useState([]);
            const [activeMapInteractables, setActiveMapInteractables] = useState([]);

            const [floorHistory, setFloorHistory] = useState({}); // TICKET-51: Persistent Floor Cache

            // Helper for credits logic (TICKET-49: Grimm Perk)
            const addCredits = (amount) => {
                const leader = heroes.find(h => h.isLeader);
                let finalAmount = amount;
                if (leader?.name === 'Grimm') {
                    finalAmount = Math.floor(amount * 1.20); // +20% Credits
                }
                setCredits(prev => prev + finalAmount);
                return finalAmount;
            };

            const getEnemiesForFloor = (f) => {
                // Scaling factors
                const hpMult = 1 + (f - 1) * 0.25;
                const pwrMult = 1 + (f - 1) * 0.15;
                
                if (f === 5) { // BOSS FLOOR
                    return [{
                        id: 'boss_floor_5', x: 4, y: 7, instances: [
                            new Combatant("Void Archon", "TANK", Math.floor(600 * hpMult), 15, Math.floor(40 * pwrMult), 25, "enemy_ogre", [{name: 'Annihilation', val: 60, type: 'damage'}], 'VANGUARD', false),
                            new Combatant("Void Guard", "DPS", Math.floor(150 * hpMult), 12, Math.floor(25 * pwrMult), 15, "enemy_lurker", [{name: 'Acid Spit', val: 20, type: 'damage'}], 'VANGUARD', false)
                        ]
                    }];
                }

                // Generates 2-3 packs
                const packs = [];
                for(let i=0; i < (f > 2 ? 3 : 2); i++) {
                    const pool = [
                        { name: "Shadow Bat", hp: 40, spd: 22, pwr: 10, def: 2, img: "enemy_bat" },
                        { name: "Deep Lurker", hp: 90, spd: 12, pwr: 12, def: 5, img: "enemy_lurker" },
                        { name: "Ogre King", hp: 200, spd: 8, pwr: 25, def: 10, img: "enemy_ogre" }
                    ];
                    const seed = pool[Math.floor(Math.random() * pool.length)];
                    packs.push({
                        id: `e_${f}_${i}`,
                        x: 0, y: 0, // Assigned by generator
                        instances: [
                            new Combatant(seed.name, "DPS", Math.floor(seed.hp * hpMult), seed.spd, Math.floor(seed.pwr * pwrMult), seed.def, seed.img, [{name: 'Attack', val: Math.floor(seed.pwr * 1.2), type: 'damage'}], 'VANGUARD', false)
                        ]
                    });
                }
                return packs;
            };

            const loadFloor = (f, currentHistory = floorHistory) => {
                let data = currentHistory[f];
                if (!data) {
                    const gen = window.DungeonGenerator.generate(f, 9);
                    const enemies = getEnemiesForFloor(f).map(e => {
                        const loc = gen.validTiles.pop() || {x:4, y:4};
                        return { ...e, x: loc.x, y: loc.y };
                    });
                    const explored = new Set(['4,4']);
                    
                    // Elara Perk: Oracle (Reveal Boss)
                    const leader = heroes.find(h => h.isLeader);
                    if (leader?.name === 'Elara') {
                        const boss = enemies.find(e => e.id.includes('boss') || e.id.includes('pack_') || e.id.includes('e_')); // Simple heuristic for boss/elite
                        if (boss) explored.add(`${boss.x},${boss.y}`);
                    }

                    // Slyn Perk: Navigator (Reveal Exit)
                    if (leader?.name === 'Slyn') {
                        const exit = intObjs.find(i => i.id === 'exit');
                        if (exit) explored.add(`${exit.x},${exit.y}`);
                    }

                    data = {
                        layout: gen.layout,
                        bgs: gen.bgs,
                        interactables: gen.interactables,
                        enemies: enemies,
                        explored: explored,
                        playerPos: { x: 4, y: 4 }
                    };
                    setFloorHistory(prev => ({ ...prev, [f]: data }));
                }
                
                setActiveLayout(data.layout);
                setActiveBgs(data.bgs);
                setActiveMapInteractables(data.interactables);
                setActiveMapEnemies(data.enemies);
                setActiveExplored(data.explored);
                setActivePlayerPos(data.playerPos);
            };

            const startDraft = () => {
                const pool = [...HERO_ROSTER].sort(() => Math.random() - 0.5).slice(0, 5);
                setDraftPool(pool);
                
                // Randomize background from assets
                const bgIdx = Math.floor(Math.random() * 3) + 1;
                setDraftBg(`assets/bg_draft_${bgIdx}.png`);

                setHeroes([]);
                setFloor(1);
                setRunEndState(null);
                setInventory([
                    new Item("Healing Potion", "CONSUMABLE", { heal: 40 }, "🧪", "Uncommon"),

                ]);
                setGamePhase('DRAFT');
            };

            const finalizeDraft = (selectedHeroes) => {
                const combatants = selectedHeroes.map(h => 
                    new Combatant(h.name, h.role, h.hp, h.spd, h.atk, h.def, `hero_${h.name.toLowerCase()}`, h.skills, 'VANGUARD', true, h.trait)

                setHeroes(combatants);

            const finalizeLeadership = (leaderName) => {

                    const next = h.clone();
                    next.isLeader = h.name === leaderName;

                setGamePhase('DEPLOYMENT');

            const finalizeDeployment = (deployedHeroes) => {

                loadFloor(1, {}); // Reset history for new run
                setGamePhase('EXPLORATION');
            };

            const generateLoot = () => {
                const tables = [
                    new Item("Iron Broadsword", "WEAPON", { atk: 15 }, "🗡️", "Common"),
                    new Item("Tower Shield", "WEAPON", { def: 12, spd: -2 }, "🛡️", "Uncommon"),
                    new Item("Leather Cowl", "HAT", { def: 5, spd: 4 }, "🎩", "Common"),
                    new Item("Chainmail Hauberk", "CHEST", { def: 18, spd: -3 }, "👕", "Uncommon"),
                    new Item("Quickstep Boots", "SHOES", { spd: 10 }, "👞", "Uncommon"),
                    new Item("Ruby Signet", "HAT", { atk: 10, def: 2 }, "💍", "Rare"),
                    new Item("Assassin Dagger", "WEAPON", { atk: 12, spd: 8 }, "🗡️", "Epic"),
                    new Item("Voidwalker Treads", "SHOES", { def: 8, spd: 15 }, "👞", "Legendary"),
                    new Item("Healing Potion", "CONSUMABLE", { heal: 40 }, "🧪", "Uncommon")
                ];

                // Borum Perk: Quartermaster (+25% Rare+ Chance)
                const leader = heroes.find(h => h.isLeader);
                let finalItem;
                if (leader?.name === 'Borum') {
                    const highTier = tables.filter(i => ['Rare', 'Epic', 'Legendary'].includes(i.rarity));
                    if (Math.random() < 0.25) {
                        finalItem = highTier[Math.floor(Math.random() * highTier.length)];
                    }
                }
                
                const item = finalItem || tables[Math.floor(Math.random() * tables.length)];
                if (item.rarity === 'Epic' || item.rarity === 'Legendary') {
                    const passivePool = [PASSIVES.LIFESTEAL, PASSIVES.THORNS, PASSIVES.QUICKENING];
                    item.passives = [passivePool[Math.floor(Math.random() * passivePool.length)]];
                }
                return item;
            };

            const handleEncounter = (enemyData) => {
                setActiveEncounter(enemyData);
                setGamePhase('BATTLE');
            };

            const handleNextFloor = () => {
                if (floor >= 5) {
                    setRunEndState('VICTORY');
                    return;
                }

                // Vex Perk: Soul Harvester (Apply bonus to next floor)
                setHeroes(prev => prev.map(h => {
                    const next = h.clone();
                    next.hasEliteBonus = killedEliteThisFloor;
                    return next;
                }));
                setKilledEliteThisFloor(false);

                const updatedHistory = { ...floorHistory, [floor]: {
                    layout: activeLayout,
                    bgs: activeBgs,
                    interactables: activeMapInteractables,
                    enemies: activeMapEnemies,
                    explored: activeExplored,
                    playerPos: activePlayerPos
                }};
                setFloorHistory(updatedHistory);
                const nextF = floor + 1;
                setFloor(nextF);
                loadFloor(nextF, updatedHistory);
            };

            const handlePrevFloor = () => {
                if (floor > 1) {
                    const updatedHistory = { ...floorHistory, [floor]: {
                        layout: activeLayout,
                        bgs: activeBgs,
                        interactables: activeMapInteractables,
                        enemies: activeMapEnemies,
                        explored: activeExplored,
                        playerPos: activePlayerPos
                    }};
                    setFloorHistory(updatedHistory);
                    const prevF = floor - 1;
                    setFloor(prevF);
                    loadFloor(prevF, updatedHistory);
                }
            };

            const calculatePartyBonus = (statType) => {
                const livingHeroes = heroes.filter(h => h.hp > 0);
                if (livingHeroes.length === 0) return 0;
                const totalStat = livingHeroes.reduce((acc, h) => {
                    if (statType === 'SPD') return acc + h.getSPD();
                    if (statType === 'DEF') return acc + h.getDEF();
                    return acc + h.getSPD();
                }, 0);
                return Math.floor(totalStat / livingHeroes.length / 5);
            };

            const handleTrap = (trapData) => {
                const selectedType = trapData.trapType;
                const bonusType = selectedType === 'ACID' ? 'DEF' : 'SPD';
                const bonus = calculatePartyBonus(bonusType);
                setActiveTrapEvent({
                    id: trapData.id,
                    type: selectedType,
                    bonusType: bonusType,
                    bonus: bonus,
                    status: 'DODGE_INIT',
                    roll: 0,
                    result: null
                });
            };

            const handleTrapResult = (outcome, creditsAwarded = 0) => {
                if (outcome === 'DAMAGE') {
                    let damagePercent = 0.15 + (floor * 0.05);
                    
                    // Draka Perk: Warden (Trap Resistance)
                    const leader = heroes.find(h => h.isLeader);
                    if (leader?.name === 'Draka') {
                        damagePercent *= 0.8; // -20% Damage
                    }

                    setActiveTrapDamagePulse(true);
                    setTimeout(() => setActiveTrapDamagePulse(false), 800);
                    setHeroes(prev => {
                        const next = prev.map(hero => {
                            if (hero.hp <= 0) return hero;
                            const nextHero = hero.clone();
                            const damage = Math.floor(nextHero.maxHp * damagePercent);
                            nextHero.hp = Math.max(0, nextHero.hp - damage);
                            return nextHero;
                        });
                        if (next.filter(h => h.hp > 0).length === 0) {
                            setTimeout(() => setRunEndState('DEFEAT'), 500);
                        }
                        return next;
                    });
                } else if (outcome === 'DISARMED') {
                    let finalCredits = creditsAwarded;
                    
                    // Krix Perk: Engineer (Disarm Bonus)
                    const leader = heroes.find(h => h.isLeader);
                    if (leader?.name === 'Krix') {
                        finalCredits += 100;
                    }
                    
                    addCredits(finalCredits); // Uses addCredits to also apply Grimm bonus if applicable (though nested leaders aren't possible, it's safer)
                    
                    setActiveMapInteractables(prev => prev.map(i => 
                        i.id === activeTrapEvent.id ? { ...i, status: 'DISARMED' } : i
                    ));
                }
                setActiveTrapEvent(null);
            };

            const handleHeal = () => {
                const drop = generateLoot();
                setInventory(prev => [...prev, drop]);

            20% { filter: brightness(2) sepia(0.8) saturate(5) hue-rotate(-60deg); transform: translateX(-6px); }
            40% { filter: brightness(2) sepia(0.8) saturate(5) hue-rotate(-60deg); transform: translateX(6px); }
            100% { filter: brightness(1) sepia(0) saturate(1) hue-rotate(0deg); transform: translateX(0); }
        }
        .animate-hero-damage { animation: hero-damage 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes confetti-burst {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(1.8); opacity: 0.9; }
            100% { transform: scale(4); opacity: 0; }
        }
        .animate-confetti { animation: confetti-burst 1s ease-out forwards; }

        @keyframes happy-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }
        .animate-happy { animation: happy-bounce 0.4s ease-in-out 3; }

        .trap-overlay {
            background: linear-gradient(to right, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.8) 70%, rgba(0,0,0,0) 100%);
        }
    </style>
</head>
