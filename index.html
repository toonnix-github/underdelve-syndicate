<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underdelve Syndicate - Digital Tabletop</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- React UMD for maximum stability -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="dungeon_generator.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- GAME ENGINE LOGIC ---
        class Item {
            constructor(name, type, statBoost, icon, rarity = 'Common', passives = []) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.name = name;
                this.type = type; // 'WEAPON', 'HAT', 'CHEST', 'SHOES', 'CONSUMABLE'
                this.statBoost = statBoost; // { atk: X, def: Y, spd: Z, heal: H }
                this.icon = icon;
                this.rarity = rarity; // 'Common', 'Uncommon', 'Rare', 'Epic', 'Legendary'
                this.passives = passives; // [{ id: 'lifesteal', name: 'Lifesteal', description: 'Heal for 20% of dmg' }]
            }
        }

        class Combatant {
            constructor(name, role, maxHp, speed, power, def, imageId, abilities, positionLine, isHero = true, trait = null) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.name = name;
                this.role = role;
                this.maxHp = maxHp;
                this.hp = maxHp;
                this.speed = speed;
                this.power = power;
                this.def = def;
                this.imageId = imageId;
                this.abilities = abilities;
                this.positionLine = positionLine || 'VANGUARD'; // 'VANGUARD' or 'REARGUARD'
                this.atb = 0;
                this.isDead = false;
                this.isHero = isHero;
                this.trait = trait;
                this.hasRevived = false; // Persistent state for 'Undying'
                this.lastAction = "";
                this.isActing = false;
                this.attackPhase = 'idle'; // 'idle' | 'advance' | 'strike' | 'return'
                this.impactPulse = false;
                this.hitShake = false;
                this.showImpact = false;
                this.healSparkle = false;
                this.traitGlow = false;
                this.isLeader = false; // TICKET-49: Leader designation
                this.hasEliteBonus = false; // TICKET-49: Vex Leader Perk bonus
                this.vfx = []; // Store active floating text
                this.equipment = {
                    weapon1: null,
                    weapon2: null,
                    hat: null,
                    chest: null,
                    shoes: null
                };
                // VFX States
                this.isCharging = false;
                this.chargeColor = 'amber'; // 'amber' | 'blue' | 'rose'
                this.activeSigil = null; // '⚔️' | '✨' | '🛡️' | '⚡'
                this.isPopping = false;
            }

            clone() {
                const copy = Object.assign(Object.create(Object.getPrototypeOf(this)), this);
                copy.equipment = { ...this.equipment };
                copy.abilities = [...this.abilities];
                copy.vfx = [...this.vfx];
                // Clone VFX states
                copy.isCharging = this.isCharging;
                copy.chargeColor = this.chargeColor;
                copy.activeSigil = this.activeSigil;
                copy.isPopping = this.isPopping;
                return copy;
            }

            getPassives() {
                const passives = [];
                Object.values(this.equipment).forEach(item => {
                    if (item && item.passives) {
                        item.passives.forEach(p => passives.push(p.id));
                    }
                });
                return passives;
            }

            getATK(party = []) {
                let total = this.power;
                Object.values(this.equipment).forEach(item => { if (item?.statBoost?.atk) total += item.statBoost.atk; });
                
                // Valthea: +15% Party ATK in Vanguard
                const leader = party.find(h => h.isLeader);
                if (leader?.name === 'Valthea' && this.positionLine === 'VANGUARD') {
                    total = Math.floor(total * 1.15);
                }

                // Vex: +10% Party ATK after Elite Floor
                if (leader?.name === 'Vex' && this.hasEliteBonus) {
                    total = Math.floor(total * 1.10);
                }

                return total;
            }

            getDEF(party = []) {
                let total = this.def;
                Object.values(this.equipment).forEach(item => { if (item?.statBoost?.def) total += item.statBoost.def; });
                if (this.trait?.id === 'vanguard_stance' && this.positionLine === 'VANGUARD') {
                    total = Math.floor(total * 1.1);
                }

                // Global Leader Perks
                const leader = party.find(h => h.isLeader);
                if (leader?.name === 'Valerius') {
                    total = Math.floor(total * 1.15); // +15% DEF
                }
                return total;
            }

            getSPD(party = []) {
                let total = this.speed;
                Object.values(this.equipment).forEach(item => { if (item?.statBoost?.spd) total += item.statBoost.spd; });
                
                // Lira: +10% Party Speed
                const leader = party.find(h => h.isLeader);
                if (leader?.name === 'Lira') {
                    total = Math.floor(total * 1.10);
                }
                return total;
            }

            updateAtb(dt, partySpeedMult = 1.0) {
                if (this.hp <= 0) return;
                const increment = (this.getSPD() * dt * partySpeedMult) * 5;
                this.atb = Math.min(100, this.atb + increment);
            }

            addVfx(text, type) {
                const id = Date.now() + Math.random();
                this.vfx.push({ id, text, type });
                // Clean up vfx after 1 second
                setTimeout(() => {
                    this.vfx = this.vfx.filter(v => v.id !== id);
                }, 1000);
            }
        }

        const ROLES = {
            TANK: { color: 'amber', icon: '🛡️' },
            HEALER: { color: 'emerald', icon: '✨' },
            DPS: { color: 'rose', icon: '⚔️' }
        };

        // --- REACT COMPONENTS ---

            const TrapEventModal = ({ event, onResult, floor, heroes }) => {
                const [phase, setPhase] = useState(event.status); // 'DODGE_INIT' | 'ROLLING' | 'RESULT' | 'CHOICE' | 'DISARM_ROLLING'
                const [roll, setRoll] = useState(0);
                const [isShaking, setIsShaking] = useState(false);

                const trapInfo = {
                    SPIKES: { name: 'Hidden Spike Wall', img: 'assets/trap_spikes.png', color: 'text-amber-500', stat: 'SPD' },
                    ACID: { name: 'Acidic Pressure Plate', img: 'assets/trap_acid.png', color: 'text-green-500', stat: 'DEF' },
                    BLADES: { name: 'Pendulum Blades', img: 'assets/trap_blades.png', color: 'text-rose-500', stat: 'SPD' }
                }[event.type];

                const targetDodge = 10 + floor * 2;
                const targetDisarm = 12 + floor * 2;
                const potentialDamage = Math.floor(15 + floor * 5);
                const potentialReward = 75 + floor * 25;

                // Calculate display info for party bonus
                const livingHeroes = heroes.filter(h => h.hp > 0);
                const statType = trapInfo.stat;
                const totalStat = livingHeroes.reduce((acc, h) => acc + (statType === 'DEF' ? h.getDEF(heroes) : h.getSPD(heroes)), 0);
                const avgStat = livingHeroes.length > 0 ? (totalStat / livingHeroes.length) : 0;
                const statBonus = Math.floor(avgStat / 5);

                const startRoll = (targetPhase) => {
                    setIsShaking(true);
                    let count = 0;
                    const interval = setInterval(() => {
                        setRoll(Math.floor(Math.random() * 20) + 1);
                        count++;
                        if (count > 20) {
                            clearInterval(interval);
                            setIsShaking(false);
                            const finalRoll = Math.floor(Math.random() * 20) + 1;
                            setRoll(finalRoll);
                            
                            if (targetPhase === 'DODGE') {
                                if (finalRoll + statBonus >= targetDodge) setPhase('CHOICE');
                                else setPhase('RESULT_FAIL_DODGE');
                            } else {
                                if (finalRoll + statBonus >= targetDisarm) setPhase('RESULT_SUCCESS');
                                else setPhase('RESULT_FAIL_DISARM');
                            }
                        }
                    }, 50);
                };

                return (
                    <div className={`absolute top-0 left-0 w-full lg:w-[60vw] h-full z-[80] flex items-center justify-center p-4 trap-overlay overflow-hidden ${isShaking ? 'animate-shake' : ''}`}>
                        <div className={`w-full max-w-xl bg-zinc-950 border-x-4 border-zinc-800 shadow-2xl relative flex flex-col transition-all duration-300 ${phase === 'RESULT_SUCCESS' ? 'animate-happy border-emerald-500 shadow-emerald-500/20' : ''}`}>
                            {/* Decorative Borders */}
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-zinc-700 to-transparent" />
                            <div className="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-zinc-700 to-transparent" />
                            
                            {/* Header Section */}
                            <div className="px-8 pt-8 pb-4 text-center border-b border-zinc-900/50">
                                <h3 className={`text-4xl font-black italic tracking-tighter mb-2 ${trapInfo.color}`}>
                                    {trapInfo.name.toUpperCase()}
                                </h3>
                                <p className="text-[10px] text-zinc-500 font-bold tracking-[0.4em] uppercase">Emergency Interactive Encounter</p>
                            </div>

                            {/* Main Content Area */}
                            <div className="flex-1 relative min-h-[300px] flex items-center justify-center">
                                {/* Success Visuals */}
                                {phase === 'RESULT_SUCCESS' && <div className="absolute inset-0 z-50 overflow-hidden pointer-events-none flex items-center justify-center">
                                    <div className="w-1/2 h-1/2 rounded-full border-8 border-emerald-500/20 animate-confetti" />
                                    <div className="w-1/3 h-1/3 rounded-full border-8 border-yellow-500/20 animate-confetti delay-75" />
                                </div>}

                                <img 
                                    src={trapInfo.img} 
                                    className={`absolute inset-0 w-full h-full object-cover opacity-15 grayscale mix-blend-overlay ${isShaking ? 'scale-110' : 'scale-100'} transition-transform duration-500`} 
                                />
                                
                                <div className="absolute inset-0 flex flex-col items-center justify-center gap-8 px-12 text-center">
                                    {phase === 'DODGE_INIT' && (
                                        <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 flex flex-col items-center gap-6">
                                            <div className="flex flex-col gap-2 mb-4 bg-black/40 p-4 rounded-lg border border-white/5">
                                                <div className="flex gap-8 mb-2">
                                                    <div className="text-center">
                                                        <p className="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">Dodge DC</p>
                                                        <p className="text-white font-black text-xl italic outline-text">#{targetDodge}</p>
                                                    </div>
                                                    <div className="text-center">
                                                        <p className="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">Party Avg {statType}</p>
                                                        <p className="text-amber-500 font-black text-xl italic">+{statBonus} <span className="text-[10px] text-zinc-500 opacity-50 font-normal tracking-normal">(Avg: {avgStat.toFixed(1)})</span></p>
                                                    </div>
                                                </div>
                                                <p className="text-[9px] text-zinc-500 italic uppercase">Party Coordination: +1 Bonus per 5 Avg {statType}</p>
                                            </div>
                                            <p className="text-zinc-300 text-sm font-medium leading-relaxed max-w-md">The shadows move! A trap has been triggered. You must react quickly to avoid a lethal blow.</p>
                                            <button 
                                                onClick={() => { setPhase('ROLLING_DODGE'); startRoll('DODGE'); }}
                                                className="bg-zinc-100 hover:bg-white text-black font-black px-10 py-4 rounded-sm tracking-[0.2em] transition-all hover:scale-105 active:scale-95 text-lg"
                                            >
                                                ROLL TO DODGE
                                            </button>
                                        </div>
                                    )}

                                    {(phase === 'ROLLING_DODGE' || phase === 'DISARM_ROLLING') && (
                                        <div className="flex flex-col items-center gap-4">
                                            <div className={`w-32 h-32 rounded-2xl bg-zinc-900 border-4 border-zinc-700 flex items-center justify-center text-5xl font-mono font-black text-white shadow-2xl ${isShaking ? 'animate-hit-shake' : ''}`}>
                                                {roll}
                                            </div>
                                            <p className="text-zinc-500 font-bold tracking-widest uppercase animate-pulse">{phase === 'ROLLING_DODGE' ? 'Rolling Dodge...' : 'Attempting Disarm...'}</p>
                                        </div>
                                    )}

                                    {phase === 'CHOICE' && (
                                        <div className="animate-in zoom-in duration-500 flex flex-col items-center gap-8">
                                            <div className="space-y-4">
                                                <div className="flex flex-col items-center">
                                                    <p className="text-emerald-500 font-black italic text-4xl drop-shadow-md mb-1">EVADED!</p>
                                                    <div className="bg-emerald-950/40 border border-emerald-500/30 px-4 py-1 rounded-full text-[10px] text-emerald-400 font-black tracking-widest uppercase">
                                                       Result: {roll} + {event.bonus} = {roll + event.bonus} (vs DC {targetDodge})
                                                    </div>
                                                </div>
                                                <p className="text-zinc-400 text-sm max-w-sm">You managed to slip through just in time. The trap remains active. What is the Syndicate's next move?</p>
                                            </div>
                                            <div className="flex gap-4">
                                                <div className="flex flex-col items-center gap-2">
                                                    <button 
                                                        onClick={() => { setPhase('DISARM_ROLLING'); startRoll('DISARM'); }}
                                                        className="bg-amber-600 hover:bg-amber-500 text-white font-black px-8 py-3 border-b-4 border-amber-800 transition-all hover:-translate-y-1 active:translate-y-0"
                                                    >
                                                        DISARM (DC {targetDisarm})
                                                    </button>
                                                    <span className="text-emerald-500 text-[9px] font-bold uppercase tracking-tighter italic">+{potentialReward} CREDITS IF SUCCESSFUL</span>
                                                </div>
                                                <div className="flex flex-col items-center gap-2">
                                                    <button 
                                                        onClick={() => onResult('SAFE_EXIT')}
                                                        className="bg-zinc-800 hover:bg-zinc-700 text-white font-black px-8 py-3 border-b-4 border-zinc-900 transition-all hover:-translate-y-1 active:translate-y-0"
                                                    >
                                                        STEP BACK
                                                    </button>
                                                    <span className="text-zinc-600 text-[9px] font-bold uppercase tracking-tighter italic">ROOM REMAINS TRAPPED</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {(phase === 'RESULT_FAIL_DODGE' || phase === 'RESULT_FAIL_DISARM') && (
                                        <div className="animate-in zoom-in duration-300 flex flex-col items-center gap-6">
                                            <div className="w-32 h-32 rounded-2xl bg-red-900 border-4 border-red-500 flex items-center justify-center text-5xl font-mono font-black text-white shadow-[0_0_40px_rgba(220,38,38,0.5)]">
                                                {roll}
                                            </div>
                                            <div className="text-center space-y-4">
                                                <p className="text-red-500 font-black text-4xl italic tracking-tighter mb-1">
                                                    {phase === 'RESULT_FAIL_DODGE' ? 'TRAP TRIGGERED!' : 'DISARM FAILED!'}
                                                </p>
                                                <p className="text-zinc-400 text-sm max-w-sm leading-relaxed">
                                                    {phase === 'RESULT_FAIL_DODGE' 
                                                        ? `The Syndicate was too slow! The ${trapInfo.name} has been activated, inflicting heavy damage on all party members.`
                                                        : `The attempt to neutralize the hazard backfired! The ${trapInfo.name} snapped, catching the team in its reach.`}
                                                </p>
                                                <div className="bg-red-950/40 border border-red-500/30 px-4 py-1 rounded-full text-[10px] text-red-400 font-black tracking-widest uppercase inline-block">
                                                    Loss: -{potentialDamage}% HP for entire party
                                                </div>
                                                <div className="pt-4">
                                                    <button 
                                                        onClick={() => onResult('DAMAGE')}
                                                        className="bg-red-600 hover:bg-red-500 text-white font-black px-12 py-3 rounded tracking-widest transition-all hover:scale-105"
                                                    >
                                                        ACCEPT FATE
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {phase === 'RESULT_SUCCESS' && (
                                        <div className="animate-in zoom-in duration-300 flex flex-col items-center gap-4">
                                            <div className="w-32 h-32 rounded-2xl bg-emerald-900 border-4 border-emerald-500 flex items-center justify-center text-5xl font-mono font-black text-white shadow-[0_0_40px_rgba(16,185,129,0.5)]">
                                                {roll}
                                            </div>
                                            <div className="text-center">
                                                <p className="text-emerald-500 font-black text-4xl italic tracking-tighter mb-1">SUCCESSFULLY DISARMED!</p>
                                                <div className="bg-emerald-950/40 border border-emerald-500/30 px-4 py-1 rounded-full text-[10px] text-emerald-400 font-black tracking-widest uppercase mb-4">
                                                    Final Roll: {roll} + {event.bonus} = {roll + event.bonus} (vs DC {targetDisarm})
                                                </div>
                                                <button 
                                                    onClick={() => onResult('DISARMED', potentialReward)}
                                                    className="bg-emerald-600 hover:bg-emerald-500 text-white font-black px-12 py-3 rounded tracking-widest transition-all hover:scale-105"
                                                >
                                                    COLLECT {potentialReward} CREDITS
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Footer Stats Component */}
                            <div className="bg-zinc-900/50 p-6 flex flex-col items-center gap-4 border-t border-zinc-800">
                                <div className="w-full flex flex-col gap-2">
                                    <div className="flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-zinc-500 border-b border-zinc-800 pb-2">
                                        <span>Syndicate Intel: Party Avg {event.bonusType}</span>
                                        <span className="text-amber-500">{Math.floor(heroes.filter(h => h.hp > 0).reduce((acc, h) => acc + (event.bonusType === 'SPD' ? h.getSPD() : h.getDEF()), 0) / heroes.filter(h => h.hp > 0).length)} (Yields +{event.bonus} Bonus)</span>
                                    </div>
                                    <div className="flex justify-center gap-4 text-[9px] font-bold text-zinc-600 tracking-tighter uppercase whitespace-nowrap">
                                        <span className={event.bonus === 0 ? 'text-amber-500/80' : ''}>Avg 0-4 = +0</span>
                                        <span className="text-zinc-800">|</span>
                                        <span className={event.bonus === 1 ? 'text-amber-500/80' : ''}>Avg 5-9 = +1</span>
                                        <span className="text-zinc-800">|</span>
                                        <span className={event.bonus === 2 ? 'text-amber-500/80' : ''}>Avg 10-14 = +2</span>
                                        <span className="text-zinc-800">|</span>
                                        <span className={event.bonus === 3 ? 'text-amber-500/80' : ''}>Avg 15-19 = +3</span>
                                        <span className="text-zinc-800">|</span>
                                        <span className={event.bonus >= 4 ? 'text-amber-500/80' : ''}>Avg 20+ = +4</span>
                                    </div>
                                </div>
                                <div className="flex justify-center gap-4">
                                    {heroes.filter(h => h.hp > 0).map((h, i) => {
                                        const statVal = event.bonusType === 'SPD' ? h.getSPD() : h.getDEF();
                                        return (
                                            <div key={i} className={`flex items-center gap-2 bg-black/40 px-3 py-2 rounded border transition-all ${statVal >= 15 ? 'border-amber-500/50 shadow-[0_0_10px_rgba(245,158,11,0.2)]' : 'border-zinc-800'}`}>
                                                <div className="w-6 h-6 rounded-full overflow-hidden border border-zinc-700">
                                                    <img src={`assets/${h.imageId}.png`} className="w-full h-full object-cover" />
                                                </div>
                                                <span className={`text-[10px] font-bold ${statVal >= 15 ? 'text-amber-500' : 'text-zinc-400'}`}>
                                                    {statVal} {event.bonusType}
                                                </span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

        const getCardTiltAngle = (unit) => {
            const seedSource = `${unit?.id || ''}-${unit?.name || ''}-${unit?.imageId || ''}`;
            let hash = 0;
            for (let i = 0; i < seedSource.length; i++) {
                hash = ((hash << 5) - hash) + seedSource.charCodeAt(i);
                hash |= 0;
            }
            // Stable tilt with clear visibility and bidirectional lean.
            const direction = (((hash ^ (hash >>> 16)) & 1) === 0) ? -1 : 1;
            const magnitude = 1 + ((Math.abs(hash) % 31) / 10); // 1.0 -> 4.0
            return Number((direction * magnitude).toFixed(2));
        };

        const Card = ({ unit, party = [], isSelected = false }) => {
            if (!unit) return null;
            const roleInfo = ROLES[unit.role] || ROLES.DPS;
            const heroSkillLabel = unit.trait?.name || unit.skills?.[0]?.name || unit.role || 'Operative';
            const cardSkills = (unit.skills || []).slice(0, 3);
            const getSkillIcon = (skill = {}) => {
                if (skill.type === 'heal') return '✚';
                if (skill.type === 'damage') return '⚔';
                return '✦';
            };
            
            // Seeded random tilt for 'tabletop' feel (-3 to +3 degrees)
            const tiltAngle = getCardTiltAngle(unit);
            
            const attackDirection = unit.isHero ? '-translate-x-7' : 'translate-x-7';
            const strikeDirection = unit.isHero ? '-translate-x-12' : 'translate-x-12';
            const returnDirection = unit.isHero ? 'translate-x-0' : 'translate-x-0';
            const attackMotionClass = unit.attackPhase === 'advance'
                ? attackDirection
                : unit.attackPhase === 'strike'
                    ? strikeDirection
                    : unit.attackPhase === 'return'
                        ? returnDirection
                        : 'translate-x-0';
            const roleBadgeTone = unit.role === 'TANK'
                ? 'bg-amber-500/95'
                : unit.role === 'HEALER'
                    ? 'bg-emerald-500/95'
                    : 'bg-rose-500/95';
            const positionFrameTone = unit.positionLine === 'VANGUARD'
                ? 'border-amber-700/90 shadow-[0_0_22px_rgba(217,119,6,0.25)]'
                : 'border-sky-700/90 shadow-[0_0_22px_rgba(2,132,199,0.25)]';
            const positionArtTone = unit.positionLine === 'VANGUARD'
                ? 'from-amber-500/18 via-transparent to-transparent'
                : 'from-sky-500/18 via-transparent to-transparent';

            // Safe Stat Access (resilience for raw hero objects)
            const getUnitATK = () => unit.getATK ? unit.getATK(party) : (unit.atk || 0);
            const getUnitDEF = () => unit.getDEF ? unit.getDEF(party) : (unit.def || 0);
            const getUnitSPD = () => unit.getSPD ? unit.getSPD(party) : (unit.spd || 0);
            const imageId = unit.imageId || `hero_${unit.name?.toLowerCase() || 'unknown'}`;

            return (
                <div
                    data-unit-id={unit.id}
                    style={{ transform: `rotate(${tiltAngle}deg)` }}
                    className={`relative w-[170px] h-[245px] bg-[#0c0c0c] border-2 rounded-xl flex flex-col group transition-all duration-300 shadow-[0_20px_50px_rgba(0,0,0,0.85)]
                        ${isSelected ? 'ring-4 ring-amber-500 shadow-[0_24px_70px_rgba(245,158,11,0.55)] border-amber-400 z-50 scale-110' : 'border-zinc-800 hover:border-zinc-600 hover:scale-[1.02]'}
                        ${unit.hp <= 0 ? 'grayscale opacity-60' : ''}
                        ${unit.hitShake ? 'animate-hit-shake' : ''}
                        ${unit.isActing ? 'ring-2 ring-white/50 z-30' : ''}
                        ${attackMotionClass}
                    `}>
                    {/* LEADER CROWN (Popped outside overflow) */}
                    {unit.isLeader && unit.hp > 0 && (
                        <div className="absolute -top-7 -right-3 text-3xl z-40 drop-shadow-[0_4px_12px_rgba(0,0,0,0.9)] animate-bounce-slow" style={{ animationDuration: '3s' }}>👑</div>
                    )}

                    {/* FULL-BLEED CHARACTER ART */}
                    <div className={`absolute inset-0 rounded-xl overflow-hidden bg-zinc-950 ${unit.hitShake ? 'animate-hit-shake' : ''}`}>
                        <img
                            src={`assets/${unit.imageId || `hero_${unit.name?.toLowerCase() || 'unknown'}`}.png`}
                            alt={unit.name}
                            className={`w-full h-full object-cover object-top transition-transform duration-500
                                ${unit.isPopping ? 'scale-125 -translate-y-4 brightness-125 z-50 animate-frame-pop' : 'scale-100'}`}
                        />
                        {/* Readability gradient for bottom text plate */}
                        <div className="absolute inset-0 bg-gradient-to-t from-black/95 via-black/45 to-black/20" />

                        {unit.hp <= 0 && (
                            <div className="absolute inset-0 bg-black/60 flex items-center justify-center">
                                <span className="text-red-600 font-black text-xl tracking-tighter italic uppercase drop-shadow-[0_0_10px_rgba(0,0,0,1)]">SLAIN</span>
                            </div>
                        )}
                    </div>

                    {/* VERTICAL STAT COLUMN (RIGHT SIDE) */}
                    <div className="absolute right-1.5 top-[85px] -translate-y-1/2 flex flex-col gap-1.5 z-40">
                        {/* ATK TOKEN */}
                        <div className="group relative flex items-center">
                            <div className="w-8 h-8 rounded-full bg-black/60 backdrop-blur-md border border-rose-500/50 flex flex-col items-center justify-center shadow-lg transform transition-transform group-hover:scale-110">
                                <span className="text-[8px] leading-none mb-0.5">⚔️</span>
                                <span className="text-[10px] font-black text-rose-400 leading-none">{getUnitATK()}</span>
                            </div>
                        </div>
                        {/* DEF TOKEN */}
                        <div className="group relative flex items-center">
                            <div className="w-8 h-8 rounded-full bg-black/60 backdrop-blur-md border border-amber-500/50 flex flex-col items-center justify-center shadow-lg transform transition-transform group-hover:scale-110">
                                <span className="text-[8px] leading-none mb-0.5">🛡️</span>
                                <span className="text-[10px] font-black text-amber-400 leading-none">{getUnitDEF()}</span>
                            </div>
                        </div>
                        {/* SPD TOKEN */}
                        <div className="group relative flex items-center">
                            <div className="w-8 h-8 rounded-full bg-black/60 backdrop-blur-md border border-cyan-500/50 flex flex-col items-center justify-center shadow-lg transform transition-transform group-hover:scale-110">
                                <span className="text-[8px] leading-none mb-0.5">⚡</span>
                                <span className="text-[10px] font-black text-cyan-400 leading-none">{getUnitSPD()}</span>
                            </div>
                        </div>
                    </div>

                    {/* ATTRIBUTE CAPSULES (TOP LEFT) */}
                    <div className="absolute left-2 top-2 flex flex-col gap-1 z-40">
                         {/* Role Icon */}
                         <div className={`w-7 h-7 rounded-lg border border-white/20 flex items-center justify-center shadow-lg backdrop-blur-md ${roleBadgeTone}`}>
                            <span className="text-xs drop-shadow-md">{roleInfo.icon}</span>
                        </div>
                    </div>

                    {/* SKILL STACK (ABOVE INDUSTRIAL LINE) */}
                    {cardSkills.length > 0 && (
                        <div className="absolute bottom-[58px] left-2 right-10 z-40 flex flex-col gap-1">
                            {cardSkills.map((skill, idx) => (
                                <div key={`${skill.name}-${idx}`} className="relative">
                                    <div className="bg-black/55 border border-white/10 rounded px-1.5 py-0.5 text-[8px] font-black text-zinc-100 uppercase tracking-tight flex items-center justify-between gap-2">
                                        <span className="group relative truncate cursor-help">
                                            {getSkillIcon(skill)} {skill.name}
                                            <span className="absolute bottom-full mb-1 left-0 w-44 p-2 bg-black/95 text-[9px] text-zinc-300 rounded border border-zinc-700 hidden group-hover:block z-50 shadow-2xl normal-case">
                                                <span className="font-black text-cyan-400 mb-1 uppercase tracking-wide leading-none block">{skill.name}</span>
                                                <span>{skill.type === 'heal' ? 'Healing' : 'Damage'} skill • Power {skill.val ?? 0}</span>
                                            </span>
                                        </span>
                                        <span className={`${skill.type === 'heal' ? 'text-emerald-300' : 'text-rose-300'}`}>{skill.val ?? 0}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* INDUSTRIAL FOOTER PLATE (NAME/ROLE) */}
                    <div className="absolute bottom-0 left-0 right-0 z-40 rounded-b-xl overflow-hidden">
                        {/* Industrial Border (The Grating) */}
                        <div className="h-1.5 w-full bg-[repeating-linear-gradient(90deg,transparent,transparent_2px,#3f3f46_2px,#3f3f46_4px)] opacity-60 border-y border-white/10" />
                        
                        <div className="bg-gradient-to-t from-black/90 via-black/55 to-transparent backdrop-blur-[1px] p-2 pt-3 flex flex-col items-center">
                             {/* HP BAR (INTEGRATED) */}
                            <div className="w-full h-1 bg-black/80 rounded-full border border-white/5 overflow-hidden relative mb-1.5">
                                <div
                                    style={{ width: `${((unit.hp || unit.maxHp || 1) / (unit.maxHp || 1)) * 100}%` }}
                                    className="absolute left-0 top-0 h-full bg-gradient-to-r from-red-600 to-rose-500 shadow-[0_0_8px_rgba(225,29,72,0.4)]"
                                />
                                {(unit.atb !== undefined) && (
                                    <div
                                        style={{ width: `${unit.atb || 0}%` }}
                                        className={`absolute left-0 bottom-0 h-[1.5px] transition-all duration-100 ${(unit.atb || 0) >= 100 ? 'bg-yellow-300' : 'bg-cyan-500/60'}`}
                                    />
                                )}
                            </div>

                            <h3 className="text-[13px] font-black text-white italic tracking-tight leading-none uppercase drop-shadow-lg mb-0.5">
                                {unit.name || 'Champion'}
                            </h3>
                            <p className="text-[8px] font-black text-zinc-400 tracking-[0.2em] uppercase leading-none opacity-80">
                                <span className="group relative inline-flex cursor-help">
                                    {heroSkillLabel}
                                    {unit.trait && (
                                        <span className="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 w-44 p-2 bg-black/95 text-[9px] text-zinc-300 rounded border border-zinc-700 hidden group-hover:block z-50 normal-case tracking-normal shadow-2xl">
                                            <span className="font-black text-amber-500 mb-1 uppercase tracking-widest leading-none block">{unit.trait.name}</span>
                                            <span>{unit.trait.description}</span>
                                        </span>
                                    )}
                                </span>
                            </p>
                        </div>
                    </div>

                    {/* SIGNAL OVERLAYS (FLARE/COMBAT TEXT) */}
                    {unit.isCharging && (
                        <div className={`absolute inset-0 z-[70] border-4 border-${unit.chargeColor || 'amber'}-400 animate-flare-charge pointer-events-none shadow-[inset_0_0_20px_rgba(251,191,36,0.6)]`} />
                    )}
                    {unit.activeSigil && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center pointer-events-none">
                            <span className="text-7xl drop-shadow-[0_0_20px_rgba(255,255,255,0.8)] animate-sigil-appear">{unit.activeSigil}</span>
                        </div>
                    )}
                    {(unit.vfx || []).map((effect) => (
                        <div key={effect.id} className={`absolute left-1/2 top-1/3 -translate-x-1/2 -translate-y-1/2 font-black text-2xl drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] pointer-events-none animate-float-up z-[80] ${effect.type === 'damage' ? 'text-red-500' : 'text-emerald-400'}`} style={{ WebkitTextStroke: '1px black' }}>
                            {effect.text}
                        </div>
                    ))}
                    {unit.showImpact && (
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-[90]">
                            <div className="relative w-16 h-16 rounded-full border-2 border-amber-100 bg-gradient-to-br from-amber-300 to-orange-500 animate-impact-pop" />
                        </div>
                    )}
                </div>
            );
        };

        // --- BATTLE PHASE COMPONENT ---
        const BattlePhase = ({ heroes, setHeroes, packSetup, onBattleEnd }) => {
            const [isPaused, setIsPaused] = useState(true);
            const [hasStarted, setHasStarted] = useState(false);
            const [winner, setWinner] = useState(null);
            const [battleLog, setBattleLog] = useState([`Encountered enemies! Waiting for authorization...`]);
            const [isLogExpanded, setIsLogExpanded] = useState(false);
            const [boardShake, setBoardShake] = useState(false);
            const [projectiles, setProjectiles] = useState([]);
            const [slashBursts, setSlashBursts] = useState([]);

            // Multipack enemies from the map encounter
            const [enemies, setEnemies] = useState(packSetup);

            const log = (msg) => setBattleLog(prev => [msg, ...prev].slice(0, 5));

            const getCardCenter = (unitId) => {
                const cardEl = document.querySelector(`[data-unit-id="${unitId}"]`);
                if (!cardEl) return null;
                const rect = cardEl.getBoundingClientRect();
                return {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
            };

            const getProjectileProfile = (ability = {}) => {
                const name = (ability?.name || '').toLowerCase();
                const isHeal = ability?.type === 'heal';
                const isMelee = /slash|smash|crash|slam|bite|stab|strike|tremor|fang|backstab|siphon/.test(name);
                const isSwordStrike = /sword|slash|strike|backstab|stab/.test(name);
                const isFireSpell = /fire|flame|burn|heat|dragon breath|forge/.test(name);
                const isArrowShot = /arrow|shot/.test(name);

                if (isHeal) {
                    return {
                        motion: 'curve',
                        lineColor: 'rgba(34, 197, 94, 0.9)',
                        glowColor: 'rgba(74, 222, 128, 0.75)',
                        coreColor: '#dcfce7',
                        width: 4,
                        effect: 'default'
                    };
                }

                if (isMelee) {
                    return {
                        motion: 'straight',
                        lineColor: 'rgba(220, 38, 38, 0.95)',
                        glowColor: 'rgba(248, 113, 113, 0.75)',
                        coreColor: '#fee2e2',
                        width: 7,
                        effect: isSwordStrike ? 'slash' : 'default'
                    };
                }

                if (isFireSpell) {
                    return {
                        motion: 'curve',
                        lineColor: 'rgba(239, 68, 68, 0.95)',
                        glowColor: 'rgba(252, 165, 165, 0.75)',
                        coreColor: '#fee2e2',
                        width: 5,
                        effect: 'fireball'
                    };
                }

                if (isArrowShot) {
                    return {
                        motion: 'straight',
                        lineColor: 'rgba(59, 130, 246, 0.92)',
                        glowColor: 'rgba(125, 211, 252, 0.75)',
                        coreColor: '#e0f2fe',
                        width: 4,
                        effect: 'default'
                    };
                }

                return {
                    motion: 'curve',
                    lineColor: 'rgba(59, 130, 246, 0.9)',
                    glowColor: 'rgba(96, 165, 250, 0.72)',
                    coreColor: '#dbeafe',
                    width: 4,
                    effect: 'default'
                };
            };

            const spawnProjectile = (caster, target, ability) => {
                const projectileStyle = getProjectileProfile(ability);
                requestAnimationFrame(() => {
                    const start = getCardCenter(caster.id);
                    const end = getCardCenter(target.id);
                    if (!start || !end) return;

                    const dx = end.x - start.x;
                    const dy = end.y - start.y;
                    const distance = Math.hypot(dx, dy);
                    const perpX = distance > 0 ? -dy / distance : 0;
                    const perpY = distance > 0 ? dx / distance : 0;
                    const arcStrength = projectileStyle.motion === 'curve' ? Math.min(150, Math.max(85, distance * 0.32)) : 0;
                    const midX = (start.x + end.x) / 2 + perpX * arcStrength;
                    const midY = (start.y + end.y) / 2 + perpY * arcStrength;
                    const path = projectileStyle.motion === 'straight'
                        ? `M ${start.x} ${start.y} L ${end.x} ${end.y}`
                        : `M ${start.x} ${start.y} Q ${midX} ${midY} ${end.x} ${end.y}`;

                    const projectile = {
                        id: Date.now() + Math.random(),
                        type: projectileStyle.motion,
                        style: projectileStyle,
                        path
                    };

                    setProjectiles(prev => [...prev, projectile]);

                    if (projectileStyle.effect === 'slash') {
                        const slashId = Date.now() + Math.random();
                        const impactDelay = projectileStyle.motion === 'straight' ? 260 : 410;
                        setTimeout(() => {
                            setSlashBursts(prev => [...prev, { id: slashId, x: end.x, y: end.y, angle: Math.atan2(dy, dx) * (180 / Math.PI) }]);
                            setTimeout(() => {
                                setSlashBursts(prev => prev.filter(s => s.id !== slashId));
                            }, 240);
                        }, impactDelay);
                    }

                    setTimeout(() => {
                        setProjectiles(prev => prev.filter(p => p.id !== projectile.id));
                    }, projectileStyle.motion === 'straight' ? 360 : 520);
                });
            };

            const handleAbilityProc = async (unit, ability) => {
                // If the unit has a trait, it's a "High impact" event!
                const isSpecial = unit.trait !== null;
                
                unit.isCharging = true;
                unit.chargeColor = ability.type === 'heal' ? 'blue' : 'rose';
                if (unit.trait) unit.chargeColor = 'amber';
                
                // Sigil mapping
                unit.activeSigil = ability.type === 'heal' ? '✨' : '⚔️';
                if (unit.trait) {
                    const traitIcons = { 'overclock': '⚡', 'moonlight_rain': '🌙', 'soul_reaper': '🧛' };
                    unit.activeSigil = traitIcons[unit.trait.id] || '🌟';
                }

                // Trigger React Re-render
                setHeroes([...heroes]);
                setEnemies([...enemies]);

                // Anticipation Delay (Flare filling up)
                await new Promise(r => setTimeout(r, 450));

                unit.isCharging = false;
                unit.activeSigil = null;
                setHeroes([...heroes]);
                setEnemies([...enemies]);
            };

            useEffect(() => {
                if (!isPaused && heroes.length > 0 && enemies.length > 0) {
                    // Battle Start Auras
                    const heroIronAura = heroes.some(h => h.trait?.id === 'iron_aura' && h.hp > 0);
                    const heroInspire = heroes.some(h => h.trait?.id === 'inspire' && h.hp > 0);
                    if (heroIronAura) log("🛡️ Aura of Iron protects the heroes!");
                    if (heroInspire) log("🎺 Inspire bolsters hero speed!");
                }
            }, []);

            useEffect(() => {
                if (isPaused) return;
                let lastTime = performance.now();
                const timerId = setInterval(() => {
                    const now = performance.now();
                    const dt = Math.min((now - lastTime) / 1000, 0.1);
                    lastTime = now;
                    setHeroes(prev => {
                        const next = [...prev];
                    const heroInspire = next.some(h => h.trait?.id === 'inspire' && h.hp > 0);
                    const enemyInspire = enemies.some(e => e.trait?.id === 'inspire' && e.hp > 0);

                    next.forEach(h => { if (h.hp > 0 && !h.isActing) h.updateAtb(dt, heroInspire ? 1.05 : 1.0); });
                    return next;
                });
                setEnemies(prev => {
                    const next = [...prev];
                    const heroInspire = heroes.some(h => h.trait?.id === 'inspire' && h.hp > 0);
                    const enemyInspire = next.some(e => e.trait?.id === 'inspire' && e.hp > 0);

                    next.forEach(e => { if (e.hp > 0 && !e.isActing) e.updateAtb(dt, enemyInspire ? 1.05 : 1.0); });
                    return next;
                });
                }, 16);
                return () => clearInterval(timerId);
            }, [isPaused]);

            const heroesRef = useRef(heroes);
            const enemiesRef = useRef(enemies);
            useEffect(() => {
                heroesRef.current = heroes;
                enemiesRef.current = enemies;
            }, [heroes, enemies]);

            useEffect(() => {
                if (isPaused) return;
                const tick = setInterval(() => {
                    const currentHeroes = heroesRef.current;
                    const currentEnemies = enemiesRef.current;
                    const readyHero = currentHeroes.find(h => h.atb >= 100 && !h.isActing && h.hp > 0);
                    if (readyHero) executeTurn(readyHero, true);
                    const readyEnemy = currentEnemies.find(e => e.atb >= 100 && !e.isActing && e.hp > 0);
                    if (readyEnemy) executeTurn(readyEnemy, false);
                }, 100);
                return () => clearInterval(tick);
            }, [isPaused]);

            const executeTurn = async (unit, isHero) => {
                unit.isActing = true;
                
                // Morgra Perk: Blood Priest (Battle Regen)
                const leader = heroes.find(h => h.isLeader);
                if (leader?.name === 'Morgra' && isHero && unit.hp > 0) {
                    const regen = Math.max(1, Math.floor(unit.maxHp * 0.05));
                    unit.hp = Math.min(unit.maxHp, unit.hp + regen);
                    unit.addVfx(`+${regen}`, 'heal');
                    unit.healSparkle = true;
                    log(`🩸 Blood Priest: ${unit.name} heals ${regen} HP`);
                    setTimeout(() => {
                        unit.healSparkle = false;
                        setHeroes([...heroes]);
                    }, 800);
                }

                unit.atb = 0;
                let selectedAbility;
                let target;

                if (unit.role === 'HEALER') {
                    const lowAlly = [...(isHero ? heroes : enemies)].sort((a,b) => (a.hp/a.maxHp) - (b.hp/b.maxHp))[0];
                    if (lowAlly && (lowAlly.hp / lowAlly.maxHp) < 0.7) {
                        target = lowAlly;
                        selectedAbility = unit.abilities.find(a => a.type === 'heal') || unit.abilities[0];
                    }
                }

                if (!target) {
                    const foes = isHero ? enemies : heroes;
                    const livingFoes = foes.filter(u => u.hp > 0);
                    if (livingFoes.length === 0) return;

                    const vanguardFoes = livingFoes.filter(u => u.positionLine === 'VANGUARD');
                    const isInfiltrator = unit.trait?.id === 'infiltrator';
                    const targetPool = (vanguardFoes.length > 0 && !isInfiltrator) ? vanguardFoes : livingFoes;

                    target = targetPool[Math.floor(Math.random() * targetPool.length)];
                    const damageAbilities = unit.abilities.filter(a => a.type === 'damage');
                    selectedAbility = damageAbilities.length > 0 ? damageAbilities[Math.floor(Math.random() * damageAbilities.length)] : unit.abilities[0];
                }

                // PHASE 1: Anticipation (Flare & Sigil)
                await handleAbilityProc(unit, selectedAbility);

                unit.lastAction = selectedAbility.name;
                unit.attackPhase = 'advance';
                log(`${unit.name} casts ${selectedAbility.name}`);
                setHeroes([...heroes]);
                setEnemies([...enemies]);
                spawnProjectile(unit, target, selectedAbility);

                setTimeout(() => {
                    unit.attackPhase = 'strike';
                    unit.isPopping = true;
                    target.impactPulse = true;
                    
                    if (selectedAbility.type === 'damage') {
                        setBoardShake(true);
                        setTimeout(() => setBoardShake(false), 400);
                    }

                    setHeroes([...heroes]);
                    setEnemies([...enemies]);

                    if (selectedAbility.type === 'heal') {
                        // Elara: Moonlight Rain (25% chance to heal party)
                        const isMoonlightRain = unit.trait?.id === 'moonlight_rain' && Math.random() < 0.25;
                        const targetsToHeal = isMoonlightRain ? (isHero ? heroes : enemies).filter(p => p.hp > 0) : [target];

                        if (isMoonlightRain) {
                            unit.traitGlow = true;
                            log(`🌙 Moonlight Rain triggers!`);
                            unit.addVfx("Moonlight Rain!", "heal");
                            setTimeout(() => {
                                unit.traitGlow = false;
                                setHeroes([...heroes]);
                                setEnemies([...enemies]);
                            }, 1200);
                        }

                        targetsToHeal.forEach(t => {
                            let amount = selectedAbility.val;
                            // Morgra: Blood Pact (+40% power)
                            if (unit.trait?.id === 'blood_pact') {
                                amount = Math.floor(amount * 1.4);
                            }
                            
                            t.hp = Math.min(t.maxHp, t.hp + amount);
                            t.addVfx(`+${amount}`, 'heal');
                            t.healSparkle = true;
                            setTimeout(() => {
                                t.healSparkle = false;
                                setHeroes([...heroes]);
                                setEnemies([...enemies]);
                            }, 450);
                        });

                        // Pay the blood price if Morgra
                        if (unit.trait?.id === 'blood_pact') {
                            unit.traitGlow = true;
                            unit.hp = Math.max(1, unit.hp - 5);
                            unit.addVfx(`BLOOD PACT -5`, 'damage');
                            setTimeout(() => {
                                unit.traitGlow = false;
                                setHeroes([...heroes]);
                                setEnemies([...enemies]);
                            }, 800);
                        }
                    } else {
                        let amount = selectedAbility.val;

                        // --- OFFENSIVE TRAITS ---
                        // Leora: Eagle Eye (50% DEF ignore)
                        // Kael Perk: Marksman (15% DEF ignore vs Rearguard)
                        const leader = (isHero ? heroes : enemies).find(h => h.isLeader);
                        let ignoreDef = unit.trait?.id === 'eagle_eye' ? 0.5 : 0;
                        if (leader?.name === 'Kael' && target.positionLine === 'REARGUARD') {
                            ignoreDef = Math.max(ignoreDef, 0.15);
                        }
                        
                        const effectiveDef = Math.floor(target.getDEF(isHero ? enemies : heroes) * (1 - ignoreDef));

                        // Defense logic integration
                        amount = Math.max(1, amount - Math.floor(effectiveDef / 2));

                        // Kael: Steady Aim (+25% damage to REARGUARD)
                        if (unit.trait?.id === 'steady_aim' && target.positionLine === 'REARGUARD') {
                            amount = Math.floor(amount * 1.25);
                        }

                        // Rearguard Protection: 25% damage mitigation
                        if (target.positionLine === 'REARGUARD') amount = Math.floor(amount * 0.75);

                        // --- DEFENSIVE TRAITS ---
                        // Valerius: Aura of Iron (10% global reduction)
                        const party = isHero ? heroes : enemies;
                        const auraActive = party.some(p => p.trait?.id === 'iron_aura' && p.hp > 0);
                        if (auraActive && target.isHero === isHero) { 
                            amount = Math.floor(amount * 0.9);
                        }

                        target.hp = Math.max(0, target.hp - amount);

                        // Grimm: Undying (Revive once per combat)
                        if (target.hp <= 0 && target.trait?.id === 'undying' && !target.hasRevived) {
                            target.hp = 1;
                            target.hasRevived = true;
                            target.traitGlow = true;
                            target.addVfx(`UNDYING!`, 'heal');
                            log(`🛡️ ${target.name} refuses to fall!`);
                            setTimeout(() => target.traitGlow = false, 1500);
                        }

                        target.addVfx(`-${amount}`, 'damage');
                        target.hitShake = true;
                        target.showImpact = true;
                        setTimeout(() => {
                            target.hitShake = false;
                            target.showImpact = false;
                            setHeroes([...heroes]);
                            setEnemies([...enemies]);
                        }, 320);

                        // --- ON-HIT TRAITS ---
                        // Borum: Sunder (DEF Reduction)
                        if (unit.trait?.id === 'sunder' && amount > 0) {
                            target.def = Math.max(0, target.def - 5);
                            target.addVfx(`DEF Down`, 'damage');
                        }

                        // Vex: Soul Reaper (HP for kill)
                        if (target.hp <= 0 && unit.trait?.id === 'soul_reaper') {
                            unit.hp = Math.min(unit.maxHp, unit.hp + 10);
                            unit.traitGlow = true;
                            unit.addVfx(`SOUL REAP +10`, 'heal');
                            log(`🧛 ${unit.name} reaps a soul!`);
                            setTimeout(() => unit.traitGlow = false, 1000);
                        }

                        // --- PASSIVES INTEGRATION ---
                        const unitPassives = unit.getPassives();
                        const targetPassives = target.getPassives();

                        // LIFESTEAL (Hero/Enemy Attacker)
                        if (unitPassives.includes('lifesteal')) {
                            const healAmount = Math.floor(amount * 0.2);
                            unit.hp = Math.min(unit.maxHp, unit.hp + healAmount);
                            unit.addVfx(`+${healAmount}`, 'heal');
                            log(`🩸 ${unit.name} siphons ${healAmount} HP!`);
                        }

                        // THORNS (Target Reflects)
                        if (targetPassives.includes('thorns') && amount > 0) {
                            const reflectDmg = 5;
                            unit.hp = Math.max(0, unit.hp - reflectDmg);
                            unit.addVfx(`-${reflectDmg}`, 'damage');
                            log(`🌵 Thorns deals ${reflectDmg} damage to ${unit.name}!`);
                        }

                        // Draka: Dragon Scales (Reflect 6)
                        if (target.trait?.id === 'dragon_scales' && amount > 0) {
                            const reflectDmg = 6;
                            unit.hp = Math.max(0, unit.hp - reflectDmg);
                            unit.addVfx(`-${reflectDmg}`, 'damage');
                            log(`🐲 Scales reflect ${reflectDmg} to ${unit.name}!`);
                        }
                    }

                    setTimeout(() => {
                        target.impactPulse = false;
                        unit.attackPhase = 'return';
                        setHeroes([...heroes]);
                        setEnemies([...enemies]);
                    }, 120);

                    setTimeout(() => {
                        // QUICKENING (Post-turn ATB)
                        unit.isActing = false;
                        unit.isPopping = false;
                        unit.attackPhase = 'idle';
                        target.impactPulse = false;
                        target.hitShake = false;
                        target.showImpact = false;
                        target.healSparkle = false;
                        const unitPassivesFinal = unit.getPassives();
                        if (unitPassivesFinal.includes('quickening') && Math.random() < 0.15) {
                            unit.atb = 50;
                            log(`⚡ ${unit.name} found an opening! (+50% ATB)`);
                        }

                        // Krix: Overclock (Turn reset)
                        if (unit.trait?.id === 'overclock' && Math.random() < 0.15) {
                            unit.atb = 100;
                            unit.traitGlow = true;
                            log(`⚡ ${unit.name} is OVERCLOCKED!`);
                            unit.addVfx("OVERCLOCK!", "damage");
                            setTimeout(() => {
                                unit.traitGlow = false;
                                setHeroes([...heroes]);
                                setEnemies([...enemies]);
                            }, 1000);
                        }

                        setHeroes([...heroes]);
                        setEnemies([...enemies]);

                        const aliveHeroes = heroes.filter(h => h.hp > 0).length;
                        const aliveEnemies = enemies.filter(e => e.hp > 0).length;
                        if (aliveHeroes === 0) {
                            setIsPaused(true);
                            setWinner('DEFEAT');
                            log("⚠️ MISSION TERMINATED.");
                        } else if (aliveEnemies === 0) {
                            setIsPaused(true);
                            setWinner('VICTORY');
                            log("✅ THREAT ELIMINATED.");
                        }
                    }, 260);
                }, 340);
            };

            const handlePlayClick = () => {
                if (!hasStarted) setHasStarted(true);
                setIsPaused(!isPaused);
            };

            return (
                <div className={`h-screen w-screen bg-neutral-950 text-white flex flex-col items-center relative animate-in fade-in duration-500 overflow-hidden ${boardShake ? 'animate-board-shake' : ''}`}>
                    <svg className="absolute inset-0 z-40 pointer-events-none overflow-visible">
                        <defs>
                            <radialGradient id="fireballGradient" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stopColor="#fef9c3" />
                                <stop offset="45%" stopColor="#fb923c" />
                                <stop offset="100%" stopColor="#dc2626" />
                            </radialGradient>
                        </defs>
                        {projectiles.map((p) => (
                            <g key={p.id}>
                                {p.type === 'curve' && (
                                    <>
                                        <path
                                            d={p.path}
                                            className="spell-arc-trail"
                                            style={{ stroke: p.style.lineColor, strokeWidth: p.style.width }}
                                        />
                                        <path
                                            d={p.path}
                                            className="spell-arc-trail-soft"
                                            style={{ stroke: p.style.glowColor, strokeWidth: p.style.width + 3 }}
                                        />
                                    </>
                                )}
                                {p.type === 'straight' && (
                                    <path
                                        d={p.path}
                                        className="straight-arc-trail"
                                        style={{ stroke: p.style.lineColor, strokeWidth: p.style.width }}
                                    />
                                )}
                                <circle
                                    r={p.type === 'straight' ? 5 : 8}
                                    className={p.type === 'straight' ? 'arrow-projectile-core' : 'spell-projectile-core'}
                                    style={{
                                        fill: p.style.effect === 'fireball' ? 'url(#fireballGradient)' : p.style.coreColor,
                                        filter: `drop-shadow(0 0 9px ${p.style.glowColor})`
                                    }}
                                >
                                    <animateMotion dur={p.type === 'straight' ? '340ms' : '500ms'} path={p.path} fill="freeze" />
                                </circle>
                                {p.style.effect === 'fireball' && (
                                    <>
                                        <circle r="13" className="fireball-aura">
                                            <animateMotion dur="500ms" path={p.path} fill="freeze" />
                                        </circle>
                                        <circle r="3" className="fireball-ember ember-1">
                                            <animateMotion dur="500ms" path={p.path} fill="freeze" />
                                        </circle>
                                        <circle r="2.5" className="fireball-ember ember-2">
                                            <animateMotion dur="500ms" path={p.path} fill="freeze" />
                                        </circle>
                                        <circle r="2" className="fireball-ember ember-3">
                                            <animateMotion dur="500ms" path={p.path} fill="freeze" />
                                        </circle>
                                    </>
                                )}
                                <polygon
                                    points="-20,-6 14,0 -20,6"
                                    className="arrow-head"
                                    style={{ fill: p.style.lineColor, filter: `drop-shadow(0 0 6px ${p.style.glowColor})` }}
                                >
                                    <animateMotion dur={p.type === 'straight' ? '340ms' : '500ms'} path={p.path} rotate="auto" fill="freeze" />
                                </polygon>
                            </g>
                        ))}
                        {slashBursts.map((s) => (
                            <g key={s.id} transform={`translate(${s.x} ${s.y}) rotate(${s.angle})`} className="sword-slash-burst">
                                <path d="M -44 -9 Q 0 -22 46 -8" className="sword-slash-main" />
                                <path d="M -35 4 Q 2 -6 34 6" className="sword-slash-echo" />
                            </g>
                        ))}
                    </svg>
                    <main className="relative z-10 flex-1 flex flex-row items-center justify-between w-full max-w-[1400px] px-6 py-4 overflow-hidden mx-auto gap-8">


                        {/* LEFT SIDE: ENEMIES */}
                        <div className="flex-1 flex justify-end">
                            {/* Enemy Rearguard (Far left) */}
                            <div className="flex flex-col gap-4 opacity-90 scale-95 origin-right translate-x-6 z-10 justify-center">
                                {enemies.filter(e => e.positionLine === 'REARGUARD').map(unit => <Card key={unit.id} unit={unit} party={enemies} />)}
                            </div>
                            {/* Enemy Vanguard (Inner left) */}
                            <div className="flex flex-col gap-4 z-20 justify-center min-w-[170px]">
                                {enemies.filter(e => e.positionLine === 'VANGUARD').map(unit => <Card key={unit.id} unit={unit} party={enemies} />)}
                            </div>
                        </div>

                        {/* ENGAGEMENT DIVIDER (Vertical) */}
                        <div className="relative h-full max-h-96 w-px bg-gradient-to-b from-transparent via-zinc-700 to-transparent flex flex-col items-center justify-center shrink-0">
                            <div className="absolute top-1/2 -translate-y-1/2 bg-neutral-950 border border-red-800/50 py-4 px-1 text-[7px] uppercase tracking-widest font-black text-red-500 whitespace-nowrap shadow-[0_0_15px_rgba(220,38,38,0.2)]" style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)' }}>
                                COMBAT ENGAGED
                            </div>
                        </div>

                        {/* RIGHT SIDE: HEROES */}
                        <div className="flex-1 flex justify-start">
                            {/* Hero Vanguard (Inner right) */}
                            <div className="flex flex-col gap-4 z-20 justify-center min-w-[170px]">
                                {heroes.filter(h => h.positionLine === 'VANGUARD').map(unit => <Card key={unit.id} unit={unit} party={heroes} />)}
                            </div>
                            {/* Hero Rearguard (Far right) */}
                            <div className="flex flex-col gap-4 opacity-90 scale-95 origin-left -translate-x-6 z-10 justify-center">
                                {heroes.filter(h => h.positionLine === 'REARGUARD').map(unit => <Card key={unit.id} unit={unit} party={heroes} />)}
                            </div>
                        </div>
                    </main>

                    <section className="relative z-20 w-full bg-neutral-900/95 border-t border-zinc-800/80 shadow-[0_-6px_20px_rgba(0,0,0,0.7)] px-4 py-2 flex items-end justify-between min-h-[72px] gap-3">
                        <div className="flex-1 flex items-end">
                            <div className={`transition-all duration-300 ease-out bg-black/60 shadow-inner border border-zinc-800/60 rounded ${isLogExpanded ? 'w-full max-w-md p-2 h-24' : 'w-auto p-1.5 h-8'} overflow-hidden`}>
                                <button
                                    onClick={() => setIsLogExpanded(prev => !prev)}
                                    className="text-[9px] uppercase font-black text-zinc-300 tracking-widest border border-zinc-700/80 bg-zinc-900/80 px-2 py-0.5 rounded hover:text-white hover:border-zinc-500 transition-colors"
                                >
                                    {isLogExpanded ? 'Log ▾' : 'Log ▸'}
                                </button>
                                {isLogExpanded && (
                                    <div className="mt-2 space-y-1 pr-1">
                                        {battleLog.map((log, i) => (
                                            <div key={i} className={`text-[10px] font-mono leading-tight truncate ${i === 0 ? 'text-yellow-400' : 'text-zinc-500 opacity-70'}`}>
                                                {`> ${log}`}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="flex flex-col items-center flex-shrink-0">
                            <button
                                onClick={handlePlayClick}
                                className={`w-11 h-11 rounded-full flex items-center justify-center text-lg shadow-lg border-2 transition-all active:scale-95
                                    ${isPaused ? 'bg-emerald-600 border-emerald-400 hover:bg-emerald-500 text-white' : 'bg-rose-700 border-rose-500 hover:bg-rose-600 text-white'}`}
                            >
                                {isPaused ? "▶" : "⏸"}
                            </button>
                            <span className={`mt-1 text-[8px] font-black uppercase tracking-widest ${isPaused ? 'text-emerald-400' : 'text-rose-500'}`}>
                                {!hasStarted ? "Initialize" : isPaused ? "Paused" : "Running"}
                            </span>
                        </div>

                        <div className="flex-1 flex flex-col items-end justify-center ml-2 hidden sm:flex">
                            <div className="text-sm md:text-lg font-black text-red-500 italic tracking-tight">BATTLE PHASE</div>
                            <div className="text-[7px] md:text-[8px] text-zinc-600 uppercase tracking-widest font-bold">Tactical Deployment</div>
                        </div>
                    </section>

                    {winner && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-xl animate-in fade-in duration-500">
                            <h1 className={`text-6xl md:text-8xl font-black tracking-tighter italic uppercase mb-4
                                ${winner === 'VICTORY' ? 'text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,0.5)]' : 'text-red-600 drop-shadow-[0_0_30px_rgba(220,38,38,0.5)]'}`}>
                                {winner}
                            </h1>
                            <p className="text-zinc-400 tracking-[0.4em] uppercase font-bold text-sm mb-12">
                                {winner === 'VICTORY' ? "Threat eliminated. Returning to sector navigation." : "The syndicate has fallen."}
                            </p>
                            <button
                                onClick={() => onBattleEnd(winner)}
                                className="px-8 py-3 outline outline-2 outline-white text-white font-black tracking-widest hover:bg-white hover:text-black transition-colors"
                            >
                                {winner === 'VICTORY' ? "CONTINUE EXPLORATION" : "ABORT EXPEDITION"}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- EXPLORATION PHASE COMPONENT ---
        const ExplorationPhase = ({ 
            floor, heroes, credits, 
            enemies, setEnemies, 
            interactables, setInteractables,
            dungeonLayout, setDungeonLayout,
            tileBgs, setTileBgs,
            playerPos, setPlayerPos,
            exploredCells, setExploredCells,
            trapDamagePulse, onEncounter, onNextFloor, onPrevFloor, onTrap, onWin, onHeal, openInventory, isLocked 
        }) => {
            const GRID_SIZE = window.DungeonGenerator?.GRID_SIZE || 9;
            const [revealingCells, setRevealingCells] = useState(new Set());
            const mapFrameRef = useRef(null);
            const [frameSize, setFrameSize] = useState({ w: 0, h: 0 });
            const [stairsPrompt, setStairsPrompt] = useState(null);
            const [viewportSize, setViewportSize] = useState({
                w: typeof window !== 'undefined' ? window.innerWidth : 1440,
                h: typeof window !== 'undefined' ? window.innerHeight : 900
            });
            const actionLocked = isLocked || !!stairsPrompt;

            const STAIR_MODAL_BACKGROUNDS = [
                'assets/background-stairs-1.png',
                'assets/background-stairs-2.png',
                'assets/background-stairs-3.png',
                'assets/background-stairs-1.jpg',
                'assets/background-stairs-2.jpg',
                'assets/background-stairs-3.jpg'
            ];

            const buildStairsPrompt = (direction) => {
                const currentFloor = floor;
                const targetFloor = direction === 'UP' ? Math.max(1, floor - 1) : floor + 1;
                const selectedBackground = STAIR_MODAL_BACKGROUNDS[Math.floor(Math.random() * STAIR_MODAL_BACKGROUNDS.length)];

                const downNarrations = [
                    `Your boots pause at the lip of the abyss while the stairwell whispers promises of greater peril. You may stay at floor ${currentFloor}, or go down to floor ${targetFloor} to seek harsher trials and richer spoils.`,
                    `The stone below drinks your torchlight and invites the Syndicate deeper into danger. Stay at floor ${currentFloor}, or go down to floor ${targetFloor} and test your fate against stronger horrors.`,
                    `A cold draft rises from beneath, carrying the scent of iron and old blood. Hold position at floor ${currentFloor}, or go down to floor ${targetFloor} in pursuit of deadlier glory.`
                ];
                const upNarrations = [
                    `A safer draft rolls down from above, offering a path to regroup and breathe. You may stay at floor ${currentFloor}, or go up to floor ${targetFloor} to reposition your syndicate.`,
                    `The upper passage glows faintly, a rare promise of steadier footing. Remain at floor ${currentFloor}, or go up to floor ${targetFloor} and reset your approach.`,
                    `The stair behind you creaks like an old sentinel urging caution. Keep to floor ${currentFloor}, or go up to floor ${targetFloor} before diving deeper again.`
                ];
                const narrationPool = direction === 'UP' ? upNarrations : downNarrations;
                const narration = narrationPool[Math.floor(Math.random() * narrationPool.length)];

                return {
                    direction,
                    currentFloor,
                    targetFloor,
                    narration,
