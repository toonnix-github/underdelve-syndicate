<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underdelve Syndicate - Digital Tabletop</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- React UMD for maximum stability -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- GAME ENGINE LOGIC ---
        class Item {
            constructor(name, type, statBoost, icon, rarity = 'Common', passives = []) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.name = name;
                this.type = type; // 'WEAPON', 'HAT', 'CHEST', 'SHOES', 'CONSUMABLE'
                this.statBoost = statBoost; // { atk: X, def: Y, spd: Z, heal: H }
                this.icon = icon;
                this.rarity = rarity; // 'Common', 'Uncommon', 'Rare', 'Epic', 'Legendary'
                this.passives = passives; // [{ id: 'lifesteal', name: 'Lifesteal', description: 'Heal for 20% of dmg' }]
            }
        }

        class Combatant {
            constructor(name, role, maxHp, speed, power, def, imageId, abilities, positionLine, isHero = true) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.name = name;
                this.role = role;
                this.maxHp = maxHp;
                this.hp = maxHp;
                this.speed = speed;
                this.power = power;
                this.def = def;
                this.imageId = imageId;
                this.abilities = abilities;
                this.positionLine = positionLine || 'VANGUARD'; // 'VANGUARD' or 'REARGUARD'
                this.atb = 0;
                this.isDead = false;
                this.isHero = isHero;
                this.lastAction = "";
                this.isActing = false;
                this.vfx = []; // Store active floating text
                this.equipment = {
                    weapon1: null,
                    weapon2: null,
                    hat: null,
                    chest: null,
                    shoes: null
                };
            }

            getPassives() {
                const passives = [];
                Object.values(this.equipment).forEach(item => {
                    if (item && item.passives) {
                        item.passives.forEach(p => passives.push(p.id));
                    }
                });
                return passives;
            }

            getATK() {
                let total = this.power;
                Object.values(this.equipment).forEach(item => { if (item?.statBoost?.atk) total += item.statBoost.atk; });
                return total;
            }

            getDEF() {
                let total = this.def;
                Object.values(this.equipment).forEach(item => { if (item?.statBoost?.def) total += item.statBoost.def; });
                return total;
            }

            getSPD() {
                let total = this.speed;
                Object.values(this.equipment).forEach(item => { if (item?.statBoost?.spd) total += item.statBoost.spd; });
                return total;
            }

            updateAtb(dt) {
                if (this.hp <= 0) return;
                const increment = (this.getSPD() * dt) * 5;
                this.atb = Math.min(100, this.atb + increment);
            }

            addVfx(text, type) {
                const id = Date.now() + Math.random();
                this.vfx.push({ id, text, type });
                // Clean up vfx after 1 second
                setTimeout(() => {
                    this.vfx = this.vfx.filter(v => v.id !== id);
                }, 1000);
            }
        }

        const ROLES = {
            TANK: { color: 'amber', icon: '🛡️' },
            HEALER: { color: 'emerald', icon: '✨' },
            DPS: { color: 'rose', icon: '⚔️' }
        };

        // --- REACT COMPONENTS ---

        const Card = ({ unit }) => {
            const roleInfo = ROLES[unit.role] || ROLES.DPS;

            return (
                <div
                    className={`relative w-[96px] h-[140px] rounded-lg shadow-xl overflow-hidden border-[3px] transition-all duration-500 transform
                        ${unit.isHero ? 'bg-zinc-900 border-zinc-700' : 'bg-red-950 border-red-900'}
                        ${unit.isActing ? 'ring-2 ring-yellow-400 -translate-y-2 scale-110 z-20' : 'translate-y-0 scale-100'}
                        ${unit.hp <= 0 ? 'opacity-40 grayscale' : 'opacity-100'} flex flex-col`}
                >
                    {/* Character Art */}
                    <div className="w-full h-[55%] bg-zinc-900 relative border-b border-black">
                        <img src={`assets/${unit.imageId}.png`} alt={unit.name} className="w-full h-full object-cover opacity-90" />
                        {unit.hp <= 0 && <div className="absolute inset-0 bg-black/80 flex items-center justify-center font-black text-red-600 text-[10px] tracking-widest uppercase shadow-black">Slain</div>}
                    </div>

                    {/* MTG Type Line */}
                    <div className="w-full h-4 bg-gradient-to-r from-zinc-800 via-zinc-700 to-zinc-800 border-b border-black flex items-center justify-between px-1 shadow-inner relative">
                        <h3 className="text-zinc-100 font-bold text-[9px] leading-none truncate">{unit.name}</h3>
                        <span className="text-[8px] drop-shadow-md">{roleInfo.icon}</span>
                        {/* Position Badge */}
                        <div className={`absolute -top-2 -right-1 w-3 h-3 rounded-full border border-black flex items-center justify-center ${unit.positionLine === 'VANGUARD' ? 'bg-amber-600' : 'bg-blue-600'}`}>
                            <span className="text-[5px] font-black text-white">{unit.positionLine === 'VANGUARD' ? 'V' : 'R'}</span>
                        </div>
                    </div>

                    {/* Stats Box */}
                    <div className="flex-1 px-1 py-1 flex flex-col justify-end bg-zinc-900 bg-opacity-80">
                        {/* ATK / DEF / SPD */}
                        <div className="flex justify-between items-center text-[7px] mb-0.5 px-0.5">
                            <span className="text-rose-500 font-bold" title="Attack">⚔️{unit.getATK()}</span>
                            <span className="text-amber-500 font-bold" title="Defense">🛡️{unit.getDEF()}</span>
                            <span className="text-blue-400 font-bold" title="Speed">⚡{unit.getSPD()}</span>
                        </div>

                        {/* HP Bar */}
                        <div className="w-full h-1 bg-zinc-800 rounded-full mb-0.5 border border-black overflow-hidden relative">
                            <div
                                style={{ width: `${(unit.hp / unit.maxHp) * 100}%` }}
                                className="absolute left-0 top-0 h-full bg-gradient-to-r from-red-600 to-rose-500 transition-all duration-300"
                            />
                        </div>
                        <div className="flex justify-end text-[7px] text-zinc-400 mb-1 font-mono">
                            <span className="text-white font-bold">{Math.ceil(unit.hp)}/{unit.maxHp}</span>
                        </div>

                        {/* ATB Bar */}
                        <div className="w-full h-[2px] bg-zinc-950 border-x border-black rounded-sm relative overflow-hidden">
                            <div
                                style={{ width: `${unit.atb}%` }}
                                className={`absolute left-0 top-0 h-full transition-all duration-100 ${unit.atb >= 100 ? 'bg-yellow-400 shadow-[0_0_10px_rgba(250,204,21,0.5)]' : 'bg-blue-600'}`}
                            />
                        </div>
                    </div>

                    {/* Action Overlay */}
                    {unit.isActing && (
                        <div className="absolute inset-0 flex items-center justify-center bg-black/40 animate-in fade-in zoom-in duration-300 pointer-events-none">
                            <div className="bg-yellow-400 text-black px-1 py-0.5 font-black text-[8px] transform -rotate-12 shadow-[0_5px_10px_rgba(0,0,0,0.8)] border border-white uppercase text-center leading-tight">
                                {unit.lastAction}
                            </div>
                        </div>
                    )}

                    {/* Floating Combat Text (VFX) */}
                    {unit.vfx.map((effect) => (
                        <div
                            key={effect.id}
                            className={`absolute left-1/2 top-1/3 -translate-x-1/2 -translate-y-1/2 font-black text-2xl drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] stroke-black pointer-events-none animate-float-up z-50
                                ${effect.type === 'damage' ? 'text-red-500' : 'text-emerald-400'}`}
                            style={{ WebkitTextStroke: '1px black' }}
                        >
                            {effect.text}
                        </div>
                    ))}
                </div>
            );
        };

        // --- BATTLE PHASE COMPONENT ---
        const BattlePhase = ({ heroes, setHeroes, packSetup, onBattleEnd }) => {
            const [isPaused, setIsPaused] = useState(true);
            const [hasStarted, setHasStarted] = useState(false);
            const [winner, setWinner] = useState(null);
            const [battleLog, setBattleLog] = useState([`Encountered enemies! Waiting for authorization...`]);

            // Multipack enemies from the map encounter
            const [enemies, setEnemies] = useState(packSetup);

            const log = (msg) => setBattleLog(prev => [msg, ...prev].slice(0, 5));

            useEffect(() => {
                if (isPaused) return;
                let lastTime = performance.now();
                const timerId = setInterval(() => {
                    const now = performance.now();
                    const dt = Math.min((now - lastTime) / 1000, 0.1);
                    lastTime = now;
                    setHeroes(prev => {
                        const next = [...prev];
                        next.forEach(h => { if (h.hp > 0 && !h.isActing) h.updateAtb(dt); });
                        return next;
                    });
                    setEnemies(prev => {
                        const next = [...prev];
                        next.forEach(e => { if (e.hp > 0 && !e.isActing) e.updateAtb(dt); });
                        return next;
                    });
                }, 16);
                return () => clearInterval(timerId);
            }, [isPaused]);

            const heroesRef = useRef(heroes);
            const enemiesRef = useRef(enemies);
            useEffect(() => {
                heroesRef.current = heroes;
                enemiesRef.current = enemies;
            }, [heroes, enemies]);

            useEffect(() => {
                if (isPaused) return;
                const tick = setInterval(() => {
                    const currentHeroes = heroesRef.current;
                    const currentEnemies = enemiesRef.current;
                    const readyHero = currentHeroes.find(h => h.atb >= 100 && !h.isActing && h.hp > 0);
                    if (readyHero) executeTurn(readyHero, true);
                    const readyEnemy = currentEnemies.find(e => e.atb >= 100 && !e.isActing && e.hp > 0);
                    if (readyEnemy) executeTurn(readyEnemy, false);
                }, 100);
                return () => clearInterval(tick);
            }, [isPaused]);

            const executeTurn = (unit, isHero) => {
                unit.isActing = true;
                unit.atb = 0;
                let target;
                let selectedAbility;

                if (unit.role === 'HEALER') {
                    const lowAlly = [...(isHero ? heroes : enemies)].sort((a,b) => (a.hp/a.maxHp) - (b.hp/b.maxHp))[0];
                    if ((lowAlly.hp / lowAlly.maxHp) < 0.7) {
                        target = lowAlly;
                        selectedAbility = unit.abilities.find(a => a.type === 'heal') || unit.abilities[0];
                    }
                }

                if (!target) {
                    const foes = isHero ? enemies : heroes;
                    const livingFoes = foes.filter(u => u.hp > 0);
                    if (livingFoes.length === 0) return;

                    // Vanguard mechanic: Prioritize front line if any exist
                    const vanguardFoes = livingFoes.filter(u => u.positionLine === 'VANGUARD');
                    const targetPool = vanguardFoes.length > 0 ? vanguardFoes : livingFoes;

                    target = targetPool[Math.floor(Math.random() * targetPool.length)];
                    const damageAbilities = unit.abilities.filter(a => a.type === 'damage');
                    selectedAbility = damageAbilities.length > 0 ? damageAbilities[Math.floor(Math.random() * damageAbilities.length)] : unit.abilities[0];
                }

                unit.lastAction = selectedAbility.name;
                log(`${unit.name} casts ${selectedAbility.name}`);

                setTimeout(() => {
                    if (selectedAbility.type === 'heal') {
                        const amount = selectedAbility.val;
                        target.hp = Math.min(target.maxHp, target.hp + amount);
                        target.addVfx(`+${amount}`, 'heal');
                    } else {
                        let amount = selectedAbility.val;

                        // Defense logic integration
                        amount = Math.max(1, amount - Math.floor(target.getDEF() / 2));

                        // Rearguard Protection: 25% damage mitigation
                        if (target.positionLine === 'REARGUARD') amount = Math.floor(amount * 0.75);

                        target.hp = Math.max(0, target.hp - amount);
                        target.addVfx(`-${amount}`, 'damage');

                        // --- PASSIVES INTEGRATION ---
                        const unitPassives = unit.getPassives();
                        const targetPassives = target.getPassives();

                        // LIFESTEAL (Hero/Enemy Attacker)
                        if (unitPassives.includes('lifesteal')) {
                            const healAmount = Math.floor(amount * 0.2);
                            unit.hp = Math.min(unit.maxHp, unit.hp + healAmount);
                            unit.addVfx(`+${healAmount}`, 'heal');
                            log(`🩸 ${unit.name} siphons ${healAmount} HP!`);
                        }

                        // THORNS (Target Reflects)
                        if (targetPassives.includes('thorns') && amount > 0) {
                            const reflectDmg = 5;
                            unit.hp = Math.max(0, unit.hp - reflectDmg);
                            unit.addVfx(`-${reflectDmg}`, 'damage');
                            log(`🌵 Thorns deals ${reflectDmg} damage to ${unit.name}!`);
                        }
                    }

                    // QUICKENING (Post-turn ATB)
                    unit.isActing = false;
                    const unitPassivesFinal = unit.getPassives();
                    if (unitPassivesFinal.includes('quickening') && Math.random() < 0.15) {
                        unit.atb = 50;
                        log(`⚡ ${unit.name} found an opening! (+50% ATB)`);
                    }

                    setHeroes([...heroes]);
                    setEnemies([...enemies]);

                    const aliveHeroes = heroes.filter(h => h.hp > 0).length;
                    const aliveEnemies = enemies.filter(e => e.hp > 0).length;
                    if (aliveHeroes === 0) {
                        setIsPaused(true);
                        setWinner('DEFEAT');
                        log("⚠️ MISSION TERMINATED.");
                    } else if (aliveEnemies === 0) {
                        setIsPaused(true);
                        setWinner('VICTORY');
                        log("✅ THREAT ELIMINATED.");
                    }
                }, 800);
            };

            const handlePlayClick = () => {
                if (!hasStarted) setHasStarted(true);
                setIsPaused(!isPaused);
            };

            return (
                <div className="h-screen w-screen bg-neutral-950 text-white flex flex-col items-center relative animate-in fade-in duration-500">
                    <main className="relative z-10 flex-1 flex flex-row items-center justify-between w-full max-w-5xl px-4 py-2 overflow-hidden mx-auto gap-4">

                        {/* LEFT SIDE: ENEMIES */}
                        <div className="flex-1 flex justify-end">
                            {/* Enemy Rearguard (Far left) */}
                            <div className="flex flex-col gap-2 opacity-80 scale-95 origin-right translate-x-4 z-10 justify-center">
                                {enemies.filter(e => e.positionLine === 'REARGUARD').map(unit => <Card key={unit.id} unit={unit} />)}
                            </div>
                            {/* Enemy Vanguard (Inner left) */}
                            <div className="flex flex-col gap-2 z-20 justify-center min-w-[96px]">
                                {enemies.filter(e => e.positionLine === 'VANGUARD').map(unit => <Card key={unit.id} unit={unit} />)}
                            </div>
                        </div>

                        {/* ENGAGEMENT DIVIDER (Vertical) */}
                        <div className="relative h-full max-h-96 w-px bg-gradient-to-b from-transparent via-zinc-700 to-transparent flex flex-col items-center justify-center shrink-0">
                            <div className="absolute top-1/2 -translate-y-1/2 bg-neutral-950 border border-red-800/50 py-4 px-1 text-[7px] uppercase tracking-widest font-black text-red-500 whitespace-nowrap shadow-[0_0_15px_rgba(220,38,38,0.2)]" style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)' }}>
                                COMBAT ENGAGED
                            </div>
                        </div>

                        {/* RIGHT SIDE: HEROES */}
                        <div className="flex-1 flex justify-start">
                            {/* Hero Vanguard (Inner right) */}
                            <div className="flex flex-col gap-2 z-20 justify-center min-w-[96px]">
                                {heroes.filter(h => h.positionLine === 'VANGUARD').map(unit => <Card key={unit.id} unit={unit} />)}
                            </div>
                            {/* Hero Rearguard (Far right) */}
                            <div className="flex flex-col gap-2 opacity-80 scale-95 origin-left -translate-x-4 z-10 justify-center">
                                {heroes.filter(h => h.positionLine === 'REARGUARD').map(unit => <Card key={unit.id} unit={unit} />)}
                            </div>
                        </div>
                    </main>

                    <section className="relative z-20 w-full bg-neutral-900 border-t-2 border-zinc-800/80 shadow-[0_-10px_30px_rgba(0,0,0,0.8)] px-6 py-4 flex items-center justify-between min-h-[120px]">
                        <div className="flex-1 bg-black/60 shadow-inner border border-zinc-800/50 rounded p-3 h-24 overflow-hidden mr-4 max-w-md">
                            <h4 className="text-[9px] uppercase font-black text-zinc-500 mb-1 tracking-widest border-b border-zinc-800/50 pb-1">Combat Log</h4>
                            <div className="space-y-1">
                                {battleLog.map((log, i) => (
                                    <div key={i} className={`text-[10px] font-mono leading-tight truncate ${i === 0 ? 'text-yellow-400' : 'text-zinc-500 opacity-60'}`}>
                                        {`> ${log}`}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="flex flex-col items-center flex-shrink-0">
                            <button
                                onClick={handlePlayClick}
                                className={`w-16 h-16 rounded-full flex items-center justify-center text-2xl shadow-xl border-4 transition-all active:scale-95
                                    ${isPaused ? 'bg-emerald-600 border-emerald-400 hover:bg-emerald-500 text-white' : 'bg-rose-700 border-rose-500 hover:bg-rose-600 text-white'}`}
                            >
                                {isPaused ? "▶" : "⏸"}
                            </button>
                            <span className={`mt-2 text-[9px] font-black uppercase tracking-widest ${isPaused ? 'text-emerald-400' : 'text-rose-500'}`}>
                                {!hasStarted ? "Initialize" : isPaused ? "Paused" : "Running"}
                            </span>
                        </div>

                        <div className="flex-1 flex flex-col items-end justify-center ml-4 hidden sm:flex">
                            <div className="text-xl md:text-2xl font-black text-red-500 italic tracking-tighter">BATTLE PHASE</div>
                            <div className="text-[8px] md:text-[9px] text-zinc-600 uppercase tracking-widest font-bold">Tactical Deployment</div>
                        </div>
                    </section>

                    {winner && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-xl animate-in fade-in duration-500">
                            <h1 className={`text-6xl md:text-8xl font-black tracking-tighter italic uppercase mb-4
                                ${winner === 'VICTORY' ? 'text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,0.5)]' : 'text-red-600 drop-shadow-[0_0_30px_rgba(220,38,38,0.5)]'}`}>
                                {winner}
                            </h1>
                            <p className="text-zinc-400 tracking-[0.4em] uppercase font-bold text-sm mb-12">
                                {winner === 'VICTORY' ? "Threat eliminated. Returning to sector navigation." : "The syndicate has fallen."}
                            </p>
                            <button
                                onClick={() => onBattleEnd(winner)}
                                className="px-8 py-3 outline outline-2 outline-white text-white font-black tracking-widest hover:bg-white hover:text-black transition-colors"
                            >
                                {winner === 'VICTORY' ? "CONTINUE EXPLORATION" : "ABORT EXPEDITION"}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- EXPLORATION PHASE COMPONENT ---
        const ExplorationPhase = ({ floor, enemies, setEnemies, onEncounter, onNextFloor, onPrevFloor, onTrap, onHeal, openInventory }) => {
            const GRID_SIZE = 7;

            // 1 = Walkable Path, 0 = Void/Wall
            const proceduralGenerateLayout = (size) => {
                let layout = Array(size).fill().map(() => Array(size).fill(0));
                let validTiles = [];

                // Spawn point
                layout[3][3] = 1;

                // Randomly generate 2 distinct rooms
                for (let r=0; r<2; r++) {
                    const rx = Math.floor(Math.random() * 4) + 1; // 1 to 4
                    const ry = Math.floor(Math.random() * 4) + 1; // 1 to 4
                    for(let y = ry; y < ry + 2; y++) {
                        for(let x = rx; x < rx + 3; x++) {
                            layout[y][x] = 1; // 3x2 rooms
                        }
                    }
                }

                // Primary structural cross (guarantees everything connects to center Spawn)
                for(let i=1; i<=5; i++) {
                    layout[3][i] = 1;
                    layout[i][3] = 1;
                }

                // Extra chaos paths
                for(let i=0; i<6; i++) {
                    const cx = Math.floor(Math.random() * 5) + 1;
                    const cy = Math.floor(Math.random() * 5) + 1;
                    layout[cy][cx] = 1;
                    if(Math.random() > 0.5) layout[cy][cx+1] = 1;
                    else layout[cy+1][cx] = 1;
                }

                // Strict Outer Walls
                for(let i=0; i<size; i++) {
                    layout[0][i] = 0; layout[6][i] = 0;
                    layout[i][0] = 0; layout[i][6] = 0;
                }

                // Catalog walkable non-spawn tiles
                for(let y = 1; y < size-1; y++) {
                    for(let x = 1; x < size-1; x++) {
                        if (layout[y][x] === 1 && !(x===3 && y===3)) {
                            validTiles.push({x, y});
                        }
                    }
                }

                validTiles.sort(() => Math.random() - 0.5); // Shuffle
                return { layout, validTiles };
            };

            const [DUNGEON_LAYOUT, setDungeonLayout] = useState(Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0)));
            const [playerPos, setPlayerPos] = useState({ x: 3, y: 3 });
            const [exploredCells, setExploredCells] = useState(new Set(['3,3']));
            const [interactables, setInteractables] = useState([]);

            useEffect(() => {
                const { layout, validTiles } = proceduralGenerateLayout(GRID_SIZE);
                setDungeonLayout(layout);
                setPlayerPos({ x: 3, y: 3 });
                setExploredCells(new Set(['3,3']));

                const getLoc = () => validTiles.length > 0 ? validTiles.pop() : {x:3, y:3};

                if (floor === 1) {
                    setInteractables([
                        { id: 't1', ...getLoc(), type: 'TRAP' },
                        { id: 'c1', ...getLoc(), type: 'CHEST' },
                        { id: 's1', ...getLoc(), type: 'STAIRS' }
                    ]);
                } else if (floor >= 2) {
                    setInteractables([
                        { id: 't2', ...getLoc(), type: 'TRAP' },
                        { id: 'c2', ...getLoc(), type: 'CHEST' },
                        { id: 's2', ...getLoc(), type: 'STAIRS' },
                        { id: 'p2', x: 3, y: 3, type: 'PREV_FLOOR' }
                    ]);
                }

                // Route enemies onto randomized valid paths
                setEnemies(prev => prev.map(e => ({ ...e, ...getLoc() })));
            }, [floor]);


            // Handle Keyboard Movement
            useEffect(() => {
                const handleKeyDown = (e) => {
                    let dx = 0; let dy = 0;
                    if (e.key === 'ArrowUp' || e.key === 'w') dy = -1;
                    if (e.key === 'ArrowDown' || e.key === 's') dy = 1;
                    if (e.key === 'ArrowLeft' || e.key === 'a') dx = -1;
                    if (e.key === 'ArrowRight' || e.key === 'd') dx = 1;

                    if (dx !== 0 || dy !== 0) {
                        movePlayer(dx, dy);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [playerPos, enemies]);

            const movePlayer = (dx, dy) => {
                const newX = playerPos.x + dx;
                const newY = playerPos.y + dy;

                // Bounds & Wall Collision Check
                if (newX < 0 || newX >= GRID_SIZE || newY < 0 || newY >= GRID_SIZE) return;
                if (DUNGEON_LAYOUT[newY][newX] === 0) return;

                setPlayerPos({ x: newX, y: newY });

                // Update Fog of War
                setExploredCells(prev => {
                    const next = new Set(prev);
                    next.add(`${newX},${newY}`);
                    return next;
                });

                // Check Interactables
                const interactable = interactables.find(i => i.x === newX && i.y === newY);
                if (interactable) {
                    if (interactable.type === 'CHEST') {
                        onHeal();
                        setInteractables(prev => prev.filter(i => i.id !== interactable.id));
                    } else if (interactable.type === 'TRAP') {
                        onTrap();
                        setInteractables(prev => prev.filter(i => i.id !== interactable.id));
                    } else if (interactable.type === 'STAIRS') {
                        if (floor >= 2) {
                            alert("You survived Sector 09 MVP Demo!");
                            window.location.reload();
                        } else {
                            onNextFloor();
                        }
                        return; // Halt enemy move on floor transition
                    } else if (interactable.type === 'PREV_FLOOR') {
                        onPrevFloor();
                        return;
                    }
                }

                moveEnemies(newX, newY);
            };

            const moveEnemies = (newPlayerX, newPlayerY) => {
                const updatedEnemies = enemies.map(e => {
                    const moveDir = Math.floor(Math.random() * 5); // 0=none, 1=up, 2=down, 3=left, 4=right
                    let nextX = e.x; let nextY = e.y;

                    if (moveDir === 1 && e.y > 0 && DUNGEON_LAYOUT[e.y-1][e.x] === 1) nextY--;
                    else if (moveDir === 2 && e.y < GRID_SIZE - 1 && DUNGEON_LAYOUT[e.y+1][e.x] === 1) nextY++;
                    else if (moveDir === 3 && e.x > 0 && DUNGEON_LAYOUT[e.y][e.x-1] === 1) nextX--;
                    else if (moveDir === 4 && e.x < GRID_SIZE - 1 && DUNGEON_LAYOUT[e.y][e.x+1] === 1) nextX++;

                    return { ...e, x: nextX, y: nextY };
                });

                setEnemies(updatedEnemies);

                // Collision Check!
                const collidedEnemy = updatedEnemies.find(e => e.x === newPlayerX && e.y === newPlayerY);
                if (collidedEnemy) {
                    onEncounter(collidedEnemy);
                }
            };

            const cells = [];
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const isPlayer = playerPos.x === x && playerPos.y === y;
                    const enemy = enemies.find(e => e.x === x && e.y === y);
                    const intObj = interactables.find(i => i.x === x && i.y === y);

                    const isWall = DUNGEON_LAYOUT[y][x] === 0;
                    const isExplored = exploredCells.has(`${x},${y}`);

                    // Scouting Logic: Hidden traversable tiles adjacent to explored ones
                    const neighbors = [
                        {ux: x, uy: y-1}, {ux: x, uy: y+1}, {ux: x-1, uy: y}, {ux: x+1, uy: y}
                    ];
                    const isScouted = !isExplored && !isWall && neighbors.some(n =>
                        n.ux >= 0 && n.ux < GRID_SIZE && n.uy >= 0 && n.uy < GRID_SIZE &&
                        exploredCells.has(`${n.ux},${n.uy}`)
                    );

                    // Doorway Logic
                    const hasDoorN = y > 0 && DUNGEON_LAYOUT[y-1][x] === 1;
                    const hasDoorS = y < GRID_SIZE - 1 && DUNGEON_LAYOUT[y+1][x] === 1;
                    const hasDoorW = x > 0 && DUNGEON_LAYOUT[y][x-1] === 1;
                    const hasDoorE = x < GRID_SIZE - 1 && DUNGEON_LAYOUT[y][x+1] === 1;

                    const renderEdge = (direction, hasDoor) => {
                        const baseColor = isScouted ? "bg-zinc-800/40" : "bg-zinc-800";
                        if (direction === 'N') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute top-0 left-0 w-[20%] h-[2px] ${baseColor}`} /><div className={`absolute top-0 right-0 w-[20%] h-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute top-0 left-0 right-0 h-[2px] ${baseColor}`} />;
                        }
                        if (direction === 'S') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute bottom-0 left-0 w-[20%] h-[2px] ${baseColor}`} /><div className={`absolute bottom-0 right-0 w-[20%] h-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute bottom-0 left-0 right-0 h-[2px] ${baseColor}`} />;
                        }
                        if (direction === 'W') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute top-0 left-0 h-[20%] w-[2px] ${baseColor}`} /><div className={`absolute bottom-0 left-0 h-[20%] w-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute top-0 bottom-0 left-0 w-[2px] ${baseColor}`} />;
                        }
                        if (direction === 'E') {
                            return hasDoor
                                ? <React.Fragment><div className={`absolute top-0 right-0 h-[20%] w-[2px] ${baseColor}`} /><div className={`absolute bottom-0 right-0 h-[20%] w-[2px] ${baseColor}`} /></React.Fragment>
                                : <div className={`absolute top-0 bottom-0 right-0 w-[2px] ${baseColor}`} />;
                        }
                        return null;
                    };

                    const isStart = x === 3 && y === 3 && floor === 1;
                    const showTile = isExplored || isScouted;
                    const showEntity = isExplored;

                    cells.push(
                        <div key={`${x}-${y}`} className={`w-[10vh] h-[10vh] max-w-[14vw] max-h-[14vw] flex items-center justify-center relative transition-all duration-500
                            ${!showTile ? 'bg-transparent border-transparent opacity-0 scale-75' : 'bg-zinc-900 shadow-[inset_0_2px_15px_rgba(0,0,0,0.5)]'}
                            ${isScouted ? 'bg-zinc-950/40' : ''}
                        `}>
                            {/* Render Physical Walls & Doorways */}
                            {showTile && renderEdge('N', hasDoorN)}
                            {showTile && renderEdge('S', hasDoorS)}
                            {showTile && renderEdge('E', hasDoorE)}
                            {showTile && renderEdge('W', hasDoorW)}
                            {/* Path Decoration */}
                            {showTile && <span className="absolute top-1 left-1 text-[8px] text-zinc-700 pointer-events-none">{x},{y}</span>}
                            {showTile && (x+y)%2===0 && <div className="absolute inset-0 bg-white opacity-[0.02]" />}

                            {/* Scout Indicator */}
                            {isScouted && <span className="text-zinc-700 font-black text-xl select-none opacity-40">?</span>}

                            {/* Interactables (Only shown if explored) */}
                            {showEntity && showTile && intObj && (
                                <div className={`w-[5vh] h-[5vh] rounded shrink-0 shadow-lg flex items-center justify-center text-[3vh] z-0 ${intObj.type === 'CHEST' ? 'bg-amber-600' : intObj.type === 'TRAP' ? 'bg-zinc-700 text-red-500 font-black rotate-45' : intObj.type === 'PREV_FLOOR' ? 'bg-indigo-900 border-2 border-purple-500 animate-pulse' : 'bg-blue-800 border-2 border-cyan-400 animate-pulse'}`}>
                                    {intObj.type === 'CHEST' ? '🎁' : intObj.type === 'TRAP' ? 'X' : intObj.type === 'PREV_FLOOR' ? '↓' : '↑'}
                                </div>
                            )}

                            {/* Enemy Rendering (Fog check!) */}
                            {enemy && showEntity && showTile && (
                                <div className="w-[6vh] h-[6vh] rounded-full border-[3px] border-red-500 overflow-hidden shadow-[0_0_15px_rgba(239,68,68,0.5)] z-10 animate-pulse relative">
                                    <img src={`assets/${enemy.instances[0].imageId}.png`} className="w-full h-full object-cover" />
                                    {enemy.instances.length > 1 && (
                                        <div className="absolute top-0 right-0 bg-black/80 font-mono text-[1vh] text-white font-black w-[2vh] h-[2vh] flex items-center justify-center -translate-y-1 translate-x-1 outline outline-1 outline-red-500">
                                            {enemy.instances.length}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Player Avatar (Digital Tabletop Style) */}
                            {isPlayer && !isWall && isExplored && (
                                <div className="w-[7vh] h-[7vh] rounded-full border-2 border-blue-400 bg-zinc-900 overflow-hidden shadow-[0_0_20px_rgba(96,165,250,0.8)] z-20 transform transition-all duration-200 flex flex-col items-center justify-center gap-[2px]">
                                    <div className="flex justify-center w-full">
                                        <div className="w-[1.5vh] h-[1.5vh] rounded-full bg-amber-500 border border-black shadow-inner shrink-0" />
                                    </div>
                                    <div className="flex justify-center gap-[0.5vh] w-full relative">
                                        <div className="w-[1.5vh] h-[1.5vh] rounded-full bg-emerald-500 border border-black shadow-inner shrink-0" />
                                        <div className="w-[1.5vh] h-[1.5vh] rounded-full bg-purple-500 border border-black shadow-inner shrink-0" />
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                }
            }

            return (
                <div className="h-screen w-screen bg-neutral-950 flex flex-col lg:flex-row items-stretch lg:justify-between relative animate-in fade-in duration-500 text-white tracking-widest font-sans overflow-hidden">
                    <section className="w-full lg:flex-1 h-[58vh] sm:h-[62vh] lg:h-screen px-3 py-3 sm:px-4 sm:py-4 lg:p-5 flex items-center justify-start">
                        <div className="bg-zinc-950 p-[1vh] border-4 border-zinc-800 rounded-xl shadow-2xl backdrop-blur-md relative overflow-hidden flex-shrink-0">
                            {/* Fog Vignette Overlay */}
                            <div className="absolute inset-0 bg-radial-vignette opacity-80 pointer-events-none z-10" />

                            <div className="grid grid-cols-7 grid-rows-7 gap-1 relative z-0">
                                {cells}
                            </div>
                        </div>
                    </section>

                    <aside className="w-full lg:w-[380px] xl:w-[420px] bg-black/35 border-t-2 lg:border-t-0 lg:border-l-2 border-zinc-800 px-4 py-4 sm:px-6 lg:px-5 xl:px-6 flex flex-col gap-4 sm:gap-5 lg:gap-6 overflow-y-auto">
                        <div className="font-black italic tracking-widest border border-zinc-800 bg-black/60 px-4 py-2 drop-shadow-xl text-zinc-300 inline-block">
                            FLOOR {floor}
                        </div>

                        <div>
                            <h2 className="text-2xl sm:text-3xl font-black italic text-zinc-300">SECTOR 09 <span className="text-lg sm:text-xl text-zinc-600">DUNGEON GRID</span></h2>
                            <p className="text-xs text-zinc-500 uppercase mt-2">Explore the fog. Locate the <span className="text-blue-400 font-bold px-1">↑ STAIRS ↑</span> to proceed.</p>
                            <p className="text-xs text-zinc-500 uppercase mt-1">Intercept red signatures to engage hostiles.</p>
                        </div>

                        <button onClick={openInventory} className="bg-amber-600 hover:bg-amber-500 text-white font-black px-6 py-3 border-[3px] border-amber-800 shadow-[0_0_15px_rgba(217,119,6,0.6)] flex items-center justify-center gap-2 transition-all">
                            <span className="text-xl">🎒</span> PARTY STASH
                        </button>

                        <div className="bg-zinc-900/75 border-2 border-zinc-700 px-4 py-4 rounded-lg">
                            <p className="text-[11px] font-bold tracking-[0.2em] text-zinc-400 mb-3">MOVEMENT CONTROLS</p>
                            <div className="flex flex-col items-center gap-[1vh]">
                                <button onClick={() => movePlayer(0, -1)} className="w-[6vh] h-[6vh] min-w-12 min-h-12 bg-zinc-800 border-2 border-zinc-600 active:bg-zinc-700 text-white font-black text-xl rounded">↑</button>
                                <div className="flex gap-[1vh]">
                                    <button onClick={() => movePlayer(-1, 0)} className="w-[6vh] h-[6vh] min-w-12 min-h-12 bg-zinc-800 border-2 border-zinc-600 active:bg-zinc-700 text-white font-black text-xl rounded">←</button>
                                    <button onClick={() => movePlayer(0, 1)} className="w-[6vh] h-[6vh] min-w-12 min-h-12 bg-zinc-800 border-2 border-zinc-600 active:bg-zinc-700 text-white font-black text-xl rounded">↓</button>
                                    <button onClick={() => movePlayer(1, 0)} className="w-[6vh] h-[6vh] min-w-12 min-h-12 bg-zinc-800 border-2 border-zinc-600 active:bg-zinc-700 text-white font-black text-xl rounded">→</button>
                                </div>
                            </div>
                        </div>
                    </aside>
                </div>
            );
        };

        // --- INVENTORY PHASE COMPONENT ---
        const InventoryPhase = ({ heroes, setHeroes, inventory, setInventory, closeInventory }) => {
            const [selectedItem, setSelectedItem] = useState(null);
            const [healedHeroIndex, setHealedHeroIndex] = useState(null);

            const RARITY_COLORS = {
                'Common': 'text-zinc-400',
                'Uncommon': 'text-blue-400',
                'Rare': 'text-emerald-400',
                'Epic': 'text-purple-500',
                'Legendary': 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]'
            };

            const TYPE_COLORS = {
                'CONSUMABLE': 'bg-emerald-900/40 border-emerald-500/50',
                'DEFAULT': 'bg-zinc-950 border-zinc-700'
            };

            const handleUseItem = (heroIndex) => {
                if (!selectedItem || selectedItem.type !== 'CONSUMABLE') return;

                const healAmount = selectedItem.statBoost.heal || 0;

                setHeroes(prev => {
                    const next = [...prev];
                    const oldHero = next[heroIndex];

                    const newHero = Object.assign(Object.create(Object.getPrototypeOf(oldHero)), oldHero);
                    newHero.equipment = { ...oldHero.equipment };
                    newHero.hp = Math.min(newHero.maxHp, newHero.hp + healAmount);

                    next[heroIndex] = newHero;
                    return next;
                });

                setHealedHeroIndex(heroIndex);
                setTimeout(() => setHealedHeroIndex(null), 600);

                setInventory(prev => prev.filter(i => i.id !== selectedItem.id));
                setSelectedItem(null);
            };

            const handleEquip = (heroIndex, slot) => {
                if (!selectedItem) return;

                // Block consumables from being equipped
                if (selectedItem.type === 'CONSUMABLE') return;

                // Block mismatched item types
                if (selectedItem.type === 'WEAPON' && slot !== 'weapon1' && slot !== 'weapon2') {
                    alert("Must equip weapon in a weapon slot!");
                    return;
                }
                if (selectedItem.type !== 'WEAPON' && slot !== selectedItem.type.toLowerCase()) {
                    alert(`Must equip ${selectedItem.type} in the ${selectedItem.type} slot!`);
                    return;
                }

                const targetHero = heroes[heroIndex];
                const existingItem = targetHero.equipment[slot];

                // 1. Process Inventory Array
                let nextInv = inventory.filter(i => i.id !== selectedItem.id);
                if (existingItem) nextInv.push(existingItem);
                setInventory(nextInv);

                // 2. Process Hero State IMMUTABLY to survive React StrictMode double invocations
                setHeroes(prev => {
                    const next = [...prev];
                    const oldHero = next[heroIndex];

                    // Create new reference for Class Object
                    const newHero = Object.assign(Object.create(Object.getPrototypeOf(oldHero)), oldHero);
                    newHero.equipment = { ...oldHero.equipment };
                    newHero.equipment[slot] = selectedItem;

                    next[heroIndex] = newHero;
                    return next;
                });

                setSelectedItem(null);
            };

            const unequip = (heroIndex, slot) => {
                const targetHero = heroes[heroIndex];
                const item = targetHero.equipment[slot];
                if (!item) return;

                // 1. Process Inventory Array
                setInventory(inv => [...inv, item]);

                // 2. Process Hero State IMMUTABLY
                setHeroes(prev => {
                    const next = [...prev];
                    const oldHero = next[heroIndex];

                    const newHero = Object.assign(Object.create(Object.getPrototypeOf(oldHero)), oldHero);
                    newHero.equipment = { ...oldHero.equipment };
                    newHero.equipment[slot] = null;

                    next[heroIndex] = newHero;
                    return next;
                });
            };

            return (
                <div className="h-screen w-screen bg-zinc-950 flex flex-col p-8 text-white relative animate-in fade-in duration-300">
                    <button onClick={closeInventory} className="absolute top-6 right-6 font-black text-zinc-400 hover:text-white border-2 border-zinc-700 px-4 py-2">
                        RETURN TO SECTOR
                    </button>

                    <h2 className="text-4xl font-black italic tracking-widest text-amber-500 mb-8">GLOBAL STASH</h2>

                    <div className="flex flex-1 gap-8 overflow-hidden">

                        {/* LEFT: Inventory Cache */}
                        <div className="w-1/3 bg-zinc-900 border-2 border-zinc-800 p-4 overflow-y-auto rounded shadow-xl">
                            <h3 className="text-xl font-bold tracking-widest text-zinc-500 border-b border-zinc-800 pb-2 mb-4">UNASSIGNED LOOT</h3>
                            <div className="flex flex-wrap gap-2">
                                {inventory.length === 0 && <p className="text-zinc-600 text-sm italic">Stash is empty. Defeat monsters or find chests to scavenge gear.</p>}
                                {inventory.map(item => (
                                    <div
                                        key={item.id}
                                        onClick={() => setSelectedItem(selectedItem?.id === item.id ? null : item)}
                                        className={`w-full p-3 flex justify-between items-center cursor-pointer border-l-4 transition-all
                                            ${selectedItem?.id === item.id ? 'bg-amber-900 border-amber-500' : (TYPE_COLORS[item.type] || TYPE_COLORS['DEFAULT']) + ' hover:bg-zinc-800'}`}
                                    >
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">{item.icon}</span>
                                            <div className="flex flex-col">
                                                <span className={`font-bold text-sm tracking-widest ${RARITY_COLORS[item.rarity] || 'text-zinc-300'}`}>{item.name}</span>
                                                <span className="text-[10px] text-zinc-500 uppercase">{item.type} • {item.rarity}</span>
                                                {item.passives && item.passives.map(p => (
                                                    <span key={p.id} className="text-[9px] text-cyan-400 font-bold italic">✦ {p.name}: {p.description}</span>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="flex gap-2 text-xs font-black">
                                            {item.statBoost.atk && <span className="text-rose-500">⚔️+{item.statBoost.atk}</span>}
                                            {item.statBoost.def && <span className="text-amber-500">🛡️+{item.statBoost.def}</span>}
                                            {item.statBoost.spd && <span className="text-blue-400">⚡+{item.statBoost.spd}</span>}
                                            {item.statBoost.heal && <span className="text-emerald-400">💚+{item.statBoost.heal}</span>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* RIGHT: Heroes */}
                        <div className="flex-1 flex gap-4">
                            {heroes.map((hero, index) => (
                                <div
                                    key={hero.id}
                                    onClick={() => selectedItem?.type === 'CONSUMABLE' && handleUseItem(index)}
                                    className={`flex-1 border-2 p-4 rounded shadow-xl flex flex-col transition-all relative
                                        ${healedHeroIndex === index ? 'animate-heal-pulse' : ''}
                                        ${selectedItem?.type === 'CONSUMABLE' ? 'cursor-pointer hover:border-emerald-500 hover:bg-emerald-950/20 bg-emerald-900/10 border-emerald-800' : 'bg-zinc-900 border-zinc-800'}`}
                                >
                                    {healedHeroIndex === index && (
                                        <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-8 text-emerald-400 font-black text-2xl animate-float-up pointer-events-none">
                                            +40 HP
                                        </div>
                                    )}

                                    <div className="flex items-center gap-4 border-b border-zinc-800 pb-4 mb-4">
                                        <div className="relative">
                                            <img src={`assets/${hero.imageId}.png`} className="w-16 h-16 rounded border-2 border-zinc-700 object-cover" />
                                            {hero.hp <= 0 && <div className="absolute inset-0 bg-black/60 flex items-center justify-center text-red-500 font-bold text-[10px] uppercase">Slain</div>}
                                        </div>
                                        <div className="flex-1">
                                            <div className="flex justify-between items-center mb-1">
                                                <h4 className="font-black italic text-lg leading-none">{hero.name}</h4>
                                                <span className="text-[10px] bg-zinc-800 text-zinc-400 px-1 rounded uppercase">{hero.role}</span>
                                            </div>

                                            {/* HP BAR VISIBILITY */}
                                            <div className="w-full bg-zinc-800 h-2 rounded-full overflow-hidden border border-zinc-700 mb-1">
                                                <div
                                                    className="h-full bg-emerald-500 transition-all duration-500"
                                                    style={{ width: `${(hero.hp / hero.maxHp) * 100}%` }}
                                                />
                                            </div>
                                            <div className="flex justify-between text-[10px] font-bold">
                                                <span className={hero.hp < hero.maxHp * 0.3 ? 'text-red-500 animate-pulse' : 'text-zinc-500'}>
                                                    HP: {Math.floor(hero.hp)} / {hero.maxHp}
                                                </span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Equipment Slots */}
                                    <div className="flex-1 flex flex-col gap-2">
                                        {['weapon1', 'weapon2', 'hat', 'chest', 'shoes'].map(slot => {
                                            const item = hero.equipment[slot];
                                            let isValidSlot = false;
                                            if (selectedItem) {
                                                if (selectedItem.type === 'WEAPON' && (slot === 'weapon1' || slot === 'weapon2')) isValidSlot = true;
                                                if (selectedItem.type !== 'WEAPON' && slot === selectedItem.type.toLowerCase()) isValidSlot = true;
                                            }

                                            return (
                                                <div
                                                    key={slot}
                                                    onClick={() => selectedItem ? handleEquip(index, slot) : unequip(index, slot)}
                                                    className={`w-full p-2 border-2 flex items-center justify-between cursor-pointer transition-all
                                                        ${selectedItem
                                                            ? (isValidSlot ? 'border-dashed border-yellow-500 bg-yellow-900/40 hover:bg-yellow-800' : 'border-zinc-800 bg-zinc-950 opacity-30 cursor-not-allowed')
                                                            : 'border-zinc-800 bg-zinc-950 hover:border-red-500 hover:bg-red-950/20'}
                                                        ${!item && !selectedItem ? 'opacity-50' : ''}`}
                                                >
                                                    <span className="text-[10px] text-zinc-500 uppercase font-black w-16">{slot}</span>
                                                    {item ? (
                                                        <div className="flex flex-1 items-center justify-between">
                                                            <span className={`font-bold text-sm ${RARITY_COLORS[item.rarity] || 'text-zinc-300'}`}>{item.icon} {item.name}</span>
                                                            <div className="flex flex-col items-end gap-0.5">
                                                                <div className="flex gap-1 text-[10px]">
                                                                    {item.statBoost.atk && <span className="text-rose-500">+{item.statBoost.atk}</span>}
                                                                    {item.statBoost.def && <span className="text-amber-500">+{item.statBoost.def}</span>}
                                                                </div>
                                                                {item.passives && item.passives.map(p => (
                                                                    <span key={p.id} className="text-[8px] text-cyan-400 font-black italic uppercase leading-none">{p.name}</span>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <span className="flex-1 text-sm text-zinc-600 italic text-center">Empty</span>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    {selectedItem && (
                        <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-6 py-2 font-black italic uppercase tracking-widest shadow-[0_0_20px_rgba(234,179,8,0.5)] pointer-events-none">
                            Select an empty slot to assign {selectedItem.name}!
                        </div>
                    )}
                </div>
            );
        };

        const PASSIVES = {
            LIFESTEAL: { id: 'lifesteal', name: 'Lifesteal', description: 'Heal 20% of dmg dealt' },
            THORNS: { id: 'thorns', name: 'Thorns', description: 'Reflect 5 damage when hit' },
            QUICKENING: { id: 'quickening', name: 'Quickening', description: '15% chance to retain 50% ATB' }
        };

        // --- MASTER APP CONTROLLER ---
        const App = () => {
            const [gamePhase, setGamePhase] = useState('EXPLORATION'); // 'EXPLORATION' | 'BATTLE' | 'INVENTORY'
            const [floor, setFloor] = useState(1);
            const [activeEncounter, setActiveEncounter] = useState(null);

            // Phase 10: Global Party Models & Inventory Cache
            const [inventory, setInventory] = useState([
                new Item("Healing Potion", "CONSUMABLE", { heal: 40 }, "🧪", "Uncommon"),
                new Item("Healing Potion", "CONSUMABLE", { heal: 40 }, "🧪", "Uncommon")
            ]);
            const [heroes, setHeroes] = useState([
                new Combatant("Jax", "TANK", 120, 10, 8, 15, "hero_jax", [{name: 'Shield Bash', val: 12, type: 'damage'}, {name: 'Heavy Cleave', val: 18, type: 'damage'}], 'VANGUARD'),
                new Combatant("Elara", "HEALER", 70, 14, 15, 6, "hero_elara", [{name: 'Cure', val: 25, type: 'heal'}, {name: 'Holy Light', val: 40, type: 'heal'}], 'REARGUARD'),
                new Combatant("Kael", "DPS", 85, 18, 22, 10, "hero_kael", [{name: 'Piercing Shot', val: 30, type: 'damage'}, {name: 'Quick Volley', val: 20, type: 'damage'}], 'REARGUARD')
            ]);



            const generateLoot = () => {
                const tables = [
                    new Item("Iron Broadsword", "WEAPON", { atk: 15 }, "🗡️", "Common"),
                    new Item("Tower Shield", "WEAPON", { def: 12, spd: -2 }, "🛡️", "Uncommon"),
                    new Item("Leather Cowl", "HAT", { def: 5, spd: 4 }, "🎩", "Common"),
                    new Item("Chainmail Hauberk", "CHEST", { def: 18, spd: -3 }, "👕", "Uncommon"),
                    new Item("Quickstep Boots", "SHOES", { spd: 10 }, "👞", "Uncommon"),
                    new Item("Ruby Signet", "HAT", { atk: 10, def: 2 }, "💍", "Rare"),
                    new Item("Assassin Dagger", "WEAPON", { atk: 12, spd: 8 }, "🗡️", "Epic"),
                    new Item("Voidwalker Treads", "SHOES", { def: 8, spd: 15 }, "👞", "Legendary"),
                    new Item("Healing Potion", "CONSUMABLE", { heal: 40 }, "🧪", "Uncommon")
                ];

                let item = tables[Math.floor(Math.random() * tables.length)];

                // Roll for Passives on high-tier loot
                if (item.rarity === 'Epic' || item.rarity === 'Legendary') {
                    const passivePool = [PASSIVES.LIFESTEAL, PASSIVES.THORNS, PASSIVES.QUICKENING];
                    item.passives = [passivePool[Math.floor(Math.random() * passivePool.length)]];
                }

                return item;
            };

            const getEnemiesForFloor = (f) => {
                if (f === 2) {
                    return [
                        { id: 'e2_1', x: 2, y: 1, instances: [
                            new Combatant("Shadow Bat", "DPS", 50, 24, 12, 4, "enemy_bat", [{name: 'Fang Bite', val: 18, type: 'damage'}], 'VANGUARD', false),
                            new Combatant("Shadow Bat", "DPS", 50, 22, 12, 4, "enemy_bat", [{name: 'Fang Bite', val: 18, type: 'damage'}], 'REARGUARD', false)
                        ]},
                        { id: 'e2_2', x: 3, y: 5, instances: [
                            new Combatant("Ogre King", "TANK", 300, 8, 30, 20, "enemy_ogre", [{name: 'Ground Smash', val: 45, type: 'damage'}], 'VANGUARD', false)
                        ]}
                    ];
                }
                return [ // Floor 1
                    { id: 'e1', x: 1, y: 1, instances: [
                        new Combatant("Shadow Bat", "DPS", 40, 22, 10, 2, "enemy_bat", [{name: 'Fang Bite', val: 15, type: 'damage'}], 'VANGUARD', false),
                        new Combatant("Shadow Bat", "DPS", 40, 20, 10, 2, "enemy_bat", [{name: 'Fang Bite', val: 15, type: 'damage'}], 'REARGUARD', false)
                    ]},
                    { id: 'e2', x: 5, y: 1, instances: [
                        new Combatant("Ogre King", "TANK", 250, 6, 25, 10, "enemy_ogre", [{name: 'Ground Smash', val: 35, type: 'damage'}], 'VANGUARD', false),
                        new Combatant("Shadow Bat", "DPS", 40, 21, 10, 2, "enemy_bat", [{name: 'Screech', val: 8, type: 'damage'}], 'REARGUARD', false)
                    ]},
                    { id: 'e3', x: 3, y: 6, instances: [
                        new Combatant("Deep Lurker", "DPS", 90, 12, 12, 5, "enemy_lurker", [{name: 'Acid Spit', val: 18, type: 'damage'}], 'VANGUARD', false),
                        new Combatant("Deep Lurker", "DPS", 90, 14, 12, 5, "enemy_lurker", [{name: 'Acid Spit', val: 18, type: 'damage'}], 'VANGUARD', false),
                        new Combatant("Deep Lurker", "DPS", 90, 10, 12, 5, "enemy_lurker", [{name: 'Acid Spit', val: 18, type: 'damage'}], 'REARGUARD', false)
                    ]}
                ];
            };

            const [activeMapEnemies, setActiveMapEnemies] = useState(getEnemiesForFloor(1));

            const handleEncounter = (enemyData) => {
                setActiveEncounter(enemyData);
                setGamePhase('BATTLE');
            };

            const handleNextFloor = () => {
                const nextFloor = floor + 1;
                setFloor(nextFloor);
                setActiveMapEnemies(getEnemiesForFloor(nextFloor));
            };

            const handlePrevFloor = () => {
                if (floor > 1) {
                    const prevFloor = floor - 1;
                    setFloor(prevFloor);
                    setActiveMapEnemies(getEnemiesForFloor(prevFloor));
                }
            };

            // Party HP State modification - damage scales with floor depth
            const handleTrap = () => {
                const damagePercent = 0.15 + (floor * 0.05); // F1=20%, F2=25%, F3=30%
                setHeroes(prev => {
                    const next = prev.map(hero => {
                        if (hero.hp <= 0) return hero;
                        const nextHero = Object.assign(Object.create(Object.getPrototypeOf(hero)), hero);
                        nextHero.equipment = { ...hero.equipment };
                        const damage = Math.floor(nextHero.maxHp * damagePercent);
                        nextHero.hp = Math.max(0, nextHero.hp - damage);
                        return nextHero;
                    });

                    if (next.filter(h => h.hp > 0).length === 0) {
                        setTimeout(() => {
                            alert("Your party succumbed to the dungeon traps... GAME OVER.");
                            window.location.reload();
                        }, 50);
                    } else {
                        const pct = Math.round(damagePercent * 100);
                        setTimeout(() => alert(`Triggered a Spike Trap! All living party members sustained ${pct}% damage!`), 50);
                    }
                    return next;
                });
            };
            const handleHeal = () => {
                const drop = generateLoot();
                setInventory(prev => [...prev, drop]);
                alert(`Found a Supply Chest! Loot Acquired: ${drop.icon} ${drop.name}`);
            };

            const handleBattleEnd = (result) => {
                if (result === 'VICTORY') {
                    // Delete defeated enemy from map!
                    setActiveMapEnemies(prev => prev.filter(e => e.id !== activeEncounter.id));

                    // Phase 10: Drop Loot!
                    const drop = generateLoot();
                    setInventory(prev => [...prev, drop]);
                    alert(`VICTORY! Loot Acquired: ${drop.icon} ${drop.name}`);

                    setGamePhase('EXPLORATION');
                    setActiveEncounter(null);
                } else {
                    window.location.reload(); // Hard reset on defeat for now
                }
            };

            return (
                <div className="selection:bg-yellow-400 selection:text-black font-sans relative">
                    {/* Persistent Backgrounds */}
                    <div className="fixed inset-0 bg-[url('https://images.unsplash.com/photo-1544200175-ca6e80a7b323?q=80&w=2670&auto=format&fit=crop')] bg-cover opacity-10 grayscale brightness-50 pointer-events-none z-0" />
                    <div className="fixed inset-0 bg-radial-vignette opacity-70 pointer-events-none z-0" />

                    <div className="relative z-10">
                        {/* Persistent state via CSS display trick! Exploration never actually unmounts. */}
                        <div style={{ display: gamePhase === 'EXPLORATION' ? 'block' : 'none' }}>
                            <ExplorationPhase
                                floor={floor}
                                enemies={activeMapEnemies}
                                setEnemies={setActiveMapEnemies}
                                onEncounter={handleEncounter}
                                onNextFloor={handleNextFloor}
                                onPrevFloor={handlePrevFloor}
                                onTrap={handleTrap}
                                onHeal={handleHeal}
                                openInventory={() => setGamePhase('INVENTORY')}
                            />
                        </div>

                        {gamePhase === 'INVENTORY' && (
                            <InventoryPhase
                                heroes={heroes}
                                setHeroes={setHeroes}
                                inventory={inventory}
                                setInventory={setInventory}
                                closeInventory={() => setGamePhase('EXPLORATION')}
                            />
                        )}

                        {gamePhase === 'BATTLE' && activeEncounter && (
                            <BattlePhase
                                heroes={heroes}
                                setHeroes={setHeroes}
                                packSetup={activeEncounter.instances}
                                onBattleEnd={handleBattleEnd}
                            />
                        )}
                    </div>

                    <style>{`
                        .bg-radial-vignette {
                            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,1) 100%);
                        }
                        @keyframes pulse {
                            0% { opacity: 0.4; }
                            50% { opacity: 1; }
                            100% { opacity: 0.4; }
                        }
                        .animate-pulse {
                            animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
                        }
                        @keyframes float-up {
                            0% { opacity: 0; transform: translate(-50%, -10px) scale(0.8); }
                            20% { opacity: 1; transform: translate(-50%, -30px) scale(1.2); }
                            80% { opacity: 1; transform: translate(-50%, -50px) scale(1); }
                            100% { opacity: 0; transform: translate(-50%, -60px) scale(0.9); }
                        }
                        .animate-float-up {
                            animation: float-up 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
                        }

                        @keyframes heal-pulse {
                            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); border-color: #10b981; }
                            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); border-color: #10b981; }
                            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
                        }
                        .animate-heal-pulse {
                            animation: heal-pulse 0.6s cubic-bezier(0.4, 0, 0.6, 1);
                        }
                    `}</style>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</head>
<body class="bg-black">
    <div id="root"></div>
</body>
</html>
